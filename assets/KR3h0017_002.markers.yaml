  - {type: variant, offset: 0, length: 278, content: 圖畫見聞誌卷第二紀藝上唐會昌元年後盡五代凡一百一十六人唐末二十七人左全趙公祐趙温其趙徳齊范瓊陳皓彭堅常粲常重胤吕嶤竹䖍孫遇張詢張南本麻居禮張素卿陳若愚胡瓌子䖍荆浩刁光尹繼昭李洪度辛澄張騰張賛王浹五代九十一人于兢趙喦劉彦齊袁㠖羅塞翁東丹王胡擢胡翼王殷李羣燕筠杜霄李玄應弟審厲歸真李靄之韋道豐朱簡章王喬士鄭唐卿關同支仲元梅行思郭乾暉鍾隱郭權史瓊程凝王道古李坡唐垓王道求宋卓冨玫左禮張南王偉黄延浩張質韓求李祝張圖朱繇李昇杜措杜子瓌杜洪義房從真宋藝髙道興阮知晦杜齯龜黄筌髙從遇阮惟徳杜敬安黄居寳趙元徳趙忠義蒲師訓蒲延昌張玫徐徳昌周行通張玄孔嵩丘文播弟文曉趙才滕昌祐, WYG: ''}
