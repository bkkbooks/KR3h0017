  - {type: variant, offset: 5978, length: 0, content: '', WYG: 欽定四庫全書圖畫見聞誌卷二宋郭若虗撰紀藝上唐永昌元年後盡五代凡一百一十八人唐末二十七人左全趙公祐趙溫其趙德齊范瓊陳皓彭堅常粲常重𦙍吕嶤竹䖍孫遇張詢張南本麻居禮張素卿陳若愚胡瓌子䖍荆浩刁光𦙍尹繼昭李洪度辛澄張騰張贊王浹五代九十一人于兢趙嵓劉彦齊袁㠖羅塞翁東丹王胡擢胡翼王殷李羣燕筠杜霄李𤣥應弟審厲㱕真李靄之韋道豐朱簡章王喬士鄭唐卿關同支仲元枚行思郭乾暉鍾隠郭權史瓊程凝王道古李坡唐垓王道求宋卓富玫左禮張南王偉黄延浩張質韓求李祝張圖朱繇李昇杜楷杜子瓌杜𢎞義房從真宋藝高道興阮知晦杜齯龜黄筌高從遇阮惟德杜敬安黄居寶趙元徳趙忠義蒲師訓蒲延昌張玫徐德昌周行通張𤣥孔嵩丘文播弟文曉趙才滕昌祐姜道隠楊元真董從晦張景思跋異王仁壽衛賢朱悰曹仲𤣥陶守立竹夢松丁謙何遇陸晃施璘貫休楚安傳古弟子岳閻黎智蘊德符唐末二十七人左全蜀郡人蹟本儒家世傳圖畫玅工佛道人物寶厯中聲馳宇内成都長安畫壁甚廣多放吳生之蹟頗得其要有佛道功德五帝三官等像傳於世趙公祐成都人工畫佛道鬼神世穪高絶大和間已著畫名李德裕鎮蜀以賓禮遇之改蒞浙西辟從蓮幕成都大慈聖興兩寺皆有畫壁趙溫其公祐之子綽有父風成都寺觀多見其蹟趙德齊溫其之子襲二世之精蓺竒縱逸筆時軰咸推伏之光}
