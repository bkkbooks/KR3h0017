  - {type: variant, offset: 0, length: 4824, content: 圗畫見聞誌卷第六近事皇朝大遼孟蜀髙麗江南揔三十二事玉堂故事樞宻楚公蘇氏圗畫王氏圗畫秋山圗恩賜种放卧雲圗覺稱畫慈氏像千角鹿圗訓鑒圗五客圗退思巖張氏圗畫丁晉公闘牛畫玉畫义董羽壁没骨圗孝嚴殿相國寺王舎城寺應天三絶八仙眞鍾馗様賞雪圗南莊圗李王印篆鋪殿花常思言髙麗圗術畫玉堂故事太祖平江表所得圗畫賜學士院𥘉有五十餘軸及景德咸平中只有雨村牧牛圗三軸無名氏寒蘆野鴈三軸徐熈筆五王飲酪圗二軸周文矩筆悉令重裝背焉玉堂後北壁兩堵董羽畫水正北一壁呉僧巨然畫山水皆有逺思一時絶筆也有二小壁畫松不知誰筆亦妙今並在焉樞宻楚公江表用師之際故樞宻使楚公適典維楊于時調發軍餉供濟甚廣上録其功將議進拜公自陳願寢爵賞聞李煜内庫所藏書畫甚冨輙祈恩賜上嘉其志遂以名筆僅百卷賜之往往有李主圗篆暨唐賢跋尾公薨後㝷多散失其孫㤗今爲太常少卿刻意購求頗有所獲少卿乃余之祖舅如江都王馬韓晉公牛王摩詰輞川様等常得觀焉蘇氏圗畫蘇大叅雅好書畫風鑒明逹太平興國初江表平上以金陵六朝舊都復聞李氏精博好古藝士雲集首以公倅是邦因喻㫖搜訪名賢書畫後果得千餘卷上進旣稱㫖乃以百卷賜之公後入拜翰林承㫖啓沃之餘且復語及圗畫于時勑借數十品於私第未幾就賜焉至今蘇氏法書名畫最爲盛矣公甞奏對於便殿屢目畫屏其畫乃鍾隱畫鷹猴圗上知其意即時取以賜之余甞於其孫之純處見之王氏圗畫王文獻家書畫繁冨其子貽正繼爲好事甞往來京雒間訪求名迹充牣巾衍太宗朝甞表進所藏書畫十五卷㝷降御扎云卿所進墨迹并古畫復遍看覽俱是妙筆除留墨迹五卷古畫三卷領得外其餘却還卿家付王貽正其餘者乃是王羲之墨迹晉朝名臣墨迹王徽之書唐閻立本畫老子西昇經圗薛稷畫鶴凢七卷猶子渙遂得模詔扎刋於翠琰秋山圗太平興國中袐閣曝畫時陶榖爲翰長因展秋山圗一面令黄居宷品第之居寀一見動容曰此圗實居寀與父筌奉孟主命同畫以荅江南信弊絹縫中有居寀父子姓名視之果驗曾有人於向文簡家見十二幅圗花竹禽鳥泉石地形皆極精妙上題云如京副使臣黄筌等十三人合畫圗之角却有江南印記乃是孟氏贈李主之物也文簡薨其圗不知所在恩賜种放眞宗祀汾隂還駐蹕華隂因登亭望蓮花峯忽憶种放居是山亟令中貴人裴愈召之時放稱疾不應召上笑而止因問愈曰放在家何爲耶愈對曰臣到放所居時㑹放在草㕔中看畫水牛二軸上顧謂侍臣曰此髙尚之士怡性之物也遂按行在所見扈從圗軸得四十餘卷盡令愈往賜之皆名縱古迹也放隱終南山豹林谷或居華山往來不常時方在華山也卧雪圗丁晉公典金陵陛辭之日眞宗出八幅袁安卧雪圗一面其所畫人物車馬林石廬舎靡不臻極作從者苦寒之態意思如生旁題云臣黄居寀等定到神品上但不書盡人姓名亦莫識其誰筆也上宣諭晉公曰卿到金陵日可選一絶景處張此圗晉公至金陵乃於城之西北隅搆亭曰賞心危聳清曠勢出塵表遂施圗於巨屏到者莫不以此爲佳觀歳月旣乆縑素不無敗裂由是往往爲人刲竊後王君玉宻學出典是邦素聞此圗甚竒下車之後首欲縱觀乃見竊以殆盡嗟惋乆之乃詩於壁其警句云昔人巳化嘹天鶴往事難㝷卧雪圗覺稱畫大中祥符𥘉有西域僧覺稱來舘於興國寺之傳法院其僧通四十餘本經論年始四十餘歳丁晉公延見之嘉其敏惠後作聖德頌以上文理甚冨上問其所欲但云求金欄袈裟歸置金剛坐下㝷詔尚方造以給之覺稱自言酤蘭左國人刹帝利性善畫甞於譯堂北壁畫釋迦面與此方所畫絶異昔有𣑽僧帶過白㲲上本亦與㝷常畫像不同蓋西國所稱髣髴其真今之儀相始自晉戴逵刻製𣑽像欲人生敬時頗有損益也慈氏像景祐中有畫僧曽於市中見舊功德一幅看之乃是慈氏菩薩像左邊一人執手爐裹幞頭衣中央服右邊一婦人捧花盤頂翠鳯寳冠衣珠絡泥金廣䄂畫繪黙識其立意非俗而畫法精髙遂以半千售之乃重加裝背持獻入内閻都知閻一見且驚曰執香爐者實章聖御像也捧花盤者章憲明肅皇太后眞容也此功德乃髙文進所畫舊是章憲閤中別置小佛堂供飬毎日凌晨焚香恭拜章憲歸天不意流落一至於此言訖於悒乃以束縑償之復増華其標軸即日進於澄神殿仁廟對之瞻慕慽容移刻方罷命藏之御府以白金二百星賜荅之千角鹿圗皇朝與大遼國馳禮于今僅七十載繼好息民之羙曠古未有慶曆中其主號興宗以五幅縑畫千角鹿圗爲獻旁題年月日御畫上命張圗於太清樓下召近臣縱觀次日又敕中闈宣命婦觀之畢藏於天章閣訓鑒圗皇祐𥘉元上敕待詔髙克明等圗畫三朝盛德之事人物纔及寸餘宫殿山川鑾輿儀衛咸備焉命學士李淑等編次序讃之凢一百事爲十卷名三朝訓鑒圗圗成復令傳模鏤版印染頒賜大臣及近上宗室五客圗李文正甞於私第之後園育五禽以寓目皆以客名之後命畫人冩以爲圗鶴曰仙客孔雀曰南客鸚鵡曰隴客白鷴曰閑客鷺鷥曰雪客各有詩篇題於圗上好事者傳冩之退思巖魯肅簡以孤直遇主公家之事知無不爲毎中書罷歸私宅別居一小齋圗繪山水題曰退思巖獨游其閒雖家人罕接焉張氏圗畫張侍郎去華典成都時尚存孟氏有國日屏扆圗障皆黄筌軰畫一日清河患其暗舊損破悉令換易遂命畫工別爲新製以其換下屏面迨公帑所有舊圗呼牙儈髙評其直以自售一日之内獲黄筌等圗十餘面後貳卿謝世頗有奉葬者其子師錫善畫好竒以其所存寶藏之師錫死復有葬者師錫子景伯亦工畫有髙鑒尚存餘蓄以自寶玩景伯死悉以葬焉丁晉公丁晉公家藏書畫甚盛南遷之日籍其財産有李成山水寒林共九十餘軸佗皆稱是後悉分掌内府矣鬪牛畫馬正惠甞得鬪水牛一軸云厲歸眞畫甚愛之一日展曝於書室雙扉之外有輸租莊賔適立於砌下凝玩乆之旣而竊哂公於青瑣間見之呼問曰吾藏畫農夫安得觀而笑之有說則可無說則罪之莊賔曰某非知畫者但識眞牛其鬪也尾夾於髀間雖壯夫旅力不可少開此畫牛尾舉起所以笑其失眞愚謂雖畫者能之妙不及農夫見之專也擅藝者所冝愽䆒玉畫义張文懿性喜書畫今古圗軸襞積繁夥銓量必當愛護尤勤每張畫必先施帟幕畫义以白玉爲之其畫可知也董羽水玉堂北壁舊有董羽畫水二堵筆力遒勁勢若摇動其下一二尺頗有雨壞處蘇易簡爲學士尤愛重之蘇適受詔知舉將入南宫囑於同院韓丕使召名筆完葺之蘇旣去韓乃呼工之赤白者杇墁其半而用朱畫欄檻以承之蘇岀見之悵恨累日雖命水洗滌而痕迹至今尚存時人以蘇之鑒尚韓之純朴兩重焉没骨圗李少保端愿有圗一面畫芍藥五本云是聖善齊國獻穆大長公主房卧中物或云太宗賜文和其畫皆無筆墨惟用五彩布成旁題云翰林待詔臣黄居寀等定到上品徐崇嗣畫没骨圗以其無筆墨骨氣而名之但取其濃麗生態以定品後因岀示兩禁賔客蔡君謨乃命筆題云前世所畫皆以筆墨爲上至崇嗣始用布彩逼眞故趙昌軰俲之也愚謂崇嗣遇興偶有此作後來所畫未必皆廢筆墨且考之六法用筆爲次至如趙昌亦非全無筆墨但多用定本臨模筆氣嬴懦惟尚傳彩之功也孝嚴殿治平甲辰歳於景靈宫建孝嚴殿奉安仁宗神御乃鳩集畫手畫諸屏扆墻壁先是三聖神御殿兩廊圗畫創業戡定之功及朝廷所行大禮次畫講肄文武之事遊豫宴饗之儀至是又兼畫應仁宗朝輔臣吕文靖巳下至節鉞凢七十二人時張龍圗燾主其事乃奏請於逐人家取影貌傳寫之鴛行序列歴歴可識其面於是觀者莫不歎其盛美相國寺治平乙巳歳雨患大相國寺以汴河勢髙溝渠失治寺庭四廊悉遭渰浸圯塌殆盡其牆壁皆髙文進等畫惟大殿東西走馬廊相對門廡不能爲害東門之南王道眞畫給孤獨長者買祗陁太子園因縁東門之北李用及與李象坤合畫牢度义闘聖變相西門之南王道眞畫誌公變十二面觀音像西門之北髙文進畫大降魔變相今並存之皆竒迹也其餘四面廊壁皆重修復後集今時名手李元濟等用内府所藏副本小様重臨倣者然其間作用各有新意焉王舎城寺魏之臨清縣東北隅有王舎城佛刹内東邊一殿極古四壁皆呉生畫禪宗故事其書不知誰人類禇河南循例接勞北使及使遼者過則縣大夫自請遊觀仍粉牓誌使者姓名應天三絶唐僖宗幸蜀之秋有㑹稽山處士孫位扈從止成都位有道術兼工書畫曽於成都應天寺門左壁畫坐天王暨部從鬼神筆鋒狂縱形製詭異世莫之與比歴三十餘載未聞繼其髙躅至孟蜀時忽有匡山處士景煥一名朴善畫煥與翰林學士歐陽烱爲忘形之友一日聮騎同遊應天適覩位所畫門之左壁天王激發髙興遂畫右壁天王以對之二藝爭鋒一時壯冠渤海歎重其能遂爲長歌以美之繼有草書僧夢歸後至因請書於廊壁書畫歌行一日而就傾城士庻看之闐噎寺中成都人號爲應天三絶也辛顯云景煥所畫不及孫位逺甚煥尤好畫龍有野人閑話五卷行於世其間一篇惟叙畫龍之事八仙眞道士張素卿神仙人也曽於青城山丈人觀畫五嶽四瀆眞形并十二溪女數壁筆迹遒健神彩欲活見之者心悚神悸足不能進實畫之極致者也孟蜀後主數遣秘書少監黄筌令依様摹之及下山終不相類後因蜀主誕日忽有人持素卿畫八仙眞形以獻蜀主蜀主觀之且歎曰非神仙之能無以冩神仙之質遂厚賜以遣一日命翰林學士歐陽烱次第讃之復遣水部貟外郎黄居寶八分題之毎觀其畫歎其筆迹之縱逸覽其讃賞其文詞之髙古玩其書愛其點畫之雄壯顧謂八仙不讓三絶八仙者李阿容成董仲舒張道陵嚴君平李八百長壽仙葛永瑰鍾馗様昔呉道子畫鍾馗衣藍衫鞹一足眇一目腰笏巾首而蓬髮以左手捉鬼以右手抉其鬼目筆迹遒勁實繪事之絶格也有得之以獻蜀主者蜀主甚愛重之常挂卧内一日召黄筌令觀之筌一見稱其絶手蜀主因謂筌曰此鍾馗若用拇指搯其目則愈見有力試爲我改之筌遂請歸私室數日看之不足乃别張絹素畫一鍾馗以拇指搯其鬼目翊日并呉本一時獻上蜀主問曰向止令卿改胡爲别畫筌曰呉道子所畫鍾馗一身之力氣色眼貌俱在第二指不在拇指以故不敢輙改也臣今所畫雖不迨古人然一身之力併在拇指是敢别畫耳蜀主嗟賞之仍以錦帛鋈器旌其别識賞雪圗李中主保大五年元日大雪命太弟巳下登樓展宴咸命賦詩令中人就私第賜李建勲繼和是時建勲方㑹中書舎人徐鉉勤政學士張義方於溪亭即時和進乃召建勲鉉義方同入夜艾方散侍臣皆有興詠徐鉉爲前後序仍集名手圗畫曲盡一時之妙眞容髙冲古主之侍臣法部絲竹周文矩主之樓閣宫殿朱澄主之雪竹寒林董源主之池沼禽魚徐崇嗣主之圗成無非絶筆南莊圗李後主有國日甞令周文矩畫南莊圗盡冩其山川氣象亭臺景物精思詳備殆爲絶格開寳癸亥歳歸朝首貢於闕下籍之秘府李主印篆李後主才髙識博雅尚圗書蓄聚旣豐尤精賞鑒今内府所有圗軸曁人家所得書畫多有印篆曰内殿圗書内合同印建業文房之寳内司文印集賢殿書院印集賢院御書印此印多用墨或親題畫人姓名或有押字或爲歌詩雜言又有織成大回鸞小回鸞雲鶴練鵲墨錦褾飾今綾錦院俲此織作提頭多用織成縚帶簽貼多用黄經紙背後多書監裝背人姓名及所較品第又有澄心堂紙以供名人書畫鋪殿花江南徐熈軰有於雙縑幅素上畫叢艶疊石傍出藥苗雜以禽鳥蜂蟬之妙乃是供李主宫中挂設之具謂之鋪殿花次曰裝堂花意在位置端莊駢羅整肅多不取生意自然之態故觀者往往不甚采鑒常思言余熈寧辛亥冬𬒳命接勞北使爲輔行日與其副燕人馬禋邢希古結駟並馳希古恭順詳敏有儒者之風從容語及圗畫且燕京有一布衣常其姓思言其名善畫山水林木求之者甚衆然必在渠樂與即爲之旣不可以利誘復不可以勢動此其所以難得也復見問曰南朝諸君子頗有好畫者否余荅曰南朝士大夫自公之暇固有琴樽書畫之樂希古慨然嗟慕形乎神色愚以謂常生者擅藝居幽朔之間不𬒳中國之聲教果能不可以勢動復不可以利誘則斯人也豈易得哉髙麗國皇朝之盛遐荒九譯來庭者相屬於路惟髙麗國敦尚文雅漸染華風至於伎巧之精他國罕比固有丹青之妙錢忠懿家有着色山水四卷長安臨潼李虞曹家有本國八老圗二卷及曽於楊褒虞曹家見細布上畫行道天王皆有風格熈寧甲寅歳遣使金良鑒入貢訪求中國圗畫銳意購求稍精者十無一二然猶費三百餘緡丙辰冬復遣使崔思訓入貢因將帶畫工數人奏請模冩相國寺壁畫歸國詔許之於是盡模之持歸其模畫人頗有精於工法者彼使人毎至中國或用摺疊扇爲私覿物其扇用鵶青𥿄爲之上畫本國豪貴雜以婦人鞍馬或臨水爲金砂灘暨蓮荷花木水禽之類點綴精巧又以銀埿爲雲氣月色之狀極可愛謂之倭扇本出於倭國也近歳尤袐惜典客者蓋稀得之倭國乃日本國也本名倭旣耻其名又自以在極東因號日本也今則臣屬髙麗也術畫夫士必以忠醇俓亮盡瘁於公然後可稱於任可爵於朝惡夫邪佞以苟進者則不免君子之誅藝必以妙悟精能取重於世然後可著於文可寳於笥惡失眩惑以沽名者則不免鑒士之弃昔者孟蜀有一術士稱善畫蜀主遂令於庭之東隅畫野鵲一隻俄有衆禽集而噪之次令黃筌於庭之西隅畫野鵲一隻則無有集禽之噪蜀主以故問筌對曰臣所畫者藝畫也彼所畫者術畫也是乃有噪禽之異蜀主然之國初有道士陸希眞者每畫花一枝張於壁間則遊蜂立至向使邊黄徐趙軰措筆定無來蜂之驗此抑非眩惑取功沽名亂藝者乎至於野人騰壁羙女下牆禁五彩於水中起雙龍於霧外皆出方術恠誕推之畫法闕如也故不録圗畫見聞誌卷第六, WYG: ''}
