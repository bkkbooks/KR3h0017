front:
  text: 圖畫見聞志卷第一
  hash: sha256:6e6dce36ac2ce2df37d9dd3bbd87e6a5da73c170acdc41dfcd98566b053e0530
body:
  text: 郭若虗撰敘論敘諸家文字敘國朝求訪敘自古規鑒敘圖畫名意敘製作楷模論衣冠異制論氣韻非師論用筆得失論曹吳體法論吳生設色論婦人形相論收藏聖像論三家山水論黃徐體異論畫龍體法論古今優劣敘諸家文字自古及近代紀評畫筆文字非一難悉具載聊以其所見聞篇四部叢刊四庫全書文淵閣目次之凡三十家名畫集南齊高帝撰古畫品録謝赫撰裝馬譜毛惠逺撰昭公録梁武帝撰僧繇録亡名氏畫説文亡名氏述畫記後魏孫暢之撰續畫品録陳姚最撰後畫品録唐沙門彥悰撰畫斷張懷瓘撰名畫獵精録亡名氏後畫品録李嗣真撰雜色駿騎録韓幹撰繪境張璪撰畫評顧況撰續畫評劉整撰公私畫録裴孝源撰畫拾遺録竇蒙撰畫山水録吳恬撰一名玢唐朝名畫録朱景玄撰歷代名畫記張彥逺撰畫山水訣荆浩撰一名洪谷子梁朝畫目亡名氏廣畫新集蜀沙門仁顯撰益州畫録辛顯撰江南畫録亡名氏江南畫録拾遺徐鉉撰廣梁朝畫目皇朝胡嶠撰總畫集黃休復撰本朝畫評劉道醇纂符嘉應撰敘國朝求訪畫之源流諸家備載爰自唐季兵難五朝亂離圖畫之好乍存乍失逮我宋上符天命下順人心肇建皇基肅清六合沃野謳歌之際復見堯風坐客間宴之餘兼窮繪事太宗皇帝欽明濬哲冨藝多才時方諸偽歸真四荒重譯萬機豐暇屢購􅎇竒太平興國間詔天下郡縣搜訪前哲墨迹圖畫先是荆湖轉運使得漢張芝草書唐韓幹馬二本以獻之韶州得張九齡畫像并文集九卷表進後之繼者難可勝紀又敕待詔髙文進黃居寀搜訪民間圖畫端拱元年以崇文院之中堂置祕閣命吏部侍郎李至兼祕書監點檢供御圖書選三館正本書萬卷實之祕監以進御退餘藏于閣內又從中降圖畫并前賢墨迹數千軸以藏之淳化中閣成上飛白書額親幸召近臣縱觀圖籍賜宴又以供奉僧元靄所寫御容二軸藏于閣又有天章龍圖寶文三閣後苑有圖書庫皆藏貯圖書之府祕閣每歲因暑伏曝􅡢近侍暨館閣諸公張筵縱觀圖典之盛無替天祿石渠妙楷寶迹矣敘自古規鑒易稱聖人有以見天下之賾而擬諸其形容象其物冝是故謂之象又曰象也者像此者也嘗考前賢畫論首稱像人不獨神氣骨法衣紋向背為難蓋古人必以聖賢形像往昔事實含毫命素製為圖畫者要在指鑒賢愚彂明治亂故魯殿紀興廢之事麟閣會勳業之臣迹曠代之幽潛託無窮之炳煥昔漢孝武帝欲以鉤弋趙婕妤少子為嗣命大臣輔之惟霍光任重大可屬社稷乃使黃門畫者畫周公負成王朝諸侯以賜光孝成帝逰于後庭欲以班婕妤同輦載婕妤辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖幸今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班婕妤又嘗設宴飲之會趙李諸侍中皆引滿舉白談笑大噱時乘輿幄坐張畫屏風畫紂醉踞妲己作長夜之樂上因顧指畫問班伯曰紂為無道至于是乎伯曰書云乃用婦人之言何有踞肆于朝所謂衆惡歸之不如是之甚者也上曰茍不若此此圖何戒伯曰沈湎于酒微子所以告去也式號式呼大雅所以流連也謂書淫亂之戒其原在于酒上喟然歎曰久不見班生今日復聞讜言後漢光武明德馬皇后美于色厚于德帝用嘉之嘗從觀畫虞舜見娥皇女英帝指之戲后曰恨不得如此為妃又前見陶唐之像后指堯曰嗟乎羣臣百僚恨不得為君如是帝顧而笑唐德宗詔曰貞元己巳歲秋九月我行西宫瞻閎閣崇構見老臣遺像顒然肅然和敬在色想雲龍之叶應感致業之艱難覩往思今取類非逺文宗大和二年自撰集尚書中君臣事迹命畫工圖于太液亭朝夕觀覽焉漢文翁學堂在益州大城內昔經頽廢後漢蜀郡太守髙朕復繕立乃圖畫古人聖賢之像及禮器瑞物于壁唐韋機為檀州刺史以邉人僻陋不知文儒之貴修學館畫孔子七十二弟子漢晉名儒像自為贊敦勸生徒繇兹大化夫如是豈非文未盡經緯而書不能形容然後繼之于畫也所謂與六籍同功四時並運亦冝哉敘圖畫名意古之祕畫珍圖名隨意立典範則有春秋毛詩論語孝經爾雅等圖上古之畫多遺其姓其次後漢蔡雍有講學圖梁張僧繇有孔子問禮圖隋鄭法士有明堂朝會圖唐閻立德有封禪圖尹繼昭有雪宫圖觀德則有帝舜娥皇女英圖亡名氏隋展子虔有禹治水圖晉戴逵有列女仁智圖宋陸探微有勳賢圖忠鯁則隋楊契丹有辛毗引裾圖唐閻立本有陳元逹鎖諫圖吳道子有朱雲折檻圖髙節則晉顧凱之有祖二疏圖王廙有木鴈圖宋史藝有屈原漁父圖南齊蘧僧􅎇有巢由洗耳圖壯氣則魏曹髦有卞莊刺虎圖宋宗炳有獅子擊象圖梁張僧繇有漢武射鮫圖寫景則晉明帝有輕舟迅邁圖衛協有穆天子宴瑤池圖史道碩有金谷園圖顧凱之有雪霽望五老峯圖靡麗則晉戴逵有南朝貴戚圖宋袁倩有丁貴人彈曲項琵琶圖唐周昉有楊妃架雪衣女亂雙陸局圖風俗則南齊毛惠逺有剡中溪谷村墟圖陶景真有永嘉屋邑圖隋楊契丹有長安車馬人物圖唐韓滉有堯民鼓腹圖以上圖畫雖不能盡見其迹前人載之甚詳但愛其佳名聊取一二類而録之敘製作楷模大率圖畫風力氣韻固在當人其如種種之要不可不察也畫人物者必分貴賤氣貌朝代衣冠釋門則有善功方便之顔道像必具修真度丗之範帝王當崇上聖天日之表外夷應得慕華欽順之情儒賢即見忠信禮義之風武士固多勇悍英烈之貌隱逸俄識肥遁髙丗之節貴戚蓋尚紛華侈靡之容帝釋須明威福嚴重之儀鬼神乃作醜䰩尺者切馳趡于鬼切之狀士女冝冨秀色婑烏果切媠奴坐切之態田家自有醇氓朴野之真恭驁愈慘又在其間矣畫衣紋林木用筆全類于書畫衣紋有重大而調暢者有縝細而徑健者勾綽縱掣理無妄下以狀髙側深斜卷摺飄舉之勢畫林木有樛枝挺幹屈節皴皮紐裂多端分敷萬狀作怒龍驚虺之勢聳凌雲翳日之姿冝須崖岸豐隆方稱蟠根老壯也畫山石者多作礬頭亦為凌面落筆便見堅重之性皴淡即生窊凸之形每留素以成雲或借地以為雪其破墨之功尤為難也畫畜獸者全要停分向背筋力精神肉分肥圓毛骨隱起仍分諸物所稟動止之性四足唯兔掌底有毛謂之建毛畫龍者折出三停自首至膊膊至腰腰至尾也分成九似角似鹿頭似駝眼似鬼項似蛇腹似蜃鱗似魚爪似鷹掌似虎耳似牛也窮遊泳蜿蜒之妙得回蟠升降之冝仍要騣凶鬯匕鬛肘毛筆畫壯快直自肉中生出為佳也凡畫龍開口者易為巧合口者難為功畫家稱開口貓兒合口龍言其兩難也畫水者有一擺之波三摺之浪布之字之勢分虎爪之形湯湯若動使觀者浩然有江湖之思為妙也畫屋木者折算無虧筆畫勻壯深逺透空一去百斜如隋唐五代巳前洎國初郭忠恕王士元之流畫樓閣多見四角其斗栱逐鋪作為之向背分明不失繩墨今之畫者多用直尺一􅈬界畫分成斗栱筆迹繁雜無壯麗間雅之意畫花果草木自有四時景候隂陽向背筍條老嫩苞萼後先逮諸園蔬野草咸有出土體性畫翎毛者必須知識諸禽形體名件自觜喙口臉眼緣去聲叢林腦毛披蓑毛翅有梢去聲翅有蛤翅翅邦上聲上有大節小節大小窩翎次及六梢又有料平聲風掠草䌤縫翅羽之間散尾壓磹尾肚毛腿袴尾錐腳有探瓜三節食爪二節撩爪四節托爪一節宣黃八甲鷙鳥眼上謂之看棚一名看簷背毛之間謂之合澑山鵲雞類各有歲時蒼嫩皮毛眼爪之異家鵝鴨即有子肚野飛水禽自然輕梢去聲如此之類或鳴集而羽翮緊戢或寒棲而毛葉鬆泡去聲巳上具有名體處所必須融會闕一不可設或未識漢殿吳殿梁柱斗栱義手替木熟柱駝峯方莖額道抱間昻頭羅花羅幔暗制綽幕猢孫頭琥珀枋龜頭虎座飛簷撲水膊風化廢垂魚惹草當鉤曲脊之類慿何以畫屋木也畫者尚罕能精究況觀者乎論衣冠異制自古衣冠之制荐有變更指事繪形必分時代衮冕法服三禮備存物狀實繁難可得而載也漢魏巳前始戴幅巾晉宋之丗方用羃㒿後周以三尺皂絹向後幞髮名折上巾通謂之幞頭武帝時裁成四腳隋朝唯貴臣服黃綾紋袍烏紗帽九環帶六合靴起于後魏次用桐木黑漆為巾子裹于幞頭之內前繫二腳後垂二腳貴賤服之而烏紗帽漸廢唐太宗嘗服翼善冠貴臣服進德冠至則天朝以絲葛為幞頭巾子以賜百官開元間始易以羅又别賜供奉官及內臣圓頭宮朴巾子至唐末方用漆紗裹之乃今幞頭也三代之際皆衣襴衫秦始皇時以紫緋緑𫀆為三等品服庶人以白國語曰袍者朝也古公卿上服也至周武帝時下加欄唐髙宗朝給五品以上隨身魚又敕品官紫服金玉帶深淺緋服並金帶深淺緑服並銀帶深淺青服並鍮石帶庶人服黃銅鐡帶一品以下文官帶手巾算袋刀子礪石武官亦聽睿宗朝制武官五品巳上帶七事跕蹀佩刀刀子磨石契苾真􅎪厥計筒火石袋也開元𥘉復罷之晉處士馮翼衣布大袖周緣以皂下加襴前繫二長帶隨唐朝野服之謂之馮翼之衣今呼為直掇禮記儒行篇魯哀公問于孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠注云逢大也大掖大𬒮禪衣也逢掖與馮翼音相近又梁志有袴褶以從戎事三代巳前人皆跣足三代以後始服木屐伊尹以草為之名曰履秦丗參用絲革靴本胡服趙靈王好之制有司衣袍者宜穿皂靴唐代宗朝令宫人侍左右者穿紅錦靿靴凡在經營所冝詳辨至如閻立本圖昭君妃音配虜戴帷帽以據鞍王知慎畫梁武南郊有衣冠而跨馬殊不知帷帽創從隋代軒車廢自唐朝雖弗害為名蹤亦丹青之病耳帷帽如今之席帽周回垂網也論氣韻非師謝赫云一曰氣韻生動二曰骨法用筆三曰應物像形四曰隨類賦彩五曰經營位置六曰傳模移寫六法精論萬古不移然而骨法用筆以下五者可學如其氣韻必在生知固不可以巧密得復不可以歲月到默契神會不知然而然也嘗試論之竊觀自古奇迹多是軒冕才賢巖穴上士依仁遊藝探賾鉤深髙雅之情一寄于畫人品既巳髙矣氣韻不得不髙氣韻既巳髙矣生動不得不至所謂神之又神而能精馬凡畫必周氣韻方號丗珍不爾雖竭巧思止同衆工之事雖曰畫而非畫故楊氏不能授其師輪扁不能傳其子繫乎得自天機出于靈府也且如丗之相押字之術謂之心印本自心源想成形迹迹與心合是之謂印矧乎書畫彂之于情思契之于綃楮則非印而何押字且存諸貴賤禍福書畫豈逃乎氣韻髙卑夫畫猶書也楊子曰言心聲也書心畫也聲畫形君子小人見矣論用筆得失凡畫氣韻本乎遊心神彩生于用筆用筆之難斷可識矣故愛賔稱唯王獻之能為一筆書陸探微能為一筆畫無適一篇之文一物之像而能一筆可就也乃是自始及終筆有朝揖連綿相屬氣脈不斷所以意存筆先筆周意內畫盡意在像應神全夫內自足然後神間意㝎神間意㝎則思不竭而筆不困也昔宋元君將畫圖衆史皆至受揖而立舐筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣盤礴羸君曰可矣是真畫者也又畫有三病皆繫用筆所謂三者一曰版二曰刻三曰結版者腕弱筆癡全虧取與物狀平褊不能圓混也刻者運筆中疑心手相戾勾畫之際妄生圭角也結者欲行不行當散不散似物凝礙不能流暢也未窮三病徒舉一隅畫者鮮克留心觀者當煩拭眥大抵氣韻髙筆畫壯則愈玩愈妍其或格凡毫懦初觀縱似可采久之還復意怠矣論曹吳體法曹吳二體學者所宗按唐張彥逺歷代名畫記稱北齊曹仲逹者本曹國人最推工畫𣑽像是為曹謂唐吳道子曰吳吳之筆其勢圖轉而衣服飄舉曹之筆其體稠疊而衣服緊窄故後輩稱之曰吳帶當風曹衣出水又按蜀僧仁顯廣畫新集言曹曰昔笁乾有康僧會者初入吳設像行道時曹不興見西國佛畫儀範寫之故天下盛傳曹也又言吳者起于宋之吳􅌔之作故號吳也且南齊謝赫云不興之迹代不復見唯祕閣一龍頭而已觀其風骨擅名不虗吳暕之説聲微迹曖丗不復傳謝赫云擅美當年有聲京洛在第三品江僧寶下也至如仲達見北齊之朝距唐不逺道子顯開元之後繪像仍存證近代之師承合當時之體範況唐室巳上未立曹吳豈顯釋寡要之談亂愛賔不刋之論推時驗迹無愧斯言也雕塑鑄像亦本曹吳論吳生設色吳道子畫今古一人而巳愛賔稱前不見顧陸後無來者不其然哉嘗觀所畫墻壁卷軸落筆雄徑而傅彩簡淡或有墻壁間設色重處多是後人裝飾至今畫家有輕拂丹青者謂之吳裝雕塑之像亦有吳裝論婦人形相歷觀古名士畫金童玉女及神仙星官中有婦人形相者貌雖端嚴神必淸古自有威重儼然之色使人見則肅恭有歸仰之心今之畫者但貴其姱麗之容是取恱于衆目不達畫之理趣也觀者察之論收藏聖像論者或曰不冝收藏佛道聖像恐其褻慢葷穢難可時時展玩愚謂不然凡士君子相與觀閲書畫為適則必處間靜但鑒賞精能瞻崇遺像惡有褻慢之心哉且古人所製佛道功德則必專心勵志曲盡其妙或以希福田利益是其尤為著意者況自吳曹不興晉顧凱之戴逵宋陸探微梁張僧繇北齊曹仲達隋鄭法士楊契丹唐閻立德立本吳道子周昉盧楞伽之流及近代侯翼朱繇張圖武宗元王瓘髙益髙文進王靄孫夢卿王道真李用及李象坤蜀髙道興孫位孫知微范瓊勾龍爽石恪金水石城張玄蒲師訓江南曹仲元陶守立王齊翰顧德謙之倫無不以佛道為功豈非釋梵莊嚴真仙顯化有以見雄才之浩博盡學志之精深者乎是知云不冝收藏者未為要説也論三家山水畫山水唯營丘李成長安關同華原范寬智妙入神才髙出類三家鼎跱百代標程前古雖有傳丗可見者如王維李思訓荆浩之倫豈能方駕近代雖有專意力學者如翟院深劉永紀真之輩難繼後塵翟學李劉學關紀學范夫氣象蕭疏煙林清曠毫鋒穎脫墨法精微者營丘之製也石體堅凝雜木豐茂臺閣古雅人物幽間者關氏之風也峯巒渾厚勢狀雄強搶上聲筆俱均人屋皆質者范氏之作也煙林平逺之妙始自營丘畫松葉謂之攢針筆不染淡自有榮茂之色關畫木葉間用墨揾時出枯梢筆蹤徑利學者難到范畫林木或側或欹形如偃蓋别是一種風規但未見畫松柏耳畫屋既質以墨籠染後輩目為鐵屋復有王士元王端燕貴許道寧髙克明郭熙李宗成丘訥之流或有一體或具體而微或預造堂室或各開戶牖皆可稱尚然藏畫者方之三家猶諸子之于正經矣關同雖師荆浩蓋青出于藍也論黃徐體異諺云黃家冨貴徐熙野逸不唯各言其志蓋亦耳目所習得之於心應之于手也何以明其然黃筌與其子居寀始並事蜀為待詔筌後纍遷如京副使既歸朝筌領真命為宫贊或曰筌到闕未久物故今之遺迹多是在蜀中日作故往往有廣政年號宫贊之命亦恐傳之誤也居寀復以待詔録之皆給事禁中多寫禁籞所有􅎇禽瑞鳥竒花怪石今傳丗桃花鷹鶻純白雉兔金盆鵓鴿孔雀龜鶴之類是也又翎毛骨氣尚豐滿而天水分色徐熙江南處士志節髙邁放逹不羈多狀江湖所有汀花野竹水鳥淵魚今傳丗鳧雁鷺鷥蒲藻蝦魚叢艷折枝園蔬藥苗之類是也又翎毛形骨貴輕秀而天水通色言多狀者緣人之稱聊分兩家作用亦在臨時命意大抵江南之藝骨氣多不及蜀人而蕭灑過之也二者猶春籣秋菊各擅重名下筆成􅎇揮毫可範復有居寀兄居寶徐熙之孫曰崇嗣崇矩蜀有刁處士各光下一字犯太祖廟諱劉贊滕昌祐夏侯延祐李懷衮江南有唐希雅希雅之孫曰中祚曰宿及解處中輩都下有李符李吉之儔及後來名手間出跂望徐生與二黃猶山水之有正經也黃筌之師刁處士猶關同之師荆浩論畫龍體法畫龍唯五代四明僧傳古大師其名最著觀其體則筆墨遒爽善為蜿蜒之狀皇建院法堂屏風是其真迹至任從一待詔之作稍加怪怒建隆觀翊教院玉皇殿後是其真迹也今雀白所圖又得其要建隆觀翊教院玉皇殿中羅㬋邉有一龍頭北都大安寺羅漢壁有龍一條恨不見不興祕閣之頭軌範同否又不知葉公當日所遇厥狀何如自昔豢龍氏殁龍不復擾所謂上飛于天晦隔層雲下歸于泉深入無底人不可得而見也今之圖寫固難推以形似但觀其揮毫落筆筋力精神理契吳畫鬼神也前論三停九似亦以人多不識真龍先匠所遺傳授之法論古今優劣或問近代至藝與古人何如答曰近代方古多不及而過亦有之若論佛道人物士女牛馬則近不及古若論山水林石花竹禽魚則古不及近何以明之且顧陸張吳中及二閻皆純重雅正性出天然晉顧凱之宋陸探微梁張僧繇唐閻立德閻立本暨吳道子也吳生之作為萬丗法號曰畫聖不亦冝哉巳上皆極佛道人物張周韓戴氣韻骨法皆出意表唐張萱周昉皆工士女韓幹工馬戴嵩工牛或問曰何以但舉韓幹而不及曹霸止引戴嵩而弗稱韓滉答曰韓師曹將軍戴法韓晉公但舉其弟子可知其師也至知韋鑒暨猶子鶠皆善畫馬但取其尢著者明之難即遍舉也後之學者終莫能到故曰近不及古至如李與關范之迹徐暨二黃之蹤前不謝師資後無復繼踵借使二李三王之輩復起邊鸞陳庶之倫再生亦將何以措手于其間哉故曰古不及近二李則李思訓將軍并其子昭道中舍三王則王維右丞暨王熊王宰悉工山水邉鵉陳庶工花鳥並唐人也是以推今考古事絶理窮觀者必辨金鍮無焚玉石圖畫見聞志卷第一
