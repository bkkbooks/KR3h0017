body:
  text: 苐一卷叙論總一十六事苐二卷紀藝上唐末二十七人五代九十一人苐三卷紀藝中仁宗御畫王公士夫一十三人髙尚二人人物五十三人傳寫七人第四卷紀藝下此卷盡九十八人山水門二十四人花鳥門三十九人雜畫門三十五人第五卷故事拾遺唐朝朱梁王蜀總二十七事第六卷近事皇朝孟蜀大遼髙麗總三十二事標目此殘宋刻本圖畫見聞志四五六共三卷周香嚴所藏書也四月二十二日余訪香嚴詢余近日淂書幾何余以澗薲于玉峯所收元刻丁鶴年集明人葉德榮手抄法帖刋誤翻宋版圖畫見聞志三種對香嚴即出圖畫見聞志一冊示余曰君所洴者與此本同否余曰行欵似同然亦記憶不甚明晣矣香嚴曰此王蓮涇家藏書也余初淂時亦認為宋版既而見其字畫方板疑為翻本曷擕去對之余曰此冊僅半尚有前三卷否香嚴曰此殘本也余即從香嚴乞之蓋余舊藏此書元人抄本止前三卷香嚴亦所素知故敢丐此以為尾之續也及擕歸與澗薲同觀亦認為翻宋本遂取前所收者勘之行欵雖同而楮墨俱饒舌氣細辨字畫遇宋諱皆缺筆翻本不如是也爰揭去舊時背紙見原楮皆羅紋濶連而橫印者始信宋刻宋印以翻本行欵證之此即所謂臨安府陳道人書藉鋪刋行本也且余所藏南宋書棚本如許丁卯羅昭諫唐人諸集字畫方板皆如是益信其為宋本無疑率作一律酬香嚴以志謝命王裝池與元抄為合璧所贈雖出自良友而工費幾及緡錢四五千為古書計所不惜矣𥙷綴之處有白紙者皆舊時填寫字跡其蠧蝕之餘悉以一色舊紙𥙷綴遇字畫欄格缺斷者倩澗薲以淡墨描寫至原刻原卬之糢糊缺失悉仍其舊誠慎之至也余思此書宋刻向藏書家無有是今所見雖藏殘本幸淂元抄相合差稱兩美貯諸讀未見書齊洵為未見之書矣因述其顛末如此嘉慶嵗在已未中夏九日棘人黃丕烈識附録贈周香嚴詩元抄藏自我宋刻贈由君兩美此時合一書何地分翻雕模舊印缺畫認遺文嗜同志相從廣見聞
