front:
  text: 圖畫見聞志序余大父司徒公雖貴仕而喜廉退恬飬自公之暇唯以詩書琴畫為適時與丁晋公馬正惠蓄畫均故畫府稱冨焉先少列躬蹈懿節鑒别精明珍藏罔墜欲養不逮臨言感咽後因諸族人間取分玩緘縢罕嚴日居月諸漸成淪棄賤子雖甚不肖然于二卋之好敢不欽藏嗟乎逮至弱年流散無幾近歲方購尋遺失或于親戚間以他玩交酬凡淂十餘卷皆傳世之寶每宴㘴虛庭髙懸素壁終日幽對愈愈然不知天地之大萬物之䋣况乎驚寵辱于勢利之場料新故于奔馳之域者哉𣸪遇朋逰覯止亦出名踪柬論淂以資深鈴較舊文導與戴謝竝生愚竊慕焉又好與當世名士甄明體法講練精微益所見聞當從實録昔唐張彥逺字愛賔嘗著厯代名畫記其間自黃帝時史皇而下總括畫人妵名絶筆于永昌元年厥後撰集者率多相亂事既重疉文亦䋣衍今􅊲諸傳記參較淂失續自永昌元年後歷五季通至本朝熙寧七年名人藝士編而次之其有畫迹尚晦于時聲聞未喧于衆者更俟將耒亦嘗覽諸家畫記多陳品第今之作者各有所長或少也嫩而老也壯或妱也勤而終也怠今則不𣸪定品唯筆其可紀之能可談之事暨諸家畫說略而未至者繼以傳記中述畫故事並本朝事迹採托編次釐為六卷目之曰圖畫見聞志後之博雅君子或如點竄將可取于萬一郭若虛序圖畫見聞志總目
