front:
  text: 圖畫見聞志卷第二
  hash: sha256:d8eaef298e74e0b036cd81b18418f7912e53282411ef4745722545bf8d536280
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0017_SBCK_002-1a}
body:
  text: 紀藝上唐會昌元年後盡五代凡一百一十六人唐末二十七人左全趙公祐趙溫其趙德齊范瓊陳皓彭堅常粲常重胤吕嶤竹䖍孫遇張詢張南本麻居禮張素卿陳若愚胡瓌子䖍荆浩刁光尹繼昭李洪度辛澄張騰張贊王浹五代九十一人于兢趙巖劉彥齊袁㠖羅塞翁東丹王胡擢胡翼王殷李羣燕筠杜霄李玄應弟審厲歸真李靄之韋道豐朱簡章王喬士鄭唐卿關同支仲元梅行思郭乾暉鍾隱郭權史瓊程凝王道古李坡唐垓王道求宋卓冨玫左禮張南王偉黃延浩張質韓求李祝張圖朱繇李升杜措杜子瓌杜洪義房從真宋藝髙道興阮知晦杜齯龜黃筌髙從遇阮惟德杜敬安黃居寶趙元德趙忠義蒲師訓蒲延昌張玫徐德昌周行通張玄孔嵩丘文播弟文曉趙才滕昌祐化中詔許王建于成都置生祠命德齊畫西平王儀仗車輅旌纛法物及朝真殿上畫后妃嬪御皆極精致昭宗喜之遷翰林待詔辛顯評溫其與德齊皆次公祐之品范瓊陳皓彭堅三人同時同藝名振三川大中初復興佛宇後三人分畫成都大慈聖夀聖興淨衆中興等五寺牆壁二百餘間各盡所藴淳化後兩遭兵火頗有毁廢矣􅉝顯云范為神品陳彭為妙品仁顯云范陳為妙品上彭為妙品嘗見文潞公家墳寺積慶院有移置壁畫婆叟仙一軀乃范瓊所作辛顯評為神品當矣常粲成都人工畫佛道人物善為上古衣冠咸通中路巖鎮蜀頗加禮遇有孔子問禮山陽七賢等圖并立釋迦女媧伏羲神農燧人等像傳于丗常重胤粲之子妙工寫貌僖宗朝為翰林供奉嘗寫僖宗御容及名臣真像得其神彩亦嘗于寶曆寺畫請塔天王至妙呂嶤竹䖍並長安人工畫佛道人物僖宗朝為翰林待詔廣明中扈從入蜀長安成都皆有畫壁孫遇自稱會稽山人志行孤潔情韻踈放廣明中避地入蜀遂居成都善畫人物龍水松石墨竹兼長天王鬼神筆力狂怪不以傳彩為功長安蜀川皆有畫壁實竒迹也初名位後改名遇亦有圖軸傳于丗仁顯評逸品張詢南海人避地居蜀善畫吳山楚岫枯松怪石中和間嘗于昭覺寺大悲堂後畫三壁山川一壁早景一壁午景一壁晚景謂之三時山人所稱異也亦有山水卷軸傳于丗張南本不知何許人工畫佛道鬼神兼精畫火嘗于成都金華寺大殿畫八明王時有一僧逰禮至寺整衣升殿驟覩炎炎之勢驚怛幾仆時孫遇畫水南本畫火水火之形本無㝎質惟于二子冠絶古今又嘗畫寶曆寺水陸功德曲盡其妙後來為人模寫竊換真迹鬻與荊湖商賈今所存者多是僞本别有勘書詩㑹髙麗王行香等圖傳于丗麻居禮蜀人師張南本光化天復間聲迹甚髙資簡卭蜀甚有其筆道士張素卿簡州人少孤貪落魄長依本郡三清觀項挂善畫道門尊像天帝星官形製竒古實天授之性也嘗于青城山丈人觀畫五嶽四瀆十二溪女等兼有老子過流沙并朝真圖八仙九曜十二真人等像博于丗道士陳若愚左蜀人師張素卿得其筆法成都精思觀有青龍白虎朱雀玄武四君像胡瓌范陽人工畫蕃馬雖繁冨細巧而用筆清徑至于穹廬什器射獵生死物靡不精竒凡畫駝馬騣凶鬯匕尾人衣毛毳以狼毫縛筆疏渲之取其纎健也有隂山七騎下程盜馬射鵰等圖傳于丗子䖍有父風荆浩河內人博雅好古善畫山水自撰山水訣一卷為友人表進祕在省閣常自稱洪谷子語人曰吳道子畫山水有筆而無墨項容有墨而無筆吾當采二子之所長成一家之體故關同北面事之有四時山水三峯桃源天台等圖傳于丗刁光胤長安人天復中避地入蜀工畫龍水竹石花鳥猫兔黃筌孔嵩皆門弟子嘗于大慈寺承天院內窗邉小壁四堵上畫四時花鳥體製精絶後黃居寀重裝飾之亦有圖軸傳于丗尹繼昭不知何許人工畫人物臺閣丗推絶格有移新豐阿房宫吳宫等圖傳于丗李洪度成都人工畫佛道人物名振當時成都大慈寺三學院等處有畫壁辛澄不知何許人成都大慈寺泗州堂有僧伽像及普賢閣下有五如來像張騰不知何許人工畫佛道雜畫描作布色頗窮其妙成都興聖寺有畫壁張贊河陽人工畫佛道人物洛中有寺壁王浹不知何許人工畫人物錢忠懿家有導引圖五代九十一人梁相國于兢善畫牡丹幼年從學因覩學舍前檻中牡丹盛開乃命筆倣之不浹旬奪真矣後遂酷思無倦動必增竒貴達之後非尊親旨命不復含毫有人贈詩曰看時人步澀展處蝶爭來有寫生全本折枝傳于世梁駙馬都尉趙巖善畫人馬挺然髙格非衆人所及有漢書西域傳骨貴馬小兒戲舞鍾馗彈棋診脉等圖傳于丗梁左千牛衛將軍劉彥齊善畫竹頗臻清致有風折竹孟宗泣竹湘妃等圖傳于世人物多假胡翼之手後唐侍衛親軍袁義河南登封人善畫魚謹密形以外得噞喁游泳之態有軸卷傳于世羅塞翁錢尚父時為吳從事錢塘令隱之善畫羊世罕有其迹唯餘杭陸家曾收一卷精妙卓絶後歸孫元􅒑家矣東丹王契丹天皇王之弟號人皇玉名突欲後唐長興二年投歸中國明宗賜妵李名贊華善畫本國人物鞍馬多寫貴人酋長胡服鞍勒率皆珍華而馬尚豐肥筆乏壯氣胡擢不知何許人善狀花鳥氣韻甚髙博學能詩飄然有物外之志常謂其弟曰吾思苦于三峽聞猿擢有三峽聞猿賦人多膾炙又常吟曰甕中每醖逍遙樂筆下閒偷造化功其髙情逸興如此有鸂鶒圖全株石榴四時翎毛折枝等傳于丗胡翼字鵬雲工畫佛道人物至于車馬樓臺無施而不妙趙巖都尉頗禮遇之常延䑒門館有秦樓吳宫盤車洗馬回紋豐稔等圖傳于丗時多求借自古名筆手自傳模裝成卷軸後題云安㝎鵬雲記王殷工畫佛道士女尤精外國人物與胡翼並為趙巖都尉所禮他人無及也有職貢逰春士女等圖并粉本佛像傳于丗李羣工畫人物為時所稱有玄中法師像孟說舉鼎赤松子八戒醉客等圖傳于丗燕筠工畫天王獨躋周昉之妙有卷軸傳于丗杜霄工畫士女冨于姿態妙得周昉之旨有鞦韆撲蝶吳王避暑等圖傳于丗李玄應洎弟審並工畫蕃馬專學胡瓌有放馬白本胡樂飲㑹弗林等圖傳于丗道士厲歸真異人也莫知其鄉里善畫牛虎兼工􅋧禽雀竹綽有竒思惟著一布裘入酒肆如家每有人問其所以輒大張口茹其拳而不言梁相召問云君有何道理歸真對曰衣單愛酒以酒禦寒用畫償酒此外無能梁祖然之嘗逰南昌信果觀有三官殿夾紵塑像乃唐明皇時所作體製妙絶常患雀鴿糞穢其上歸真乃畫一鷂于壁間自是雀鴿無復棲止有渡水牧牛牛虎鷂子柘竹野禽等圖傳于丗李靄之華隂人工畫山水寒林有江鄉之思鄴帥羅中令厚禮之為建一亭為援毫之所名金波亭時號金波李處士也有賣藥修琴歸山圖野人荷酒寒林并山水卷軸傳于丗韋道豐江夏人善畫寒林逸思竒僻不拘小節當代珍之請揖不暇然經歲月方成一圖成則驚人故丗罕有真迹朱簡章工畫人物屋木有禹治水神仙傳胡笳十八拍鳳樓十八怨烟波漁父等圖傳于丗王喬士工畫佛道人物尢愛畫地藏菩薩十王像凡有百餘本傳于丗鄭唐卿工畫人物兼長寫貌有梁祖名臣像并故事人物傳于丗關同一名穜又王文康家圖上題云童長安人工畫山水學從荆浩有出藍之美馳名當代無敢分庭敘論卷中具述有趙陽山居溪山晚霽四時山水桃源早行等圖傳于丗支仲元鳳翔人工畫人物有老子誡徐甲蕭翼賺籣亭商山四皓等圖傳于丗梅行思或云再思江夏人工畫鬪雞名聞天下最著者是陳康肅家籠雞一軸號為神絶兼工人物有十才子河嶽精靈集舉人過關謝女詠梅寇豹騎牛等圖傳于丗郭乾暉將軍北海人工畫鷙鳥雜禽疏篁槁木格律老徑巧變鋒出曠古未見其比有秋郊鷹雉并逐禽鷂子架上鷂子等圖傳于丗鍾隱天台上人工畫鷙禽竹木師郭乾暉深得其㫖乾暉始祕其筆法隱變姓名趨流陽之門服勤纍月乾暉不知其隱也隱一日緣興于壁上畫鷂子一隻人有報乾暉者乾暉亟就視之且驚曰子得非鍾隱乎隱再拜具道所以乾暉喜曰孺子可教也乃遇之文席以講畫道隱遂馳名海內焉兼工畫山水人物有鷹隼雜禽周處斬蛟山水等圖傳于丗郭權江南人師鍾隱亦有圖軸傳于丗史璚善畫雉兔竹石有雪景雉兔竹下引雛野雉等圖傳于世程凝善畫鸖竹兼長逺水有六鶴圖并折竹孤鶴湖灘逺水等圖傳于世王道古善畫雀竹有四時雀竹并引雛鬪雀等圖傳于世李坡南昌人唯善畫竹氣韻飄舉不事小巧有折竹風竹冒雪踈篁等圖傳于丗唐垓善畫野禽生菜水族諸物世稱精妙有柘棘野禽十種生菜魚蝦海物等圖傳于丗王道求工畫佛道鬼神人物畜獸始依周昉遺範後類盧楞伽之迹多畫鬼神及外國人物龍蛇畏獸當時名手推伏大相國寺有畫壁今多不存矣有十六羅漢挾鬼鍾馗佛林弟子等圖傳于丗宋卓工畫佛道志學吳筆不事傅彩有白畫菩薩粉本坐神等像傳于丗冨玫工畫佛道有彌勒內院圖白衣觀音文殊地藏慈恩法師等像傳于丗左禮張南並工畫佛道二人筆意不相逺有二十四化圖十六羅漢三官十真人等像傳于母王偉工畫佛道相國寺大殿等處舊有畫壁甚多今存者無幾黃延浩工畫人物有明皇吹玉笛五王同幄春園宴㑹乞巧等圖傳于丗張質工畫田家風物有村田鼓笛村社醉散踏歌等圖傳于丗韓求李祝並工佛道學吳生陜郊龍興寺有畫壁張圖河內雒陽人嘗事梁祖掌行軍糧籍故人呼為張將軍善潑墨山水兼長大像雒中廣愛寺有畫壁又嘗見寇忠愍家有釋迦像一鋪鋒鋩豪縱勢類草書實竒怪也朱繇長安人工畫佛道酷類吳生雒中廣愛寺有文殊普賢像長夀寺并河中府金真觀皆有畫壁李升成都人工畫蜀川山水始得唐張璪山水一軸凝玩數曰云未盡善也後遂心師造化意出前賢成都聖夀寺有畫壁多寫名山勝境仁顯云嘗于少監黃筌第見升山水圖乃知名實相稱也有武陵溪青城峨嵋二十四化等圖傳于丗蜀中多呼升為小李將軍小李將軍乃是思訓之子思訓乃林甫之伯官至左武衛大將軍子昭道為太子中舍父子俱善畫因父改人呼昭道為小李將軍也杜措成都人亦工畫山水多作老木懸崖回阿逺岫殊多雅思有秋日并州路詩意圖并山水卷軸傳于丗亦工佛像杜子瓌華陽人工畫佛道尤精傅彩調鉛殺粉别得其方嘗于成都龍華東禪院畫毗盧像坐赤圓光中碧蓮華上其圓光如𥘉出日輪破淡無迹人所不到也杜弘義蜀郡晋平人工畫佛道髙僧成都寶曆寺有文殊普賢并水陸功德房從真成都人工畫人物蕃馬事王蜀先主為翰林待詔嘗于蜀宫板障上畫諸葛武矦引兵渡瀘水人馬執戴生動如神蜀主每行至彼駐而不進怡然歎曰壯㦲甲馬兼善撥筆鬼神亦多寺壁有寧王射獵陳登斫鱠常建冒雪入京等圖傳于丗宋藝蜀郡人工寫貌事王蜀為翰林待詔嘗寫唐朝列聖及道士葉法善一行禪師沙門海㑹內臣髙力士等真于大慈寺髙道興成都人事王蜀為內圖畫庫使工佛道雜畫用筆神速觸類皆精蜀之寺觀尤多牆壁時人諺云髙君墜筆亦成畫阮知晦蜀郡人工畫貴戚子女兼長寫貌事王蜀為翰林待詔寫王先主真為首出杜齯龜其先本秦人避地居蜀博學強識工畫羅漢兼長寫貌始師常粲後自成一體事王蜀為翰林待詔成都大慈寺有畫壁黃筌字要叔成都人十七歲事王蜀後主為待詔至孟蜀加檢校少府監賜金紫後纍遷如京副使善畫花竹翎毛兼工佛道人物山川龍水全詼六法逺過三師花鳥師刁處士山水師李升人物龍水師孫遇也孟蜀後主廣政甲辰歲淮南馳聘副以六鶴蜀主遂命筌寫六鶴于便坐之殿因名六鶴殿蜀人自此方識真鶴六鶴集在故事抬遺卷中由是蜀之豪貴請于圖軸者接迹時人諺云黃筌畫鶴薛稷減價又畫四時花鳥于八卦殿鷹見畫雉連連掣臂遂命翰林學士歐陽炯作記又寫白兔于縑素蜀主常懸坐側有四時山水花竹雜禽鷙鳥狐兔人物龍水佛道天王山居詩意瀟湘八景等圖傳于丗髙從遇道興之子襲成父藝事孟蜀為翰林待詔曽于蜀宫大安樓下畫天王隊仗甚奇後遭兵火廢絶矣阮惟德知晦之子紹精父業事孟蜀為翰林待詔尤善狀宫闈禁苑皇妃帝戚富貴之事有宫中賞春公子夜宴按舞尉帛等圖傳于丗杜敬安齯龜之子繼父之美事孟蜀為翰林待詔尤能傅彩成都大慈寺與其父同畫列壁黃居寶字辭玉筌之次男也少聰警多能與其父同事蜀為待詔後纍遷水部員外郎亦工畫花鳥松石兼善八分年未四十而卒趙元德長安人天復中入蜀雜工佛道鬼神山水屋木偶唐季喪亂之際得隋唐名手畫樣百餘本故所學精博有漢髙祖過豐沛盤車講學豐稔圖傳于丗趙忠義元德之子事孟蜀為翰林待詔雖從父訓宛若生知蜀後主嘗令畫關將軍起玉泉寺圖作地架一座垂㭿曡栱向背無失蜀主命匠氏較之無一差者其精妙如此嘗與髙道興黃筌輩同畫成都寺壁甚多蒲師訓蜀人事孟蜀為翰林待詔師房從真嘗携畫詣從真從真髙蹈拊膺曰子之所得非吾所授也畫蜀中祠廟鬼神兵仗冠冕幢葆皆盡其美蒲延昌師訓之子與其父同時為孟蜀待詔工畫佛道鬼神外尤精獅子行筆徑利用色不繁張玫成都人事孟蜀為翰林祗候工畫人物士女兼長寫貌有門醉客按樂搗衣等圖及漢唐名臣像傳于丗徐德昌成都人事孟蜀為翰林祗候工畫人物士女墨彩輕媚為時所稱周行通成都人工畫鬼神人馬鷹犬嬰孩得其精要有李陵送蘇武支遁三雋奪馬等圖傳于丗張玄簡州金水石城山人善圖僧相畫羅漢名播天下稱金水張家羅漢也孔嵩蜀人善畫龍兼工蟬雀與黃筌並師刁處士成都廣福院壁有所畫龍及有蟬雀等圖傳于丗丘文播暨弟文曉廣漢人並工佛道人物兼善山水其品降髙趙輩成都并其鄉里頗有畫迹文播後改名潛趙才蜀人工畫鬼神人物亦長甲騎蜀川多有遺迹滕昌祐其先吳人避地居蜀工畫花鳥蟬蝶折枝生菜筆迹輕利傅彩鮮澤尤于畫鵝得名有四時花鳥魚龜猴兔及梅花鵝茴香下睡鵝又有羣鵝泛蓮沼等圖傳于丗兼善書大字蜀中寺觀牌額多昌祐書姜道隱漢州什邡人齓歲好畫有時終日不歸父母尋之多在佛廟神祠中畫壁下及長不事産業惟畫是好布衣芒屩隨身筆墨而巳嘗于淨衆寺方丈畫山水松石宋王庭隱贈之束縑道隱置于僧堂拂衣而去楊元真不知何許人工畫佛道善為曹筆尤精布色始居蜀後召入鄴中不回蜀川頗有畫迹董從晦成都人丗儒家心遊繪事佛道人物舉意皆精成都福感寺有畫壁張景思蜀人工畫佛道蜀中有畫壁跋異汧陽人工畫佛道鬼神洛中福先寺有畫壁其品次張圖也王仁夀汝南宛人工畫佛道鬼神兼長鞍馬始師王殷後學精吳法晋末為契丹所掠太祖受禪放還相國寺文殊院有淨土彌勒下生二壁淨土院有八菩薩像及有征遼獵渭等圖傳于丗衛賢京兆人事江南李後主為內供奉工畫人物臺閣初師尹繼昭後伏膺吳體張文懿家有春江釣叟圖上有李後主書漁父詞二首其一曰閬苑有意千重雪桃李無言一隊春一壷酒一竿鱗快活如儂有幾人其二曰一棹春風一葉舟一輪繭縷一輕鉤花滿渚酒盈甌萬頃波中得自由有望賢宫滕王閣盤車水磨等圖傳于丗朱悰不知何許人與衛賢並師尹繼昭而衛為髙足曹仲玄建康豐城人事江南李後主為翰林待詔工畫佛道鬼神始學吳不得意遂改迹細密自成一格尤于傳彩妙越等夷江左梵宇靈祠多有其迹陶守立池陽人江南李後主保大間應舉下第退居齊山以詩筆丹青自娛工畫佛道鬼神山川人物至于車馬臺閣筆無偏善嘗于九華草堂壁畫山程早行圖及建康清凉寺有海水李後主金山水閣有十六羅漢像皆振妙于時也竹夢松建康溧陽人事江南李後主為東川别駕工畫人物子女宫殿臺閣巧絶冠代丁謙晋陵義興人工畫竹兼善寫蔬果寇忠愍家有寫生葱一軸上有李後主題丁謙二字非凡格也此畫今歸王晋卿都尉家何遇江南人善畫林石屋木學慕衛賢深得其趣陸晃嘉禾人善畫田家人物意思疏野落筆成像不預構思故所傳卷軸或為絶品或為末品也施璘京兆藍田人工畫竹有生意禪月大師貫休㜈州蘭溪人道行文章外尤工小筆嘗覩所畫水墨羅漢云是休公入㝎觀羅漢真容後寫之故悉是梵相形骨古怪其真本在豫章西山雲堂院供養于今郡將迎請祈雨無不應驗休公有詩集行于丗兼善書謂之姜體以其俗姓姜也僧楚安蜀人善畫山水點綴甚細每畫一扇上安姑蘇臺或滕王閣千山萬水盡在目前今蜀中扇面印版是其遺範仁顯云筆蹤細碎全虧六法非大手髙格也僧傳古大師四明人善畫龍水得名于丗敘論卷中巳述皇建院有所畫屏風見存弟子嶽闍黎受學于師其品次之僧智藴河南人工畫佛像人物學深曹體雒中天宫寺講堂有毗盧像廣愛寺有㝎光佛福先寺有三災變相數壁周祖時進舞鍾馗圖賜紫衣僧德符善畫松柏氣韻蕭灑曽于相國寺灌頂院㕔壁畫一松一柏觀者如市賢士大夫留題凡百餘篇其為時推重如此巳上各有圖軸傳于丗圖畫見聞志卷第二
