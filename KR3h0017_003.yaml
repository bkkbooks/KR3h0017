front:
  text: 圖畫見聞志卷第三仁宗皇帝天資穎悟聖藝神竒遇興援毫超逾庶品伏聞齊國獻穆大長公主喪明之始上親畫龍樹菩薩命待詔傳模鏤
  hash: sha256:a65e12120a76b9648d50ce5162131c53cc5a28a833eb2e5138e02c4bf4177e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0017_SBCK_003-1a}
body:
  text: 板印施聖心仁孝又非愚臣所能稱頌若虗舊有家藏御畫御馬一匹其毛赭白玉銜勒上有宸翰題云慶曆四年七月十四日御畫兼有押字印寶後因伯父內藏借觀不日赴杭鈐之任既久假而不歸居無何伯父終于任所此寶遂歸伯母表兄張湍少列今不復可見為終身之痛兼曽見張文懿家有小猿一軸仍聞禁中有天王菩薩像太上遊心難可與臣下並列故尊之卷首紀藝中聖朝建隆元年後至熙寧七年總一百五十八人王公士大夫依仁遊藝臻乎徑極者一十三人燕恭肅王嘉王李後主燕肅武宗元劉永年郭忠恕王士元宋道宋迪文同郭元方董源燕恭肅王位尊磐石名重戚藩天縱多能精于像物嘗觀所畫鶴竹雪毛丹頂傳警露之姿翠葉霜筠盡含煙之態亦嘗自朽十六羅漢令蜀人尹質描染稜稜風骨類非常格所能及聞朱邸甚有遺迹丗罕得見皇弟嘉王維城茂美副茅土之強宗醴席餘休命毫煤而取適嘗觀所畫墨竹圖位置巧變理應天真作用縱橫功齊造化復愛狀蝦魚蒲藻筍籜蘆花雖居紫禁之嚴頗得滄洲之趣筆意超絶殆非學而知之者矣王尤精篆籀有盡六幅縑止書一字者筆力神俊可謂驚絶也江南後主李煜才識清贍書畫兼精嘗觀所畫林石飛鳥逺過常流髙出意外金陵王相家有雜禽花木李忠武家有竹枝圖皆稀丗之珍玩也其書名金錯刀燕肅字穆之其先燕薊人後徙家曹南位龍圖閣直學士以尚書禮部侍郎致仕文學治行外尤善畫山水寒林澄懷味象應會感神蹈摩詰之遐蹤追咸熙之懿範太常寺有所畫屏風玉堂刑部景寧坊居第暨許洛佛寺中皆有畫壁公以夀終于康㝎元年贈太尉公畫與所藏古筆僅百卷皆取入禁中故人間所傳圖軸幾希矣公凡􅊩州郡作刻漏法最精又嘗𬒳旨造指南車皆出竒思武宗元字總之河南白波人官至虞曹外郎善畫佛道人物筆術精髙曹吳具備嘗于雒都上清宫畫三十六天帝其間赤明陽和天帝潛寫太宗御容以趙氏火德王天下故也真宗祀汾隂還經雒都幸上清歷覽繪壁忽覩聖容驚曰此真先帝也遽命設几案焚香再拜且歎其畫筆之神佇立久之上清宮即唐玄元皇帝廟舊有吳道子畫五聖圖杜甫詩稱五聖聮龍衮千官列雁行是也後因廣增庭廡畫壁遂廢宗元復運神蹤髙紹前哲張文懿有詩云曽此焚香動至尊宗元又嘗于廣愛寺見吳生畫文殊普賢大像因杜絶人事旬餘刻意臨倣蹙成二小幀其骨法停分神觀氣格與夫天衣纓絡乘跨部從較之大像不差毫釐自非靈心妙悟感而遂通者孰能與于此哉許昌龍興寺北廊有帝釋梵王及經藏院有旃檀瑞像嵩嶽廟有出隊壁皆所竒絶也初名宗道後改名宗元以夀終于皇祐二年有佛像天王并九子母等傳于丗深州防禦使劉永年字君錫章獻明肅皇后之姪也才敏有神力兼于畫筆錯綜萬類非常格可擬郭忠恕字恕先洛陽人少能屬文七歲舉童子初周祖召為博士後因爭忿于朝堂貶崖州司戶秩滿去官不復仕縱放岐雍陕洛之間善畫屋木林石格非師授有設紈素求為圖畫者必怒而去乘興即自為之郭從義鎮岐下每延止山亭張素設粉墨于傍經數月忽乘醉就圖之一角作逺山數峯而已郭氏亦珍惜之岐有冨人主官酒酤其子喜畫日給醇酎設几案絹素及好紙數軸屢以情言忠恕俄取紙一軸凡數十畨首圖一丱角小童持線車紙窮處作風鳶中引一線長數丈冨家子不以為竒遂謝絶焉太宗素知其名召赴闕下授以國子監主簿忠恕益縱酒肆言時政得失頗有怨讟上惡之配流登州死于齊之臨邑道中尸解焉有屋木卷軸傳于丗忠恕尤精字學宋元獻嘗手校其佩觹三篇以寶玩之推官王士元仁夀之子也靈襟蕭爽畫法精髙人物師周昉山水學關同屋木類郭忠恕皆造其微嘗見張文懿家有雜木寒林髙丈餘風韻遒舉格致稀竒兼有伊尹負鼎鳳樓十八怨四時山水等傳于丗宋道字公達宋迪字復古洛陽人二難皆以進士擢第今並處名曹悉善畫山水寒林情致間雅體像雍容今時以為祕重矣然則友愛之談所冝推揖文同字與可􅎚潼永泰人今為司封員外郎祕閣校理善畫墨竹冨蕭灑之姿逼檀欒之秀疑風可動不筍而成者也復愛于素屏髙壁狀枯槎老枿風格簡重識者􅎇愛自賦一字至十字詩云竹竹森寒潔緑湘江邉渭水曲帷幔翠錦戈矛蒼玉虗心異衆草徑節逾凡木化龍杖入仙陂呼鳯律鳴神谷月娥巾帔淨冉冉風女笙竽清肅肅林間飲酒碎影搖金石上圍棊清隂覆局屈大夫逐去徒悅椒蘭陶先生歸來但尋松菊若檀欒之操則無敵于君圖蕭灑之姿亦莫賢于僕郭元方字子正京師人官至內殿承制善畫草蟲備究蜚蠉潛分造化冝矜妙藝藹播佳名然而著意者不及疏略蓋或點綴過當翻為失真也頗有圖軸傳于丗董源字叔達鍾陵人事南唐為後苑副使善畫山水水墨類王維著色如李思訓兼工畫牛虎肉肌豐混毛毳輕浮具吳精神脫略凡格有滄湖山水著色山水春澤牧牛牛虎等圖傳于丗髙尚其事以畫自娛者二人李成宋澥李成字咸熙其先唐宗室避地營丘因家焉祖父皆以儒學吏事聞于時至成志尚沖寂髙謝榮進博涉經史外尤善畫山水寒林神化精靈絶人逺甚敘論卷中巳述開寶中都下王公貴戚屢馳書延請成多不答學不為人自娛而巳後遊淮陽以疾終于乾德五年子覺尤以經術知名職踐館閣請恩幽閟贈光祿丞事見宋白所撰墓碣有煙嵐曉景風雨四時山水松柏寒林等圖傳于丗宋澥字則未聞長安人故樞密湜之弟司封道之從祖也姿度髙潔不樂從仕圖畫之外無所嬰心善畫山水林石凝神遐想與物冥通遇興登樓有時操筆故人間不多見其迹有煙嵐曉景奔灘怪石等圖傳于丗業于繪事馳名當代者一百四十六人人物山水花鳥雜畫分為四門人物門五十三人僧道并獨工傳寫者附王靄髙益王瓘孫夢卿趙光輔趙隱士孫知微勾龍爽李文才石恪袁仁厚趙長元王齊翰周文矩顧德謙郝處厲昭慶顧洪祝李雄侯翼髙文進王道真李用及李象坤髙懷節張昉髙元亨楊朏子圭王兼濟孫懷悅陳用智孟顯陳士元王拙王居正葉進成葉仁遇郝澄童仁益毛文昌南簡龍章子淵武洞清江惟清鍾文秀田景李元濟王易陳坦令宗李八師劉道士王靄京師人工畫佛道人物長于寫貌五代間以畫聞晉末與王仁夀皆為契丹所掠太祖受禪放還授圖畫院祗候遂使江表潛寫宋齊丘韓熙載林仁肇真稱旨改翰林待詔今㝎力院太祖御容梁祖真像皆靄筆也太祖御容潛龍日寫後改裝中央服矣又畫開寶寺文殊閣下天王及景德寺九曜院彌勒下生像最為竒出髙益涿郡人工畫佛道鬼神蕃漢人馬太祖朝潛歸京師始貨藥以自給每售藥必畫鬼神或犬馬于紙上藉藥與之由是稍稍知名時太宗在潛邸外戚孫氏喜畫孫氏有酒樓一日遇四老人飲酒有異疑其神仙因謂之四皓樓亦謂孫氏為孫四皓也因厚遇益請為圖畫未幾太宗龍飛孫氏以益所畫搜山圖進上遂授翰林待詔後𬒳旨畫大相國寺行廊阿育王等變相暨熾盛光九曜等有位置小本藏于內府後寺廊兩經廢置皆飭後輩名手依樣臨倣又畫崇夏寺大殿善神筆力絶人有南國鬪象衛士騎射蕃漢出獵等圖傳于丗王瓘河南雒陽人工畫佛道人物深得吳法丗謂之小吳生石中令嘗令畫雒中昭報寺壁及有佛道功德故事人物等圖傳于丗孫夢卿東平人工畫佛道人物亦專吳學尤長寺壁謂之孫脫壁嘗與王靄對畫開寶寺文殊閣下西北方毗樓博久天王像并大相國寺甚有其迹今多不存矣趙光輔華原人工畫佛道兼精蕃馬筆鋒徑利名刀頭燕尾太祖朝為圖畫院學生故鄉里呼為趙評事許昌開元龍興兩寺皆有畫壁浴室院地獄變尤佳有功德蕃馬等傳于丗隱士趙雲子善畫道像于青城丈人觀畫諸仙竒絶孫太古嘗隂使人問巳畫趙云孫畫雖善而傷豐滿乏清秀孫由是感悟孫知微字太古眉陽人精黃老學善佛道畫于成都夀寧院畫熾盛光九曜及諸墻壁時輩稱伏知微凡畫聖像必先齋戒疏瀹方始援毫有功德并故事人物傳于丗知微始畫夀寧九曜也令童仁益輩設色其水聖侍從有持水晶瓶者因增蓮花于瓶中知微既見愀然曰瓶所以鎮天下之水吾得之于道經今則奚以花為嗟乎畫蛇著足失之逺矣句龍爽蜀人國𥘉為翰林待詔工畫佛道人物善為古體衣冠精裁密緻亦一代之竒筆也有功德并故事人物傳于丗李文才華陽人工畫松石兼長寫貌事孟蜀為翰林待詔廣政中荆南髙王令人入蜀請文才寫義興門街雙筍石并其故事又嘗寫蜀主并名臣真像于大慈寺亦有圖軸傳于丗石恪蜀人性滑稽有口辨工畫佛道人物始師張南本後筆墨縱逸不專規矩蜀平至闕下嘗被旨畫相國寺壁授以畫院之職不􅈬堅請還蜀詔許之恪不樂都下風物頗有譏誚雜言或播人口有唐像五丁開山巨靈擘太華新羅人角力等圖傳于丗袁仁厚蜀人早師李文才乾德中至闕下未久還蜀因求得前賢畫樣十餘本持歸平居以畫自適終老鄉閭蜀川亦有遺迹趙長元蜀人工畫佛道人物兼工翎毛初隨蜀主至闕下隸尚方彩畫匠人因于禁中墻壁畫雉一隻上見之嘉賞尋補圖畫院祗候今東太一宮貴神像華嚴十六羅漢並長元筆王齊翰建康人事江南李後主為翰林待詔工畫佛道人物開寶末金陵城陷有步卒李貴入佛寺中得齊翰所畫羅漢十六軸尋為商賈劉元嗣以白金二百星購得之齎入京師于一僧處質錢後元嗣詣僧請贖其僧以過期拒之因成爭訟時太宗尹京督出其畫覽之嘉歎遂留畫厚賜而釋之經十六日太宗登極後名應運羅漢周文矩建康句容人事江南李後主為翰林待詔工畫人物車馬屋木山川尤精仕女大約體近周昉而更增纎麗有貴戚逰春搗衣尉帛繡女等圖傳于丗顧德謙建康人工畫人物風神清徑舉無與比李後主愛重之嘗謂曰古有凱之今有德謙二顧相望繼為畫絶矣識者以為知言呂文靖家有蕭翼説蘭亭故事橫卷青錦標飾碾玉軸頭實江南之舊物窺其風格可知非􅍝也郝處江南人工畫佛道鬼神兼長寫貌處本一商賈酷好圖畫因而家産蕩盡唯學畫耳厲昭慶建康豐城人工畫人物事江南為翰林待詔後隨李後主至闕下授圖畫院祗候顧洪祝不知何許人工畫人物傳其名而未見其迹李雄北海人工畫佛道偏長鬼神罕有倫比太宗朝為圖畫院祗候因忤旨遁去北海龍興寺有畫壁侯翼安㝎人工畫佛道人物夙振吳風窮乎奧旨長安洛汭寺壁尤多兼有三教聖像故事人物等圖傳于丗髙文進從遇之子工畫佛道曹吳兼備乾德乙丑歲蜀平至闕下時太宗在潛邸多訪求名藝文進遂往依後以攀附授翰林待詔未幾重修大相國寺命文進俲髙益舊本畫行廊變相及太一宮夀寧院啓聖院暨開寶塔下諸功德墻壁率皆稱旨又敕令訪求民間圖畫繼蒙恩將相國寺大殿後擎塔天王如出墻壁及殿西降魔變相其迹並存今畫院學者咸宗之然曽未得其倣佛耳王道真蜀郡新繁人工畫佛道人物兼長屋木太宗朝因髙文進薦引授圖畫院祗候嘗被旨畫相國寺并玉清昭應宫壁今相國寺殿東畫給孤獨長者買祇陀太子園因緣并殿西畫志公變十二面觀音像其迹並存李用及李象坤並工畫佛道人物尤精鬼神嘗與髙文進王道真同畫相國寺壁並為良手殿東畫牢度久鬪聖變相其迹見存髙懷節文進長子太宗朝為翰林待詔頗有父風嘗與其父同畫相國寺壁兼長屋木為人稱愛也張昉臨汝人工畫佛道人物筆專吳體嘗畫玉清昭應宫奏樂天女髙丈餘掇筆而成本郡開元寺有畫壁亦佳手也髙元亨京師人工畫佛道人物兼長屋木多狀京城市肆車馬有瓊林苑角抵夜市等圖傳于丗楊朏京師人後家泗上工畫佛道人物尤于觀音得名天下然而手足間時或小失停分蓋于骨法用筆跨邁倫輩是其小疵不足以纍大醇也亦愛畫西南夷人妙得其旨丗盛傳揚朏波斯子圭有父風王兼濟河南洛陽人工畫佛道鬼神洛中南宮有十太乙像嵩嶽廟有與武虞曹對畫墻壁武畫出隊兼濟畫入隊衆所播傳也孫懷悅安㝎靈臺人工畫佛道人物學吳生為得法雒中有寺壁陳用智頴川郾城人天聖中為圖畫院祗候未久罷歸鄉里工畫佛道人馬山川林木精詳巧贍難跨伊人但意務周勤格乏清致有功德蕃馬故事人物等圖傳于丗用智居小窯鎮多謂之小窯陳孟顯安化華池人工畫佛道鬼神人馬屋木大率作用氣格略與陳用智相似多謂之小孟亦云紅樓孟家陳士尢京師人善畫人物屋木有嘉慶圖故事人物傳于丗王拙河東郡人工畫佛道人物初畫玉清昭應宫壁選中右第一王居正拙之子善畫仕女酷學周昉精密有餘而氣韻不足葉進成江南人工畫人物嘗見楊褒虞曹家有醉道圖頗得閻令之體葉仁遇進成族弟工畫人物多狀江表市肆風俗田家人物郝澄金陵句容人工畫佛道鬼神學通相術精于傳寫巳上各有圖軸傳于丗童仁益蜀郡人工畫人物尊像出自天資不由師訓乃孫知微之亞也嘗畫青城山丈人觀諸仙淳化末仁益以成都天慶觀仙逰閣下舊有石恪畫左右龍虎君遂抒思援毫于天慶觀前亦畫龍虎君兩壁及畫大慈寺中佛殿漢明帝摩騰笁法三藏保福院畫首楞嚴二十五觀筆力徑健頗有圖軸傳于輦下好事者往往誤評為孫知微之筆也毛文昌蜀郡人工畫田家風物有江村晚釣村童入學郊居豐稔等圖傳于丗南簡平涼人工畫佛道人物丗傳其名未見其迹龍章京兆櫟陽人工畫佛道人物兼工傳寫尤善畫虎曽有貨藥人楊生檻中養一虎章因就視寫之故畫虎最臻形似子淵有父風武洞清工佛道人物特為精妙有雜功德十一曜二十八宿十二真人等像傳于丗鍾文秀京師人今為翰林待詔工畫佛道人物兼學關同山水亦得其法田景慶陽人工畫人物有竒思嘗得景一扇面畫三教作二童奕棊于僧前一則乘勝而矜誇一則敗北而悔沮僧臨視而笑瞻顧如生惜其孤貪聲聞不顯後之陳留不知所終李元濟太原人工畫佛道人物精于吳筆熙寧中召畫相國寺壁命官較㝎衆手時元濟藝與崔白為勍敵議者以元濟學遵師法不妄落筆遂推之為第一其間佛鋪多是元濟之筆也王易鄜州人亦工佛道人物學鄰元濟時同畫相國寺壁畫畢各歸鄉里都人稱伏之陳坦晉陽人工畫佛道人物都下奉先普安二佛剎尤多功德墻壁相國寺北廊髙僧乃坦所畫其于田家村落風景固為獨步有村醫村學田家娶婦村落祀神移居豐社等圖傳于丗僧令宗廣漢人工畫佛道人物成都大慈寺三學院并揭帝堂有畫壁道士李八師亡其名卭州依政人于本縣崇聖觀披挂工畫道門尊像青城山丈人觀亦有畫壁劉道士亡其名建康人工畫佛道鬼神落筆遒怪江南寺觀時見其迹尤愛畫甘露佛多傳于丗獨工傳寫者七人牟谷髙太沖尹質歐陽黌元靄維真何充牟谷不知何許人工相術善傳寫太宗朝為圖畫院祗候端拱𥘉詔令隨使者往交趾國寫安南王黎桓及諸陪臣真像留止數年既還屬宫車晏駕未蒙恩旨間居閶闔門外久之真宗幸建隆觀谷乃以所寫太宗御容張于戶內上見之敕中使收赴行在詰其所由谷具以實對上命釋之時太宗御容巳令無靄寫畢乃更令谷寫正面御容尋授翰林待詔能寫正面唯谷一人而巳髙太沖江南人工傳寫事李中主為翰林待詔嘗寫李中主真得其神思尹質蜀人工傳寫嘗寫燕王真頗蒙顧遇有藥王像孫思邈像并畫猴傳于丗歐陽黌京師人工傳寫宗侯貴戚多所延請其藝與僧維真相抗餘無出其右者僧元靄蜀人自幼入京依㝎力院輪公落髮妙工傳寫為太宗朝供奉一日在禁中傳寫為一小黃門毀辱遍問同列無肯言其姓名者乃草一頭子懷之見都知李神福訴以毀辱之事神福曰小底至多不得其名誰受其責靄乃探懷中所草頭子示之李一見嗟訝曰此鄧某也亡其名何其倉卒之間傳寫如此之妙因召鄧責誚伏過而去僧維真嘉禾人工傳寫嘗被旨寫仁宗英宗御容賞賚殊厚元靄之繼矣名公貴人多召致傳寫尤以善寫貴人得名何充姑蘇人工傳寫擅藝東南無出其右者圖畫見聞志卷第三此元人抄本圖畫見聞志三卷余向從東城故家收淂者也因其殘本未及列入甲等頃承周香嚴以殘宋刻本後三卷見遺與此適為合壁雖各自不全而元抄宋刻不皆古香馣靄令人珍惜無比乎因宋刻本與此長短不齊遂損此舊裝以期畫一上下方各以餘紙護之俾兩書原紙不傷而外觀整齊于古書舊裝名為損而實則益也己未五月蕘圃記
