front:
  text: 圗畫見聞志卷第六
  hash: sha256:c577595daa679dccea5398a1d61fbc5037a22b41bfbe68e3ec3e88b379727895
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0017_SBCK_006-1a}
body:
  text: 近事皇朝大遼孟蜀髙麗江南揔三十二事玉堂故事樞密楚公蘇氏圗畫王氏圗畫秋山圗恩賜种放卧雲圗覺稱畫慈氏像千角鹿圗訓鑒圗五客圗退思巖張氏圗畫丁晉公鬪牛畫玉畫義董羽壁沒骨圗孝嚴殿相國寺王舍城寺應天三絶八仙真鍾馗樣賞雪圗南莊圗李王印篆鋪殿花常思言髙麗圗術畫玉堂故事太祖平江表所得圗畫賜學士院𥘉有五十餘軸及景德咸平中只有雨村牧牛圗三軸無名氏寒蘆野鴈三軸徐熙筆五王飲酪圗二軸周文矩筆悉令重裝背焉玉堂後北壁兩堵董羽畫水正北一壁吳僧巨然畫山水皆有逺思一時絶筆也有二小壁畫松不知誰筆亦妙今並在焉樞密楚公江表用師之際故樞密使楚公適典維楊于時調發軍餉供濟甚廣上録其功將議進拜公自陳願寢爵賞聞李煜內庫所藏書畫甚冨輒祈恩賜上嘉其志遂以名筆僅百卷賜之往往有李主圗篆暨唐賢跋尾公薨後尋多散失其孫泰今為太常少卿刻意購求頗有所獲少卿乃余之祖舅如江都王馬韓晉公牛王摩詰輞川樣等常得觀焉蘇氏圗畫蘇大參雅好書畫風鑒明逹太平興國初江表平上以金陵六朝舊都復聞李氏精博好古藝士雲集首以公倅是邦因喻旨搜訪名賢書畫後果得千餘卷上進既稱旨乃以百卷賜之公後入拜翰林承旨啓沃之餘且復語及圗畫于時勑借數十品於私第未幾就賜焉至今蘇氏法書名畫最為盛矣公嘗奏對於便殿屢目畫屏其畫乃鍾隱畫鷹猴圗上知其意即時取以賜之余嘗於其孫之純處見之王氏圗畫王文獻家書畫繁冨其子貽正繼為好事嘗往來京雒間訪求名迹充牣巾衍太宗朝嘗表進所藏書畫十五卷尋降御扎云卿所進墨迹并古畫復遍看覽俱是妙筆除留墨迹五卷古畫三卷領得外其餘却還卿家付王貽正其餘者乃是王羲之墨迹晉朝名臣墨迹王徽之書唐閻立本畫老子西升經圗薛稷畫鶴凡七卷猶子渙遂得模詔扎刋於翠琰秋山圗太平興國中袐閣曝畫時陶榖為翰長因展秋山圗一面令黃居宷品第之居寀一見動容曰此圗實居寀與父筌奉孟主命同畫以答江南信弊絹縫中有居寀父子姓名視之果驗曾有人於向文簡家見十二幅圗花竹禽鳥泉石地形皆極精妙上題云如京副使臣黃筌等十三人合畫圗之角却有江南印記乃是孟氏贈李主之物也文簡薨其圗不知所在恩賜种放真宗祀汾隂還駐蹕華隂因登亭望蓮花峯忽憶种放居是山亟令中貴人裴愈召之時放稱疾不應召上笑而止因問愈曰放在家何為耶愈對曰臣到放所居時會放在草廳中看畫水牛二軸上顧謂侍臣曰此髙尚之士怡性之物也遂按行在所見扈從圗軸得四十餘卷盡令愈往賜之皆名縱古迹也放隱終南山豹林谷或居華山往來不常時方在華山也卧雪圗丁晉公典金陵陛辭之日真宗出八幅袁安卧雪圗一面其所畫人物車馬林石廬舍靡不臻極作從者苦寒之態意思如生旁題云臣黃居寀等定到神品上但不書盡人姓名亦莫識其誰筆也上宣諭晉公曰卿到金陵日可選一絶景處張此圗晉公至金陵乃於城之西北隅搆亭曰賞心危聳清曠勢出塵表遂施圗於巨屏到者莫不以此為佳觀歲月既久縑素不無敗裂由是往往為人刲竊後王君玉密學出典是邦素聞此圗甚竒下車之後首欲縱觀乃見竊以殆盡嗟惋久之乃詩於壁其警句云昔人巳化嘹天鶴往事難尋卧雪圗覺稱畫大中祥符𥘉有西域僧覺稱來館於興國寺之傳法院其僧通四十餘本經論年始四十餘歲丁晉公延見之嘉其敏惠後作聖德頌以上文理甚冨上問其所欲但云求金欄袈裟歸置金剛坐下尋詔尚方造以給之覺稱自言酤蘭左國人剎帝利性善畫嘗於譯堂北壁畫釋迦面與此方所畫絶異昔有𣑽僧帶過白㲲上本亦與尋常畫像不同蓋西國所稱髣佛其真今之儀相始自晉戴逵刻製𣑽像欲人生敬時頗有損益也慈氏像景祐中有畫僧曽於市中見舊功德一幅看之乃是慈氏菩薩像左邊一人執手爐裹幞頭衣中央服右邊一婦人捧花盤頂翠鳯寶冠衣珠絡泥金廣袖畫繪默識其立意非俗而畫法精髙遂以半千售之乃重加裝背持獻入內閻都知閻一見且驚曰執香爐者實章聖御像也捧花盤者章憲明肅皇太后真容也此功德乃髙文進所畫舊是章憲閣中別置小佛堂供飬每日凌晨焚香恭拜章憲歸天不意流落一至於此言訖於悒乃以束縑償之復增華其標軸即日進於澄神殿仁廟對之瞻慕戚容移刻方罷命藏之御府以白金二百星賜答之千角鹿圗皇朝與大遼國馳禮于今僅七十載繼好息民之美曠古未有慶曆中其主號興宗以五幅縑畫千角鹿圗為獻旁題年月日御畫上命張圗於太清樓下召近臣縱觀次日又敕中闈宣命婦觀之畢藏於天章閣訓鑒圗皇祐𥘉元上敕待詔髙克明等圗畫三朝盛德之事人物才及寸餘宫殿山川鑾輿儀衛咸備焉命學士李淑等編次序讃之凡一百事為十卷名三朝訓鑒圗圗成復令傳模鏤版印染頒賜大臣及近上宗室五客圗李文正嘗於私第之後園育五禽以寓目皆以客名之後命畫人寫以為圗鶴曰仙客孔雀曰南客鸚鵡曰隴客白鷴曰間客鷺鷥曰雪客各有詩篇題於圗上好事者傳寫之退思巖魯肅簡以孤直遇主公家之事知無不為每中書罷歸私宅別居一小齋圗繪山水題曰退思巖獨遊其間雖家人罕接焉張氏圗畫張侍郎去華典成都時尚存孟氏有國日屏扆圗障皆黃筌輩畫一日清河患其暗舊損破悉令換易遂命畫工別為新製以其換下屏面逮公帑所有舊圗呼牙儈髙評其直以自售一日之內獲黃筌等圗十餘面後二卿謝世頗有奉葬者其子師錫善畫好竒以其所存寶藏之師錫死復有葬者師錫子景伯亦工畫有髙鑒尚存餘蓄以自寶玩景伯死悉以葬焉丁晉公丁晉公家藏書畫甚盛南遷之日籍其財産有李成山水寒林共九十餘軸他皆稱是後悉分掌內府矣鬪牛畫馬正惠嘗得鬪水牛一軸云厲歸真畫甚愛之一日展曝於書室雙扉之外有輸租莊賔適立於砌下凝玩久之既而竊哂公於青瑣間見之呼問曰吾藏畫農夫安得觀而笑之有説則可無説則罪之莊賔曰某非知畫者但識真牛其鬪也尾夾於髀間雖壯夫旅力不可少開此畫牛尾舉起所以笑其失真愚謂雖畫者能之妙不及農夫見之專也擅藝者所冝博究玉畫義張文懿性喜書畫今古圗軸襞積繁夥銓量必當愛護尤勤每張畫必先施帟幕畫義以白玉為之其畫可知也董羽水玉堂北壁舊有董羽畫水二堵筆力遒徑勢若搖動其下一二尺頗有雨壞處蘇易簡為學士尤愛重之蘇適受詔知舉將入南宫囑於同院韓丕使召名筆完葺之蘇既去韓乃呼工之赤白者杇墁其半而用朱畫欄檻以承之蘇出見之悵恨纍日雖命水洗滌而痕迹至今尚存時人以蘇之鑒尚韓之純朴兩重焉沒骨圗李少保端願有圗一面畫芍藥五本云是聖善齊國獻穆大長公主房卧中物或云太宗賜文和其畫皆無筆墨惟用五彩布成旁題云翰林待詔臣黃居寀等定到上品徐崇嗣畫沒骨圗以其無筆墨骨氣而名之但取其濃麗生態以定品後因出示兩禁賔客蔡君謨乃命筆題云前世所畫皆以筆墨為上至崇嗣始用布彩逼真故趙昌輩俲之也愚謂崇嗣遇興偶有此作後來所畫未必皆廢筆墨且考之六法用筆為次至如趙昌亦非全無筆墨但多用定本臨模筆氣嬴懦惟尚傳彩之功也孝嚴殿治平甲辰歲於景靈宫建孝嚴殿奉安仁宗神御乃鳩集畫手畫諸屏扆墻壁先是三聖神御殿兩廊圗畫創業戡定之功及朝廷所行大禮次畫講肄文武之事遊豫宴饗之儀至是又兼畫應仁宗朝輔臣吕文靖巳下至節鉞凡七十二人時張龍圗燾主其事乃奏請於逐人家取影貌傳寫之鴛行序列歷歷可識其面於是觀者莫不歎其盛美相國寺治平乙巳歲雨患大相國寺以汴河勢髙溝渠失治寺庭四廊悉遭淹浸圯塌殆盡其牆壁皆髙文進等畫惟大殿東西走馬廊相對門廡不能為害東門之南王道真畫給孤獨長者買祗陀太子園因緣東門之北李用及與李象坤合畫牢度義鬪聖變相西門之南王道真畫志公變十二面觀音像西門之北髙文進畫大降魔變相今並存之皆竒迹也其餘四面廊壁皆重修復後集今時名手李元濟等用內府所藏副本小樣重臨倣者然其間作用各有新意焉王舍城寺魏之臨清縣東北隅有王舍城佛剎內東邊一殿極古四壁皆吳生畫禪宗故事其書不知誰人類禇河南循例接勞北使及使遼者過則縣大夫自請遊觀仍粉榜志使者姓名應天三絶唐僖宗幸蜀之秋有會稽山處士孫位扈從止成都位有道術兼工書畫曽於成都應天寺門左壁畫坐天王暨部從鬼神筆鋒狂縱形製詭異世莫之與比歷三十餘載未聞繼其髙躅至孟蜀時忽有匡山處士景煥一名朴善畫煥與翰林學士歐陽炯為忘形之友一日聮騎同遊應天適覩位所畫門之左壁天王激發髙興遂畫右壁天王以對之二藝爭鋒一時壯冠渤海歎重其能遂為長歌以美之繼有草書僧夢歸後至因請書於廊壁書畫歌行一日而就傾城士庶看之闐噎寺中成都人號為應天三絶也辛顯云景煥所畫不及孫位逺甚煥尤好畫龍有野人間話五卷行於世其間一篇惟敘畫龍之事八仙真道士張素卿神仙人也曽於青城山丈人觀畫五嶽四瀆真形并十二溪女數壁筆迹遒健神彩欲活見之者心悚神悸足不能進實畫之極致者也孟蜀後主數遣祕書少監黃筌令依樣摹之及下山終不相類後因蜀主誕日忽有人持素卿畫八仙真形以獻蜀主蜀主觀之且歎曰非神仙之能無以寫神仙之質遂厚賜以遣一日命翰林學士歐陽炯次第讃之復遣水部貟外郎黃居寶八分題之每觀其畫歎其筆迹之縱逸覽其讃賞其文詞之髙古玩其書愛其點畫之雄壯顧謂八仙不讓三絶八仙者李阿容成董仲舒張道陵嚴君平李八百長壽仙葛永瑰鍾馗樣昔吳道子畫鍾馗衣藍衫鞹一足眇一目腰笏巾首而蓬髮以左手捉鬼以右手抉其鬼目筆迹遒徑實繪事之絶格也有得之以獻蜀主者蜀主甚愛重之常挂卧內一日召黃筌令觀之筌一見稱其絶手蜀主因謂筌曰此鍾馗若用拇指搯其目則愈見有力試為我改之筌遂請歸私室數日看之不足乃别張絹素畫一鍾馗以拇指搯其鬼目翊日并吳本一時獻上蜀主問曰向止令卿改胡為别畫筌曰吳道子所畫鍾馗一身之力氣色眼貌俱在第二指不在拇指以故不敢輒改也臣今所畫雖不逮古人然一身之力併在拇指是敢别畫耳蜀主嗟賞之仍以錦帛鋈器旌其别識賞雪圗李中主保大五年元日大雪命太弟巳下登樓展宴咸命賦詩令中人就私第賜李建勳繼和是時建勳方會中書舍人徐鉉勤政學士張義方於溪亭即時和進乃召建勳鉉義方同入夜艾方散侍臣皆有興詠徐鉉為前後序仍集名手圗畫曲盡一時之妙真容髙沖古主之侍臣法部絲竹周文矩主之樓閣宫殿朱澄主之雪竹寒林董源主之池沼禽魚徐崇嗣主之圗成無非絶筆南莊圗李後主有國日嘗令周文矩畫南莊圗盡寫其山川氣象亭臺景物精思詳備殆為絶格開寶癸亥歲歸朝首貢於闕下籍之祕府李主印篆李後主才髙識博雅尚圗書蓄聚既豐尤精賞鑒今內府所有圗軸暨人家所得書畫多有印篆曰內殿圗書內合同印建業文房之寶內司文印集賢殿書院印集賢院御書印此印多用墨或親題畫人姓名或有押字或為歌詩雜言又有織成大回鸞小回鸞雲鶴練鵲墨錦褾飾今綾錦院俲此織作提頭多用織成縚帶簽貼多用黃經紙背後多書監裝背人姓名及所較品第又有澄心堂紙以供名人書畫鋪殿花江南徐熙輩有於雙縑幅素上畫叢艷疊石傍出藥苗雜以禽鳥蜂蟬之妙乃是供李主宫中挂設之具謂之鋪殿花次曰裝堂花意在位置端莊駢羅整肅多不取生意自然之態故觀者往往不甚采鑒常思言余熙寧辛亥冬𬒳命接勞北使為輔行日與其副燕人馬禋邢希古結駟並馳希古恭順詳敏有儒者之風從容語及圗畫且燕京有一布衣常其姓思言其名善畫山水林木求之者甚衆然必在渠樂與即為之既不可以利誘復不可以勢動此其所以難得也復見問曰南朝諸君子頗有好畫者否余答曰南朝士大夫自公之暇固有琴樽書畫之樂希古慨然嗟慕形乎神色愚以謂常生者擅藝居幽朔之間不𬒳中國之聲教果能不可以勢動復不可以利誘則斯人也豈易得哉髙麗國皇朝之盛遐荒九譯來庭者相屬於路惟髙麗國敦尚文雅漸染華風至於伎巧之精他國罕比固有丹青之妙錢忠懿家有著色山水四卷長安臨潼李虞曹家有本國八老圗二卷及曽於楊褒虞曹家見細布上畫行道天王皆有風格熙寧甲寅歲遣使金良鑒入貢訪求中國圗畫鋭意購求稍精者十無一二然猶費三百餘緡丙辰冬復遣使崔思訓入貢因將帶畫工數人奏請模寫相國寺壁畫歸國詔許之於是盡模之持歸其模畫人頗有精於工法者彼使人每至中國或用摺疊扇為私覿物其扇用鴉青𥿄為之上畫本國豪貴雜以婦人鞍馬或臨水為金砂灘暨蓮荷花木水禽之類點綴精巧又以銀埿為雲氣月色之狀極可愛謂之倭扇本出於倭國也近歲尤袐惜典客者蓋稀得之倭國乃日本國也本名倭既耻其名又自以在極東因號日本也今則臣屬髙麗也術畫夫士必以忠醇徑亮盡瘁於公然後可稱於任可爵於朝惡夫邪佞以苟進者則不免君子之誅藝必以妙悟精能取重於世然後可著於文可寶於笥惡失眩惑以沽名者則不免鑒士之棄昔者孟蜀有一術士稱善畫蜀主遂令於庭之東隅畫野鵲一隻俄有衆禽集而噪之次令黃筌於庭之西隅畫野鵲一隻則無有集禽之噪蜀主以故問筌對曰臣所畫者藝畫也彼所畫者術畫也是乃有噪禽之異蜀主然之國初有道士陸希真者每畫花一枝張於壁間則遊蜂立至向使邊黃徐趙輩措筆定無來蜂之驗此抑非眩惑取功沽名亂藝者乎至於野人騰壁美女下牆禁五彩於水中起雙龍於霧外皆出方術怪誕推之畫法闕如也故不録圗畫見聞志卷第六
