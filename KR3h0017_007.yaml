body:
  text: 跋是書前三卷爲元人手抄後三卷爲南宋陳道人書籍鋪刊本蕘翁先後得之遂成合璧今藏常熟瞿氏鐵琴銅劍樓瞿目謂以明翻宋陳道人刊本校元人所抄頗有不同如卷一次行題郭若虛撰又次爲敍論細目七行而陳本無之卷二李昇條注云蜀中多呼昇爲小李將軍小李將軍乃思訓之子陳本脫下小李將軍四字卷三文同條末有一字至十字詩陳本亦失載云云郭氏原序第十一行空缺三字以學津討源本覈之上下文字互異又永昌元年凡兩見皆不作會昌知非偶誤卷一論黃徐體異條刁處士名光下云下一字犯太祖廟諱則其所據之本亦必爲別一宋刻也卷六第十一葉描補七字第十三葉四十字均近下闌殆卽蕘翁所謂舊時塡寫者第十三葉第六行末夫字且誤作失蕘翁愛護此書愼之又愼今亦悉仍其舊猶蕘翁志也毛子晉稱若虛深鄙衆工而獨歸於軒冕巖穴爲是翁之卓識四庫總目又謂是書於一百五六十年中名人藝士流派本末頗稱賅備實視劉道醇畫評爲詳云云蓋其上繼彥遠下開鄧椿亦藝苑之功臣也崑山胡文楷
