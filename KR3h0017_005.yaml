front:
  text: 圗畫見聞志卷第五
  hash: sha256:551f9131a78840b47684e3490ba9464781f31cd0e6ca3d56681426e489939eff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0017_SBCK_005-1a}
body:
  text: 故事拾遺唐朝王蜀朱梁揔二十七事八駿圗謝元深滕王閻立本鶴畫吳道子金橋圗先天菩薩資聖寺淨城寺西明寺相藍十絶王維三花馬崔圎周昉張璪石橋圗桞公權會昌廢壁西園圗雪詩圗李益附鄭贊盧氏宅趙嵒劉彥齊常生八駿圗舊稱周穆王八駿日馳三萬里晉武帝時所得古本乃穆王時畫黃素上為之腐敗昏潰而骨氣宛在逸狀竒形實亦龍之類也遂令史道碩模寫之宋齊梁陳以為國寶隋文帝滅陳圗書散逸此畫為賀若弼所得齊王暕知而求得之答以駿馬四十蹄美錦五十假後復進獻煬帝至唐貞觀中勑借魏王泰因而傳模於世其一曰渠黃身青騣凶鬯匕尾赤項下至肚紅而蹄黑其二曰山子身紫騣凶鬯匕尾黑項下至肚紅而蹄黑其三曰盜驪身黃而黑班騣凶鬯匕尾黑項下至肚紅而蹄黑騣凶鬯匕鬛絶少也其四曰緑耳身青騣凶鬯匕尾黑而虬項下至肚紅而蹄黑其五曰赤驥身赤騣凶鬯匕尾赤而黃項下至肚紅而蹄黑其六曰騮身淺紫騣尾深紫而虬項下至肚紅而蹄黑音華其七曰踰輪身紫而帶黑騣凶鬯匕尾黑而虬項下至肚紅而蹄黑額上苦精騣向前尖而上卷其八曰白身青驄騣凶鬯匕尾紅項下至肚紅而蹄黑音義謝元深唐貞觀三年東蠻謝元深入朝冠烏熊皮冠以金絡額毛帔以韋為行縢著履中書侍郎顔師古奏言昔周武王治致太平逺國歸𣢾周史乃集其事為王會篇今聖德所及萬國來朝卉服鳥章俱集蠻邸實可圗寫貽于後以彰懷逺之德上從之乃命閻立德等圗畫之滕王唐滕王元嬰髙祖第二十二子也善畫蟬雀花卉而史傳不載惟張彥逺歷代名畫記中書之及覩王建宫詞云內中數日無宣喚傳得滕王蛺蝶圗乃知其善畫也閻立本唐閻立本至荆州觀張僧繇舊迹曰定虛得名耳明日又往曰猶是近代佳手明日往曰名下無虛士坐卧觀之留宿其下十餘日不能去又僧繇曽作醉僧圗傳於世長沙僧懷素有詩云人人送酒不曽沽終日松間繫一壺草聖欲成狂便發真堪畫入醉僧圗然道士每以此嘲僧群僧於是聚鏹數十萬求立本作醉道圗並傳於代鶴畫黃筌寫六鶴其一曰唳天舉首張喙而鳴其二曰警露回首引頸上望其三曰啄苔垂首下啄於地其四曰舞風乘風振翼而舞其五曰疏翎轉項毨其翎羽其六曰顧步行而回首下顧後輩丹青則而象之杜甫詩稱薛公十一鶴皆寫青田真恨不見十一之勢復何如也吳道子開元中將軍裴旻居喪詣吳道子請於東都天宫寺畫神鬼數壁以資冥助道子答曰吾畫筆久廢若將軍有意為吾纒結舞劒一曲庶因猛勵以通幽冥旻於是脫去縗服若常時裝束走馬如飛左旋右轉擲劒入雲髙數十丈若電光下射旻引手執鞘承之劒透室而入觀者數千人無不驚栗道子於是援毫圖壁颯然風起為天下之壯觀道子平生繪事得意無出於此金橋圗金橋圗者唐明皇封泰山回車駕次上黨潞之父老負簷壷漿逺近迎謁帝皆親加存問受其獻饋錫賚有差其間有先與帝相識者悉賜以酒食與之話舊故所過村部必令詢訪孤老喪疾之家加吊恤之父老欣欣然莫不瞻戴叩乞駐留焉及車駕過金橋橋在上黨御路縈轉上見數十里間旗纛鮮華羽衛齊肅顧左右曰張説言我勒兵三十萬旌旗徑千里挾右上黨至于太原見后土碑真才子也帝遂召吳道子韋無忝陳閎令同製金橋圗御容及帝所乘照夜白馬陳閎主之橋梁山水車輿人物草木鷙鳥器仗帷幕吳道子主之狗馬驢騾牛羊橐駝猴兔豬之屬韋無忝主之圗成時謂三絶焉先天菩薩有先天菩薩幀本起成都妙積寺唐開元𥘉有尼魏八師者常念大悲呪有雙流縣民劉乙小字意兒年十一歲自言欲事魏尼尼始不納遣亦不去常於奧室坐禪嘗白魏云先天菩薩見身此地遂篩灰於庭一夕有巨迹長數尺倫理成就意兒因謁畫工隨意設色悉不如意有僧法成者自云能畫意兒常合仰祝然後指授之僅十稔功方就後塑先天菩薩像二百四十二首首如塔勢分臂如蔓所畫樣凡十五卷有柳七師者崔寧之甥分三卷往上都流行時魏奉古為長史得其樣進之後因四月八日復賜髙力士今成都者是其次本資聖寺資聖寺中窗間吳道子畫髙僧韋述讃李嚴書中三門外兩面上層不知何人畫人物頗類閻筆寺西廊北隅楊坦畫近塔天女明睇將瞬團塔院北堂有鐡觀音髙三丈餘觀音院兩廊四十二賢聖韓幹畫元載讃東廊北壁散馬不意見者如將嘶蹀聖僧中龍樹啇郍和修絶妙團塔上菩薩李嗣真畫四面花鳥邊鸞畫當中藥上菩薩頂上茸葵尤佳塔中藏千部法華經詞人作諸畫聮句淨城寺淨城寺者本唐太穆皇后宅後捨為寺寺僧云三階院門外是神堯皇帝射孔雀處西禪院門外有遊目記碑云王昭隱畫門西裏面和修吉龍王有靈及門內西壁有畫光目藥義部落絶竒鬼首上蟠蛇可懼東廊有張璪畫林石險怪西廊萬菩薩院門裏南壁有皇甫軫畫鬼神及雕雕若脫壁軫與吳道子同時吳以其藝逼已募人刺殺之西明寺唐西明慈恩寺率多名賢書畫慈恩塔前壁上有畫濕耳師子跌心花為時所重聖善敬愛兩寺皆有古畫聖善寺木塔有鄭廣文書畫敬愛寺山亭院壁上有畫雉若真砂子上有時賢題名及詩什甚多相藍十絶大相國寺碑稱寺有十絶其一大殿內彌勒聖容唐中宗朝僧惠雲於安業寺鑄成光照天地為一絶其二睿宗皇帝親感夢於延和元年七月二十七日改故建國寺為大相國寺睿宗御書牌額為一絶其三匠人王溫重裝聖容金粉肉色并三門下善神一對為一絶其四佛殿內有吳道子畫文殊維摩像為一絶其五供奉李秀刻佛殿障日九間為一絶其六明皇天寶四載乙酉歲令匠人邊思順修建排雲寶閣為一絶其七閣內西頭有陳留郡長史乙速令孤為功德主時令石抱玉畫護國除災患變相為一絶其八西庫有明皇先勑車道政往于闐國傳北方毗沙門天王樣來至開元十三年封東嶽時令道政於此依樣畫天王像為一絶其九門下有瓌師畫𣑽王帝釋及東廊障日內畫法華經二十八品功德變相為一絶其十西庫北壁有僧智儼畫三乘因果入道位次圗為一絶也宋次道東京記亦載相國寺十絶乃是後來所見事迹此不具録王維唐王維右丞字摩詰少以詞學知名有髙致信佛理藍田南置别業以水木琴書自娛善畫山水人物筆蹤雅壯體涉古今嘗於清源寺壁畫輞川圗巖岫盤鬱雲水飛動自製詩曰當世謬詞客前身應畫師不能捨餘習偶𬒳時人知又嘗至招國坊庾敬休宅見屋壁有畫按樂圗維孰視而笑或問其故維答曰此所奏曲適到霓裳羽衣第三疊第一拍也好事者集樂工驗之無一差者三花馬唐開元天寶之間承平日久丗尚輕肥三花飾馬舊有家藏韓幹畫貴戚閲馬圗中有三花馬兼曽見蘇大參家有韓幹畫三花御馬晏元獻家張萱畫虢國出行圗中亦有三花馬三花者剪騣凶鬯匕為三辨白樂天詩云鳯箋書五色馬鬛剪三花崔圎唐安祿山之陷兩京也王維鄭虔張通皆處賊庭洎尅復之後朝廷未決其罪俱囚於楊國忠之舊第崔圎相國素好畫因召於私第令畫數壁當時皆以圎勳貴莫二望其救解故運思精深頗極能事後皆從寬典至於貶竄必獲善地周昉唐周昉善屬文窮丹青之妙多遊卿相間貴公子也兄皓善騎射隨哥舒翰征吐蕃收石堡城以功為執金吾德宗建章明寺召皓云聞卿弟善畫欲使之畫章明寺壁卿特為言之又經數月再召之昉乃就事落土之際土錐朽畫者也都人士庶觀者以萬數其間鑒别之士有稱其善者或指其瑕者昉隨日改定月餘是非語絶無不歎其神妙郭汾陽壻趙縱侍郎嘗令韓幹寫真衆稱其善後復請昉寫之二者皆有能名汾陽嘗以二畫張於坐側未能定其優劣一日趙夫人歸寧汾陽問曰此畫誰也云趙郎也復曰何者最似云二畫皆似後畫者為佳蓋前畫者空得趙郎狀貌後畫者兼得趙郎情性笑言之姿爾後畫者乃昉也汾陽喜曰今日乃決二子之勝負於是令送錦綵數百匹以酬之昉平生畫牆壁卷軸甚多貞元間新羅人以善價收置數十卷持歸本國張璪唐張璪貟外畫山水松石名重於世尤於畫松特出意象能手握雙管一時齊下一為生枝一為枯幹勢凌風雨氣傲煙霞分鬱茂之榮柯對輪囷之老枿經營兩足氣韻雙髙此其所以為異也璪嘗撰繪境一篇言畫之要訣初畢宏庶子擅名於代一見璪畫驚歎之璪又有用秃筆或以手模絹素而成畫者因問璪所授璪曰外師造化中得心源畢君於是閣筆建中末曽於長安平康里張氏第畫八幅山水障破墨未了值朱泚之亂京城搔動璪亦登時逃去其家人見在楨蒼忙掣落此障最見璪用思處又有一士人家曽請璪畫林石一障士人云亡有兵部李約貟外好畫成癖知而購之其家弱妻巳練為衣裏矣惟得兩幅雙柏一石在焉李嗟惋久之作練檜記述張畫意詞多不載自具李約文集石橋圗保壽寺本髙力士宅天寶九載捨為寺初鑄鐘成力士設齋慶之舉朝畢至一擊百千有規其意連擊二十杵者其經藏閣規模危巧兩塔上火珠受十餘斛文宗朝有河陽從事李涿者性好竒古與寺僧善嘗與之同觀寺庫中舊物忽於破甕內得物如𬒳幅裂汙坌觸而塵起涿徐視之乃畫也因以州縣圗三及絹三十匹換之令家人裝治幅長丈餘因持訪於常侍栁公權乃知張萱所畫石橋圗明皇賜力士因留寺中也後為鬻畫人宗牧言於左軍忽一日有中使至涿第宣勑取之即時進入禁中帝好古見之大恱命張於雲韶院柳公權唐柳公權名節文行著在簡䇿志耽書學不能治生為勳戚家碑版問遺歲時巨萬多為主藏者海鷗龍安所竊别貯酒器杯盂一笥緘滕如故其器皆亡訊海鷗乃曰不測其亡公權哂曰銀杯羽化耳不復更言所寶惟筆硯圗書自扄鐍之會昌廢壁唐李德𥙿鎮浙西日於潤州建功德佛宇曰甘露寺當會昌廢毀之際奏請獨存因盡取管內廢寺中名賢畫壁置之甘露乃晉顧凱之戴安道宋謝靈運陸探微梁張僧繇隋展子虔唐韓幹吳道子畫又成都靜德精舍有薛稷畫雜人物鳥獸二壁有胡氏亡其名嗜古好竒惜少保之迹將廢乃募壯夫操斤力剟於頽坌之際得像三十七首馬八蹄又於福聖寺得展子虔天樂部二十五身悉陷於屋壁號寶墨亭司門外郎郭圎作記自是長者之車益滿其門矣西園圗清夜遊西園圗者晉顧長康所畫有梁朝諸王跋尾處云圗上若干人並食天厨唐貞觀中禇河南裝背題處具在其圗本張維素物傳至相國張弘靖家弘靖元和中忽奉詔取之是時并鍾元常書道德經一部同進入內後中貴人崔談峻自禁中將出復流落人間有張維素子周封涇州從事帙滿居京一日有人將此圗求售周封驚異之遽以絹數匹易得經年忽聞𣢾門甚急問之見數人同稱仇中尉願以三百素易公清夜遊西園圗周封憚其迫脅遽以圗授之翊日果齎絹至後方知其偽乃是一豪士求江淮大鹽院時王涯判鹽鐡酷好書畫謂此人曰為余訪得清夜遊西園圗當遂公所請因為計取之耳及十家事起後流落一粉鋪家未幾為郭承嘏侍郎閽者以錢三百市之以獻郭公郭公卒又流傳至令狐相家一日宣宗問相國有何名畫相國具以圗對既而復進入內雪詩圗李益附唐鄭谷有雪詩云亂飄僧舍茶煙濕密灑歌樓酒力微江上晚來堪畫處漁人披得一簔歸時人多傳誦之假贊善善畫歷代名畫記中有假去惑豈非宫贊因採其詩意景物圗寫之曲盡蕭灑之思持以贈谷谷珍領之復為詩寄謝云贊善賢相後家藏名畫多留心於繪素得事在煙波屬興同吟詠功成更琢磨愛余風雪句幽絶寫漁蓑李益者肅宗朝宰相揆之族子登進士第有才思長於歌詩有征人歌早行篇好事者盡圗寫為屏障如回樂峯前沙似雪受降城外月如霜之句是也鄭贊唐外郎滎陽鄭贊宰萬年日有以賊名而荷校者贊命取所盜以視則煙晦古絲三四幅齊罽裁褾班鼊皮軸之曰是畫也太尉李公所寶惜有贊皇圗篆存焉當時人以七萬購獻於李公者遂得渠橫梁倅職後因出妓復落民間今幸其妓人不鑒以卑價市之後妓人自他所得知其本直因歸訴請以所虧價書罪贊不得決時延壽里有水墨李處士以精别畫品遊公卿門召使辨之李瞪目三歎曰韓展之上品也雖黃沙之情巳具而丹筆之斷尚疑會有賫籍自禁軍來認者贊以且異姦盜非願荷留因并畫桎送之後永亡其耗盧氏宅唐德州刺史王倚家有筆一管稍麁於常用筆管兩頭各出半寸巳來中間刻徙軍行一鋪人馬毛髮亭臺逺水無不精絶每一事刻從軍行詩兩句若庭前琪樹巳堪攀塞外征人殊未還是也似非人功其畫迹若粉描向明方可辨之云用鼠牙雕刻故崔鋋郎中文集有王氏筆管記體類韓退之記畫倚之子紹孫博雅好古善琴阮其所居乃盧氏舊宅在洛中歸德坊南街廳屋是杏木梁西壁有韋旻郎中畫散馬七匹東壁有張長史草書數行長史世號張顚宅之東果園兩京新記所載是馬周舊宅趙嵒梁駙馬都尉趙嵒酷好繪事兼間小筆偶唐末亂世獨推至鑒人有鬻畫者則必以善價售之不較其多少繇是四逺向風抱畫者歲無虛日復以親貴擅權凡所依附率多以法書名畫為贄故畫府祕藏圗軸僅五千餘卷時稱盛焉暇日亦多自倣前賢名迹動成卷軸每延致藝士輻湊門館各取其所長而厚遇之然多不逮已也亦未始面加雌黃荒淺甚者自慙而退食客常至百餘人其間亦多琴棊道術髙雅之流時衣冠士族尚有唐之遺風也以畫見留者惟胡翼王殷二人而巳嘗令胡翼品第畫府之優劣中品已下或有未至者即指示令醫去其病或用水刷或以粉塗有經數次方合其意者時人謂之趙家畫選場其精别如此愚謂天水用適一時之意則巳果然數以粉塗水洗則成何畫也劉彥齊梁千牛衛將軍劉彥齊善畫竹為時所稱世族豪右袐藏書畫雖不及天水之盛然好重鑒别可與之爭衡矣本借貴人家圗畫臧賂掌畫人私出之手自傳模其間用舊褾軸裝治還偽而留真者有之矣其所藏名迹不啻千卷每暑伏曬曝一一親自卷舒終日不倦能自品藻無非精當故當時識者皆謂唐朝吳道子手梁朝劉彥齊眼也常生王先主既下蜀城謁僖宗御容于時繪壁百僚咸在惟不見田令孜陳太師因問何不寫貌彼二人左右對以近方塗滅先主曰不然吾與陳田本無讎恨圗霸之道披此血刃豈與丹青為參啇乎遽命工重寫之待詔常生名重胤曰不必援毫乃挼皂莢水洗壁而風姿宛然先主嘉賞之賜以金帛也常生傳神素號絶手自云我畫壁除摧圯拓爛外雨淋水洗斷無剝落先是詩僧貫休能畫謂常生曰貧道觀畫多矣如吾子所畫前無來人後無繼者其見賞如此圗畫見聞志卷第五
