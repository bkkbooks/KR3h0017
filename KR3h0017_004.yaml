front:
  text: 圖畫見聞志第四
  hash: sha256:0612934bfeb472bec4263ebe1a1c22dd412fbdc22e2fa2745f3aa395b5c1b57d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0017_SBCK_004-1a}
body:
  text: 紀藝下山水門凡二十四人僧附范寬劉永王端翟院深燕貴許道寧紀真黃懷玉啇訓丘訥龐崇穆李隱髙克明屈鼎郝鋭梁忠信李宗成郭熙董贇侯封符道隱擇仁巨然繼肇范寬字中立華原人工畫山水理通神會竒能絶世體與關李特異而格律相抗叙論卷中巳述寬儀狀峭古進止踈野性嗜酒好道嘗往來雍雒間天聖中猶在耆舊多識之有冒雪髙峯四時山水并故事人物傳於世或云名中立以其性寬故人呼為范寬也劉永京師人工畫山水始師僧德符畫松石後遍求諸家山水採其所長而效之及見荆浩之迹乃知諸家有所未盡一日復覩關同畫俄歎曰是乃得名至藝者乎向所謂登東山而小魯遂捐棄餘學專法關氏果遂升堂馳名當代矣有瀑泉屏風四時山水山居詩意等圗傳於世王端字子正瓘之子工畫山水專學關同得其要者惟劉永與端耳相國寺淨土院舊有畫壁惜乎主僧不鑒遂至杇墁端雖以山水著名然於佛道人馬自為絶格兼善傳寫嘗寫真廟御容稱旨授三班奉職有佛道功德故事人物四時山水傳於世翟院深北海人工畫山水學李光丞院深少為本郡伶官一日府會院深擊鼓忘其節奏部長按舉其罪太守面詰之院深乃曰院深雖賤品天與之性好畫山水向擊鼓次偶見雲聳竒峯堪為畫範難明兩視忽亂五聲太守嘉而釋之院深學李光丞為酷似但自創意者覺其格下專臨模者往往亂真燕貴本隸尺籍工畫山水不專師法自立一家規範大中祥符𥘉建玉清昭應宫貴預役焉偶暇日畫山水一幅人有告董役劉都知者因奏𥙷圗畫院祗候實精品也吕文靖宅㕔後屏風乃貴所畫亦有圗軸傳於丗許道寧長安人工畫山水學李光丞始尚矜謹老年唯以筆畫簡快為已任故峯巒峭拔林木徑硬別成一家體故張文懿贈詩曰李成謝丗范寬死唯有長安許道寧非過言也長安凉榭中寫終南太華二壁今存有山水寒林臨深履薄早行詩意潘閬倒騎驢等圗傳於丗紀真黃懷玉並工畫山水學范寬逼真商訓工畫山水亦學寬但皴淡山石圗寫林木皆不及紀與黃也丘訥河南雒陽人工畫山水體近許道寧筆氣不逮而用墨過之龐崇穆右北平人工畫山水始建玉清昭應宮召崇穆畫山水數壁能為群峯列岫雲煙聚散之象功畢上欲旌以畫院之職乃遁去不仕李隱五原人工畫山水大中祥符末營會靈觀命隱寫五嶽山形於壁及畫山水於五殿屏扆觀其危峯疊嶂逺水踈林可謂盡美矣然而鈎描筆困槍上聲淡墨焦斯為未至爾髙克明京師人仁宗朝為翰林待詔工畫山水採擷諸家之美參成一藝之精團扇卧屏尤長小景但矜其巧密殊乏飄逸之妙屈鼎京師人仁宗朝為圗畫院祗候工畫山水得燕貴之倣佛龐相第屏風乃鼎所畫郝鋭不知何許人工畫山水人或稱之而未見其迹梁忠信京師人仁宗朝為圗畫院祗候工畫山水體近髙克明而筆墨差嫩又寺宇過盛棧道兼繁人或譏之也恐其亂髙故顯出之以上各有圗軸傳於丗李宗成鄜畤人工畫山水寒林學李成破墨潤媚取象幽竒林麓江臯尤為盡善樞府東㕔有大濺撲屏風乃宗成所畫石上有崔慤畫鷺鷥一隻有風雨江山拜月圗四時山水松柏寒林等傳於世郭熙河陽溫人今為御書院藝學工畫山水寒林施為巧贍位置淵深雖復學慕營丘亦能自放胸臆巨障髙壁多多益壯今之世為獨絶矣熙寧初勑畫小殿屏風熙畫中扇李宗成符道隱畫兩側扇各盡所藴然符生鼎立於郭李之間為幸矣董贇頴川長社人工畫山水寒林學志精勤毫鋒老硬但器類近俗格致非髙侯封邠人今為圗畫院學生工畫山水寒林始學許道寧不能踐其老格然而筆墨調潤自成一體亦郭熙之亞符道隱長安人工畫山水寒林學無師法多從已見當其合作亦有可觀永嘉僧擇仁善畫松初採諸家所長而學之後夢吞數百條龍遂臻神妙性嗜酒每醉揮墨於綃紈粉堵之上醒乃添𥙷千形萬狀極於竒怪曽飲酒永嘉市醉甚顧新泥壁取拭盤巾濡墨灑其上明日少增修為狂枝枯枿畫者皆伏其神筆鍾陵僧巨然工畫山水筆墨秀潤善為煙嵐氣象山川髙曠之景但林木非其所長隨李主至闕下學士院有畫壁兼有圗軸傳於世吳僧繼肇工畫山水與巨然同時體雖相類而峯巒稍薄怯也相國寺資聖閣院有所畫屏風花鳥門凡二十九人僧道附黃居寀劉贊夏侯延祐丘慶餘髙懷寶徐熙徐崇矩徐崇嗣唐希雅唐宿唐忠祚解處中祁序陶裔母咸之傳文用劉夢松劉文惠李符李懷衮王曉趙昌王友鐔宏易元吉崔白崔慤艾宣李吉侯文慶董祥葛守昌李祐丁貺閻士安居寧慧崇何尊師牛戩黃居寀字伯鸞筌之季子也工畫花竹翎毛默契天真冥周物理叙論卷中巳述始事孟蜀為翰林待詔與父筌俱蒙恩遇圗畫殿庭牆壁宫闈屏障不可勝紀學士徐光溥嘗獻秋山圗歌以美之曽於彭州棲真觀壁畫水石一堵自未至酉而畢觀者莫不歎其神速且妙也乾德乙丑歲隨蜀主至闕下太祖舊知其名尋真命太宗皇帝尤加眷遇供進圗畫恩寵優異仍委之搜訪名蹤銓定品目居寀狀太湖石尤過乃父有四時山景花竹翎毛鷹鶻犬兔湖灘水石春田放牧等圗傳於世劉贊蜀人工畫花竹翎毛兼長龍水迹意兼美名播蜀川夏侯延祐蜀郡人工畫花竹翎毛師黃筌粗得其要始事孟蜀為翰林待詔既歸朝拜真命為圗畫院藝學各有圗軸傳於世丘慶餘潛之子工畫花竹翎毛兼長草蟲墨彩俱媚風韻尤髙有四時花鳥蜂蟬竹枝等傳於世髙懷寶懷節之弟工畫花竹翎毛草蟲𬞞果頗臻精妙與兄懷節同時入仕為圗畫院祗候髙氏自道興至二子凡四世皆以畫進雖曰藝成然而不墜家聲賞延於世可佳矣徐熙鍾陵人世為江南仕族熙識度間放以髙雅自任善畫花木禽魚蟬蝶𬞞果學窮造化意出古今叙論卷中巳述徐鉉云落墨為格雜彩副之迹與色不相隱映也又熙自撰翠微堂記云落筆之際未嘗以傅色暈淡細碎為功此真無愧於前賢之作當時巳為難得李後主愛重其迹開寶末歸朝悉貢上宸廷藏之祕府亦有寒蘆野鴨花竹雜禽魚蟹草蟲𬞞苗果蓏并四時折枝等圗傳於世徐崇矩徐崇嗣並熙之孫善繼先志克著佳聲唐希雅嘉興人妙於畫竹兼工翎毛始學李後主金錯刀書遂緣興入於畫故為竹木多顫掣之筆蕭踈氣韻無謝東海矣徐鉉云翎毛粗成而巳精神過之唐宿唐忠祚並希雅之孫夙擅家聲皆躋妙格解處中江南人事李後主為翰林司藝特於畫竹盡嬋姢之妙但間泊翎毛頗虧形似耳祁序江南人工畫花竹翎毛兼長水牛鬱有髙致也陶裔京兆鄠人工畫花竹翎毛形製設色亞於黃筌真宗朝為圗畫院祗候祥符中畫御座屏扆稱㫖尋改翰林待詔母咸之江南人工畫朝雞妙冠一時傳文用京師人工畫花竹翎毛有黃氏之風特精野雉鵪鶉能辨四時毛彩劉夢松江南人善畫水墨花鳥隨冝取象如施衆形劉文惠不知何許人善畫花竹翎毛傳彩雖勤而氣格傷懦李符襄陽人工畫花竹翎毛倣佛黃體而丹青雅淡別是一種風格然於翎毛骨氣間有得失耳李懷衮蜀郡人工畫花竹翎毛學黃氏與夏侯延祐不相上下今陳康肅第屏風乃懷衮所畫王曉魯郡泗水人善畫鷹鷂柘棘師郭乾暉而遊其藩趙昌字昌之廣漢人工畫花果其名最著然則生意未許全株折枝多從定本惟於傳彩曠代無雙古所謂失於妙而後精者也昌兼畫草蟲皆云盡善茍圗禽石咸謂非精昌家冨晚年復自購己畫故近世尤為難得王友漢州人少隸本郡克寧軍籍工畫花果師趙昌為髙足雖窮傳彩之功終乏潤澤之妙鐔宏成都人工畫花果復師王友𥘉云齒教後即肩隨矣以上各有圗軸傳於世易元吉字慶之長沙人靈機深敏畫製優長花鳥蜂蟬動臻精奧始以花果專門及見趙昌之迹乃歎服焉後志欲以古人所未到者馳其名遂寫獐猿嘗遊荆湖間入萬守山百餘里以覘猿狖獐鹿之屬逮諸林石景物一一心傳足記得天性野逸之姿寓宿山家動經纍月其欣愛勤篤如此又嘗於長沙所居舍後疏鑿池沼間以亂石叢花踈篁折葦其間多蓄諸水禽每穴窗伺其動靜遊息之態以資畫筆之妙治平甲辰歲景靈宫建孝嚴殿乃召元吉畫迎釐齊殿御扆其中扇畫太湖石仍寫都下有名鵓鴿及雒中名花其兩側扇畫孔雀又於神遊殿之小屏畫牙獐皆極其思元吉始蒙其召也欣然聞命謂所親曰吾平生至藝於是有所顯發矣未幾果勑令就開先殿之西廡張素畫百猿圗命近要中貴人領其事仍先給粉墨之資二百千畫猿才十餘枚感時疾而卒元吉平日作畫格實不群意有踈密雖不全拘師法而能伏義古人是乃超忽時流周旋善譽也尚使元吉卒就百猿當有遇於人主然而遽喪其命矣夫有獐猿孔雀四時花鳥寫生𬞞果等傳於丗建隆觀翊教院殿東獐猿林石絶佳又嘗於餘杭後市都監㕔屏風上畫鷂子一隻舊有燕二巢自此不復來止崔白字子西濠梁人工畫花竹翎毛體製清贍作用疏通雖以敗荷鳬鴈得名然於佛道鬼神山林人獸無不精絶凡臨素多不用杇復能不假直尺界筆為長絃挺刃熙寧𥘉命白與艾宣丁貺葛守昌畫垂拱殿御扆鶴竹各一扇而白為首出後恩𥙷圗畫院藝學白自以性踈闊度不能執事固辭之于時上命特免雷同差遣非御前有㫖母召凡直授聖㫖不經有司者謂之御前祗應出於異恩也然白之才格有邁前修但過恃主知不能無纇相國寺廊之東壁有熾盛光十一曜坐神等廊之西壁有佛一鋪圎光透徹筆勢欲動北都大安寺許昌湖亭皆有畫壁及嘗見敗荷雪鴈四時花鳥謝安登山子猷訪戴等圗多遇合作崔慤字子中白之弟也今為左廷直工畫花竹翎毛狀物布景與白相類嘗觀敗荷雪鴈及四時花竹風範清懿動多新巧有時作隔蘆睡鴈尤多意思艾宣鍾陵人工畫花竹翎毛孤標髙致别是風規敗草荒榛尤長野趣鵪鶉一種特見精絶李吉京師人嘗為圗畫院藝學工畫花竹翎毛學黃氏為有功後來院體未有繼者侯文慶京師人今為翰林待詔工畫草蟲及寫𬞞菜體尚精謹殊乏生氣董祥京師人今為翰林待詔工畫花木有琉璃瓶中雜花折枝人多愛之葛守昌京師人今為圗畫院祗候工畫花竹翎毛兼長草蟲𬞞菜李祐河內人丁貺濠梁人皆工畫花竹翎毛各有所長求之才格難乎其人也閻士安陳州宛丘人以醫術為助教工畫墨竹筆力老徑名著當時每於大卷髙壁為不盡景或為風勢甚有意趣復愛作墨蟹蒲藻等間而成為人所重也僧居寧毗陵人妙工草蟲其名藉甚嘗見水墨草蟲有長四五寸者題云居寧醉筆雖傷大而失真然則筆力徑俊可謂稀竒梅聖俞贈詩云草根有纎意醉墨得已熟好事者每得一扇自為珍物建陽僧慧崇工畫鵝鴈鷺鷥尤工小景善為寒汀逺渚蕭灑虛曠之象人所難到也何尊師亡其名閬中人善畫猫兒今為難得道士牛戩河內人工畫翎毛多寫班鳩野鵲但柘棘不甚精髙以上各有圗軸傳於丗雜畫門凡三十五人僧道附卑顯張翼張戡丘士元裴文睍胡九齡馮清包貴包鼎趙邈齪辛成馮進成吳進吳懷董羽任從一趙幹曹仁熙荀信戚文秀路衙推楊揮朱澄徐易徐白劉文通蔡潤蒲永升何霸張經支選藴能吕拙趙裔鄧隱卑顯不知何許人真宗朝為翰林待詔工畫馬有韓幹之風而筆力徑健有按御馬圗伯樂相馬秣馬渲馬等圗傳於丗張翼一名鈐豳國人工畫蕃馬師趙光輔得其筆法但狀彼胡人不能酷似耳張戡瓦橋人工畫蕃馬居近燕山得胡人形骨之妙盡戎衣鞍勒之精然則人稱髙名馬虧先匠今時為獨步矣丘士元不知何許人工畫水牛精神形似外特有意趣裴文睍京師人仁宗朝為翰林待詔工畫水牛骨氣老重劄渲謹密亦一代之佳手也胡九齡絳人工畫水牛筆弱於裴而意特蕭灑愛作臨水倒影牛人多稱之馮清陜郡閿鄉人善畫橐駝兼工平畫景靈宫北廊墻壁道經變相乃清之筆包貴宣城人善畫虎名聞四逺丗號老包也包鼎貴之子雖從父訓抑又次焉子孫襲而學者甚衆雖非類犬然終不能踐貴鼎之閾矣以上各有圗軸傳於丗趙邈齪亡其名性惟質魯不善修飾故人號為邈齪妙工畫虎有伏崖嘯風䑛掌等虎傳於丗辛成不知何許人亦以畫虎聞於時馮進成江南人善畫犬兔筆迹縝細吳進吳懷並江南人善畫龍水董羽毗陵人有鄧艾之疾語不能出俗號董啞子善畫龍水海魚始事江南為翰林待詔既歸朝領真命為圗畫院藝學鍾陵清凉寺有李中主八分題名李簫逺草書羽畫海水為三絶又畫李後主香花閣圗屏及歸朝後太宗嘗令畫端拱樓下龍水四壁極其精思及畫玉堂屋壁海水見存羽始𬒳命畫端拱樓龍水凡半載功畢自謂即拜恩命一日上與嬪御登樓時皇子尚幼見畫壁驚畏啼呼亟令杇鏝羽卒不受賞亦其命也任從一京師人仁宗朝為翰林待詔工畫龍水海魚為時推賞舊有金明池水心殿御座屏扆畫出水金龍勢力遒怪今建隆觀翊教院殿後有所畫龍水二壁趙幹江南人工畫水事江南為畫院學生曹仁熙毗陵人工畫水善為驚濤怒浪馳名江介荀信江南人工畫龍水真宗朝為翰林待詔天禧中嘗𬒳旨畫㑹靈觀御座屏扆看水龍妙絶一時後移入禁中戚文秀工畫水筆力調暢嘗觀所畫清濟灌河圗旁題云中有一筆長五丈既尋之果有所謂一筆者自邊際起通貫於波浪之間與衆毫不失次序超騰回摺實逾五丈矣路衙推亡其名不知何許人善畫魚體致純古以上各有圗軸傳於世朱澄事江南為翰林待詔工畫屋木李中主保大五年嘗令與髙太冲等合畫雪景宴圗時稱絶手楊揮江南人善畫魚人稱之而未見其迹徐易暨弟白海州人並工畫魚精密形似綽有可觀易兼工雜畫尤能篆隸今為御書院藝學劉文通京師人善畫屋木當代稱之真宗朝為圗畫院藝學嘗𬒳㫖寫玉清昭應宫七賢閣兼預畫壁為優等蔡潤鍾陵人工畫船水始隨李主至闕下􅊢八作司彩畫匠人後因畫舟車圗進上上方知其名遂𥙷畫院之職後令畫楚王渡江圗藏於內府以上各有圗軸傳於世蒲永升成都人性嗜酒放浪善畫水人或以勢力使之則嘻笑捨去遇其欲畫不擇貴賤蘇子贍內翰嘗得永升畫二十四幅每觀之則隂風襲人毛髮為立子瞻在黃州臨臯亭乘興書數百言寄成都僧惟簡具述其妙謂董戚之流為死水耳惟簡住大慈寺勝相院其書刻石在焉何霸不知何許人工畫船水其名尤著有瀟湘逢故人舶客等圗傳於世張經姑蘇人善雜畫尤精傳模支選不知何許人仁宗朝為圗畫院祗候工畫太平車及江州車又畫酒肆邊絞縛樓子有分踈界畫之功兼工雜畫浙陽僧藴能工雜畫錯揔萬彚無不兼通然絶佳者未易多得道士呂拙京師人工畫屋木至道中為圗畫院祗候時方建上清宫拙因畫鬱羅霄臺樣進上恩改翰林待詔不就願於本宫為道士尋得披挂仍賜紫衣拙畫屋木絶妙然多以人物繁雜為纍以上各有圗軸傳於世趙裔不知何許人工雜畫兼長佛道人物學朱繇用筆少亞而傳彩為精有十現老君像蘇逹拿太子變相士女看花等圗并四時花鳥傳於世鄧隱梓州人工雜畫兼佛像鬼神本州州宅有畫天王壁并牛頭寺畫羅漢皆妙及有山水花鳥傳於世圗畫見聞志卷第四
