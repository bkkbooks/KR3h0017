  text: 圗􅀞見聞誌卷第五
  hash: sha256:563cb2e46038c089aa0aceef7a9a67d18cbabd63eac2c0c66029c6aa67298414
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0017_SBCK_005-1a}
body:
  text: 故事拾遺唐朝王蜀朱梁揔二十七事八駿圗謝元深􅅬王閻立本鶴􅀞呉道子金橋圗先天菩薩資聖寺浄城寺西明寺相藍十絶王維三花馬崔圎周昉張璪石橋圗桞公權㑹昌廢壁西園圗雪詩圗李益附鄭賛盧氏宅趙嵒劉彦齊常生八駿圗舊稱周穆王八駿日馳三萬里晉武帝時所得古本乃穆王時􅀞黄素上爲之腐敗昬潰而骨氣宛在逸狀竒形實亦龍之􅀋也遂令史道碩模冩之宋齊梁陳以爲國寳隋文帝㓕陳圗書散逸此􅀞爲賀若弼所得齊王暕知而求得之荅以駿馬四十蹄美錦五十叚後復進獻煬帝至唐貞觀中勑借魏王泰因而傳模於世其一曰渠黄身青􅎸尾赤項下至肚紅而蹄黒其二曰山子身紫􅎸尾黒項下至肚紅而蹄黒其三曰盗驪身黄而黒班􅎸尾黒項下至肚紅而蹄黒􅎸鬛絶少也其四曰緑耳身青􅎸尾黒而虬項下至肚紅而蹄黒其五曰赤驥身赤􅎸尾赤而黄項下至肚紅而蹄黒其六曰騮身淺紫騣尾深紫而虬項下至肚紅而蹄黒音華其七曰踰輪身紫而帶黒􅎸尾黒而虬項下至肚紅而蹄黒額上苦精騣向前尖而上卷其八曰白身青騘􅎸尾紅項下至肚紅而蹄黒音義謝元深唐貞觀三年東蠻謝元深入朝冠烏熊皮冠以金絡額毛帔以韋爲行縢著履中書侍郎顔師古奏言昔周武王治致太平逺國歸􅅃周史乃集其事爲王㑹篇今聖德所及萬國來朝卉服鳥章俱集蠻邸實可圗冩貽于後以彰懷逺之德上從之乃命閻立德等圗􅀞之􅅬王唐􅅬王元嬰髙祖第二十二子也善􅀞蟬雀花卉而史傳不載惟張彦逺歷代名􅀞記中書之及覩王建宫詞云内中數日無宣喚傳得􅅬王蛺蝶圗乃知其善􅀞也閻立本唐閻立本至荆州觀張僧繇舊跡曰定虚得名耳明日又往曰猶是近代佳手明日往曰名下無虚士坐卧觀之留宿其下十餘日不能去又僧繇曽作醉僧圗傳於世長沙僧懷素有詩云人人送酒不曽沽終日松間繫一壺草聖欲成狂便發真堪􅀞入醉僧圗然道士每以此嘲僧群僧於是聚鏹數十萬求立本作醉道圗並傳於代鶴􅀞黄筌冩六鶴其一曰唳天舉首張喙而鳴其二曰警露回首引頸上望其三曰啄苔垂首下啄於地其四曰舞風乗風振翼而舞其五曰䟽翎轉項毨其翎羽其六曰顧歩行而回首下顧後軰丹青則而象之杜甫詩稱薛公十一鶴皆冩青田眞恨不見十一之􅀔復何如也呉道子開元中將軍裴旻居䘮詣呉道子請於東都天宫寺􅀞神􅀑數壁以資冥助道子荅曰吾􅀞筆乆廢若將軍有意爲吾纒結舞劒一曲庶因猛勵以通幽冥旻於是脫去縗服若常時裝束走馬如飛左旋右轉擲劒入雲髙數十丈若電光下射旻引手執鞘承之劒透室而入􅀚者數千人無不驚慄道子於是援毫圖壁颯然風起爲天下之壯􅀚道子平生繪事得意無出於此金橋圗金橋圗者唐明皇封㤗山回車駕次上黨潞之父老􅀒檐壷漿逺近迎謁帝皆親加存問受其獻饋錫賚有差其間有先與帝相識者悉賜以酒食與之話舊故所過村部必令詢訪􅀌老䘮疾之家加吊恤之父老欣欣然莫不瞻戴叩乞駐留焉及車駕過金橋橋在上黨御路縈轉上見數十里間旗纛鮮華羽衛齊肅顧左右曰張說言我勒兵三十萬旌旗徑千里挾右上黨至于太原見后土碑眞才子也帝遂召呉道子韋無忝陳閎令同製金橋圗御容及帝所乗照夜白馬陳閎主之橋梁山水車輿人物草木鷙鳥噐仗帷幕呉道子主之狗馬驢騾牛羊橐駞猴兎猪之属韋無忝主之圗成時謂三絶焉先天菩薩有先天菩薩幀本起成都妙積寺唐開元􅀄有尼魏八師者常念大悲呪有􅀟流縣民劉乙小字意兒年十一歳自言欲事魏尼尼始不納遣亦不去常於奥室坐禪嘗白魏云先天菩薩見身此地遂篩􅁅於庭一夕有巨跡長數尺倫理成就意兒因謁􅀞工随意設色悉不如意有僧法成者自云能􅀞意兒常合仰祝然後指授之僅十稔功方就後塑先天菩薩像二百四十二首首如塔􅀔分臂如蔓所􅀞様凢十五卷有柳七師者崔寜之甥分三卷往上都流行時魏奉古爲長史得其様進之後因四月八日復賜髙力士今成都者是其次本資聖寺資聖寺中䆫間呉道子􅀞髙僧韋述讃李嚴書中三門外兩面上層不知何人􅀞人物頗􅀋閻筆寺西廊北隅楊坦􅀞近塔天女明睇將瞬􅇛塔院北堂有鐡􅀚音髙三丈餘􅀚音院兩廊四十二賢聖韓幹􅀞元載讃東廊北壁散馬不意見者如將嘶蹀聖僧中龍樹啇郍和脩絶妙團塔上菩薩李嗣眞􅀞四面花鳥邊鸞􅀞當中藥上菩薩頂上茸葵尤佳塔中藏千部法華經詞人作諸􅀞聮句浄城寺淨城寺者本唐太穆皇后宅後捨爲寺寺僧云三階院門外是神堯皇帝射孔雀處西禪院門外有游目記碑云王昭隱􅀞門西裏面和脩􅁻龍王有靈及門内西壁有􅀞光目藥义部落絶竒􅀑首上蟠虵可懼東廊有張璪􅀞林石險怪西廊萬菩薩院門裏南壁有皇甫軫􅀞􅀑神及鵰鵰若脫壁軫與呉道子同時呉以其藝逼已募人刺殺之西明寺唐西明慈恩寺率多名賢書􅀞慈恩塔前壁上有􅀞濕耳師子跌心花爲時所重聖善敬愛兩寺皆有古􅀞聖善寺木塔有鄭廣文書􅀞敬愛寺山亭院壁上有􅀞雉若眞砂子上有時賢題名及詩什甚多相藍十絶大相國寺碑稱寺有十絶其一大殿内彌勒聖容唐中宗朝僧惠雲於安業寺鑄成光照天地爲一絶其二睿宗皇帝親感夢於延和元年七月二十七日改故建國寺爲大相國寺睿宗御書牌額爲一絶其三匠人王温重裝聖容金粉肉色并三門下善神一對爲一絶其四佛殿内有呉道子􅀞文殊維摩像爲一絶其五供奉李秀刻佛殿障日九間爲一絶其六明皇天寶四載乙酉􅀊令匠人邊思順修建排雲寳閣爲一絶其七閣内西頭有陳留郡長史乙速令􅀌爲功德主時令石抱玉􅀞護國除災患變相爲一絶其八西庫有明皇先勑車道政往于闐國傳北方毗沙門天王様來至開元十三年封東嶽時令道政於此依様􅀞天王像爲一絶其九門下有瓌師􅀞􅆊王帝釋及東廊障日内􅀞法華經二十八品功德變相爲一絶其十西庫北壁有僧智儼􅀞三乗因果入道位次圗爲一絶也宋次道東京記亦載相國寺十絶乃是後來所見事迹此不具録王維唐王維右丞字摩詰少以詞學知名有髙致信佛理藍田南置别業以水木琴書自娛善􅀞山水人物筆蹤雅壯體渉古今甞於清源寺壁􅀞輞川圗巖岫盤鬱雲水飛動自製詩曰當世謬詞客前身應􅀞師不能捨餘習偶􅀍時人知又甞至招國坊􅁃敬休宅見屋壁有􅀞按樂圗維孰視而􅀏或問其故維荅曰此所奏曲適到霓裳羽衣第三疊第一拍也好事者集樂工驗之無一差者三花馬唐開元天寳之間承平日乆丗尚輕肥三花飾馬舊有家藏韓幹􅀞貴戚閱馬圗中有三花馬兼曽見蘇大叅家有韓幹􅀞三花御馬晏元獻家張萱􅀞虢國出行圗中亦有三花馬三花者剪􅎸爲三辨白樂天詩云鳯牋書五色馬鬛剪三花崔圎唐安禄山之䧟兩京也王維鄭䖍張通皆處賊庭洎尅復之後朝廷未决其罪俱囚於楊國忠之舊第崔圎相國素好􅀞因召於私第令􅀞數壁當時皆以圎勲貴莫二望其救解故運思精深頗極能事後皆從寛典至於貶竄必獲善地周昉唐周昉善屬文窮丹青之妙多遊卿相間貴公子也兄皓善􅀐射隨哥舒翰征吐蕃收石堡城以功爲執金吾德宗建章明寺召皓云聞卿弟善􅀞欲使之􅀞章明寺壁卿特爲言之又經數月再召之昉乃就事落土之際土錐朽􅀞者也都人士庻觀者以萬數其間鑒别之士有稱其善者或指其瑕者昉隨日改定月餘是非語絶無不歎其神妙郭汾陽婿趙縱侍郎甞令韓幹冩眞衆稱其善後復請昉冩之二者皆有能名汾陽嘗以二􅀞張於坐側未能定其優劣一日趙夫人歸寧汾陽問曰此􅀞誰也云趙郎也復曰何者最似云二􅀞皆似後􅀞者爲佳蓋前􅀞者空得趙郎狀貌後􅀞者兼得趙郎情性􅀏言之姿爾後􅀞者乃昉也汾陽喜曰今日乃决二子之勝􅀒於是令送錦綵數百疋以酬之昉平生􅀞牆壁卷軸甚多貞元間新羅人以善價收置數十卷持歸本國張璪唐張璪貟外􅀞山水松石名重於世尤於􅀞松特出意象能手握􅀟管一時齊下一爲生枝一爲枯榦􅀔凌風雨氣傲煙霞分鬱茂之榮柯對輪囷之老枿經營兩足氣韻􅀟髙此其所以爲異也璪甞撰繪境一篇言􅀞之要訣初畢宏庶子擅名於代一見璪􅀞驚歎之璪又有用秃筆或以手模絹素而成􅀞者因問璪所授璪曰外師造化中得心源畢君於是閣筆建中末曽於長安平康里張氏第􅀞八幅山水障破墨未了值朱泚之亂京城搔動璪亦登時逃去其家人見在楨蒼忙掣落此障最見璪用思處又有一士人家曽請璪􅀞林石一障士人云亡有兵部李約貟外好􅀞成癖知而購之其家弱妻巳練爲衣裏矣惟得兩幅􅀟栢一石在焉李嗟惋乆之作練檜記述張􅀞意詞多不載自具李約文集石橋圗保壽寺本髙力士宅天寳九載捨爲寺初鑄鐘成力士設齋慶之舉朝畢至一擊百千有規其意連擊二十杵者其經藏閣規模危巧兩塔上火珠受十餘斛文宗朝有河陽從事李􅃰者性好竒古與寺僧善甞與之同觀寺庫中舊物忽於破甕内得物如􅀍幅裂汙坌觸而塵起􅃰徐視之乃􅀞也因以州縣圗三及絹三十疋換之令家人裝治幅長丈餘因持訪於常侍栁公權乃知張萱所􅀞石橋圗明皇賜力士因留寺中也後爲鬻􅀞人宗牧言於左軍忽一日有中使至􅃰第宣勑取之即時進入禁中帝好古見之大恱命張於雲韶院柳公權唐柳公權名節文行著在簡䇿志耽書學不能治生爲勲戚家碑版問遺歳時鉅萬多爲主藏者海鷗龍安所竊别貯酒噐杯盂一笥緘􅅬如故其噐皆亡訊海鷗乃曰不測其亡公權哂曰銀杯羽化耳不復更言所寳惟筆硯圗書自扄鐍之會昌廢壁唐李德􅁉鎭浙西日於潤州建功德佛宇曰甘露寺當㑹昌廢毀之際奏請獨存因盡取管内廢寺中名賢􅀞壁置之甘露乃􅀳顧凱之戴安道宋謝靈運陸探㣲梁張僧繇隋展子䖍唐韓幹呉道子􅀞又成都静德精舎有薛稷􅀞雜人物鳥獸二壁有胡氏亡其名􅄝古好竒惜少保之迹將廢乃募壯夫操斤力剟於頽坌之際得像三十七首馬八蹄又於福聖寺得展子䖍天樂部二十五身悉䧟於屋壁號寶墨亭司門外郎郭圎作記自是長者之車益滿其門矣西園圗清夜遊西園圗者􅀳顧長康所􅀞有梁朝諸王跋尾處云圗上若干人並食天厨唐貞觀中禇河南裝背題處具在其圗本張維素物傳至相國張弘靖家弘靖元和中忽奉詔取之是時并鍾元常書道德經一部同進入内後中貴人崔譚峻自禁中將出復流落人間有張維素子周封涇州從事帙滿居京一日有人將此圗求售周封驚異之遽以絹數疋易得經年忽聞􅅃門甚急問之見數人同稱仇中尉願以三百素易公清夜遊西園圗周封憚其迫脅遽以圗授之翊日果齎絹至後方知其僞乃是一豪士求江淮大鹽院時王涯判鹽鐡酷好書􅀞謂此人曰爲余訪得清夜遊西園圗當遂公所請因爲計取之耳及十家事起後流落一粉鋪家未幾爲郭承嘏侍郎閽者以錢三百市之以獻郭公郭公卒又流傳至令狐相家一日宣宗問相國有何名􅀞相國具以圗對既而復進入内雪詩圗李益附唐鄭谷有雪詩云亂飄僧舎茶煙濕宻灑歌樓酒力㣲江上晚來堪􅀞處漁人披得一簔歸時人多傳誦之叚賛善善􅀞歴代名􅀞記中有叚去惑豈非宫賛因採其詩意景物圗冩之曲盡蕭灑之思持以贈谷谷珍領之復爲詩􅀉謝云賛善賢相後家藏名􅀞多留心於繪素得事在煙波屬興同吟詠功成更􅅣磨愛余風雪句幽絶冩漁蓑李益者肅宗朝宰相揆之族子登進士第有才思長於歌詩有征人歌早行篇好事者盡圗冩爲屏障如回樂峯前沙似雪受降城外月如霜之句是也鄭賛唐外郎滎陽鄭賛宰萬年日有以賊名而荷校者賛命取所盗以視則煙晦古絲三四幅齊罽裁褾班鼊皮軸之曰是􅀞也太尉李公所寳惜有賛皇圗􅂐存焉當時人以七萬購獻於李公者遂得渠横梁倅職後因岀妓復落民間今幸其妓人不鑒以卑價市之後妓人自他所得知其本直因歸訴請以所虧價書罪賛不得决時延壽里有水墨李處士以精别􅀞品遊公卿門召使辨之李瞪目三歎曰韓展之上品也雖黄沙之情巳具而丹筆之斷尚疑㑹有賫籍自禁軍來認者賛以且異姦盗非願荷留因并􅀞桎送之後永亡其耗盧氏宅唐德州刺史王􅀝家有筆一管稍麁於常用筆管兩頭各出半寸巳來中間刻徙軍行一鋪人馬毛髮亭臺逺水無不精絶毎一事刻從軍行詩兩句若庭前琪樹巳堪攀塞外征人殊未還是也似非人功其􅀞迹若粉描向明方可辨之云用䑕牙雕刻故崔鋋郎中文集有王氏筆管記體􅀋韓退之記􅀞􅀝之子紹孫􅀶雅好古善琴阮其所居乃盧氏舊宅在洛中歸德坊南街㕔屋是杏木梁西壁有韋旻郎中􅀞散馬七疋東壁有張長史草書數行長史世號張顚宅之東果園兩京新記所載是馬周舊宅趙嵒梁駙馬都尉趙嵒酷好繪事兼閑小筆偶唐末亂世獨推至鑒人有鬻􅀞者則必以善價售之不較其多少繇是四逺向風抱􅀞者歳無虚日復以親貴擅權凢所依附率多以法書名􅀞爲贄故􅀞府秘藏圗軸僅五千餘卷時稱盛焉暇日亦多自倣前賢名迹動成卷軸每延致藝士輻湊門館各取其所長而厚遇之然多不迨已也亦未始面加雌黃荒淺甚者自慙而退食客常至百餘人其間亦多琴棊道術髙雅之流時衣冠士族尚有唐之遺風也以􅀞見留者惟胡翼王殷二人而巳嘗令胡翼品第􅀞府之優劣中品已下或有未至者即指示令毉去其病或用水刷或以粉塗有經數次方合其意者時人謂之趙家􅀞選場其精别如此愚謂天水用適一時之意則巳果然數以粉塗水洗則成何􅀞也劉彦齊梁千牛衛將軍劉彦齊善􅀞竹爲時所稱世族豪右袐藏書􅀞雖不及天水之盛然好重鑒别可與之爭衡矣本借貴人家圗􅀞臧賂掌􅀞人􅀻岀之手自傳模其間用舊褾軸裝治還僞而留眞者有之矣其所藏名迹不啻千卷每暑伏曬曝一一親自卷舒終日不倦能自品藻無非精當故當時識者皆謂唐朝呉道子手梁朝劉彦齊眼也常生王先主旣下蜀城謁僖宗御容于時繪壁百僚咸在惟不見田令孜陳太師因問何不冩貌彼二人左右對以近方塗㓕先主曰不然吾與陳田本無讎恨圗霸之道披此血刃豈與丹青爲參啇乎遽命工重冩之待詔常生名重胤曰不必援毫乃挼皂莢水洗壁而風姿宛然先主嘉賞之賜以金帛也常生傳神素號絶手自云我􅀞壁除摧圯搨爛外雨淋水洗斷無剥落先是詩僧貫休能􅀞謂常生曰貧道觀􅀞多矣如吾子所􅀞前無來人後無繼者其見賞如此圗􅀞見聞誌卷第五
