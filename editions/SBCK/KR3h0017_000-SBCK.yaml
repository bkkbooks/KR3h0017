body:
  text: 苐一卷叙論縂一十六事苐二􅃃紀藝上唐末二十七人五代九十一人苐三卷紀藝中仁宗御畵王公士夫一十三人髙尚二人人物五十三人傳冩七人第四卷紀藝下此卷盡九十八人山水門二十四人花鳥門三十九人􅇎畫門三十五人第五卷故事拾遺唐朝朱梁王蜀緫二十七事第六卷近事皇朝孟蜀大遼髙麗緫三十二事標目此殘宋刻本圖畫見聞志四五六共三卷周香嚴所藏書也四月二十二日余訪香嚴詢余近日淂書幾何余以澗薲扵玉峯􅀁収元刻丁鶴年集明人葉德榮手抄法帖刋誤翻宋版圖画見聞志三種對香嚴即出圖畫見聞志一冊示余曰君所洴者与此本同否余曰行欵似同然亦記憶不甚明晣矣香嚴曰此王蓮涇家藏書也余初淂時亦認爲宋版既而見其字畫方板疑爲翻本􅂚擕去對之余曰此冊僅半尚有前三􅃃否香嚴曰此殘本也余即􅀙香嚴乞之盖余舊藏此書元人抄本止前三卷香嚴亦所素知故敢丐此以為尾之續也及擕歸与澗薲同觀亦認為翻宋本遂取前􅀁収者勘之行欵雖同而楮墨俱饒舌氣細辨字畫遇宋諱皆缺筆翻本不如是也爰掲去舊時背紙見原楮皆羅紋濶連而横印者始信宋刻宋印以翻本行欵証之此即􅀁謂臨安府陳道人書藉鋪刋行本也且余所藏南宋書棚本如許丁卯羅昭諫唐人諸集字畫方板皆如是益信其為宋本無疑率作一律酬香嚴以誌謝命王装池与元抄為合璧􅀁贈雖出自良友而工費㡬及緡錢四五千為古書計􅀁不惜矣􅀘綴之處有白紙者皆舊時填冩字跡其蠧蝕之餘悉以一色舊紙􅀘綴遇字畫欄格缺断者倩澗薲以淡墨描冩至原刻原卬之糢糊缺失悉仍其舊誠慎之至也余思此書宋刻向藏書家無有是今􅀁見雖藏殘本幸淂元抄相合差稱兩美貯諸讀未見書齋洵為未見之書矣因述其顛末如此嘉慶嵗在已未中夏九日􅁄人黄丕烈識附錄贈周香嚴詩元抄藏自我宋刻贈由君两羙此時合一書何地分翻雕模舊印缺畫認遺文嗜同志相從廣见聞
