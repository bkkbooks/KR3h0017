front:
  text: 圖画見聞誌序余大父司徒公雖貴仕而喜廉退恬飬自公之暇唯以詩書琴􅀞為適時与丁晋公馬正惠蓄畫均故􅀞府􅁛冨焉先少列躳蹈懿節鑒别精明珍蔵罔墜欲養不逮臨言感􅍋後囙諸族人間􅂑分玩緘縢罕嚴日居月諸漸成淪棄賤子雖甚不肖然扵二卋之好敢不欽蔵嗟乎逮至弱年流散無幾近􅀊方購尋遺失或扵親戚間以他玩交酬凡淂十餘卷皆傳世之寳每宴㘴虚庭髙懸素壁終日幽對愉愉然不知天地之大萬物之䋣况乎驚寵辱扵􅀔利之塲料新故扵奔馳之域者哉􅂧遇朋逰覯止亦出名踪柬論淂以資深鈴較舊文􅋚與戴謝竝生愚􅀼慕焉又好与當世名士甄明體法講練精微益所見聞當從實錄昔唐張彦逺字愛賔嘗著厯代名画記其間自黄帝時史皇而下搃括画人妵名絶筆扵永昌元年厥後撰集者率多相亂事既重疉文亦䋣衍今􅊲諸􅀓記參較淂失續自永昌元年後歷五季通至本朝熈寧七年名人藝士編而次之其有畵迹尚晦扵時聲聞未喧扵衆者更竢􅀅耒亦嘗覧諸家􅀞記多陳品第今之作者各有所長或少也嫩而老也壮或妱也勤而終也怠今則不􅂧定品唯筆其可紀之能可談之事暨諸家畫説略而未至者􅁇以傳記中述画故事幷本朝事迹採摭編次􅁵為六卷目之曰圖畵見聞誌後之博雅君子或如􅀧竄􅀅可􅂑扵萬一郭若虚序圖􅀞見聞誌縂目
