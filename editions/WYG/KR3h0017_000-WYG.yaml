body:
  text: 序余大父司徒公雖貴仕而喜廉􅅲恬養自公之暇惟以詩書琴畫爲適時與丁晉公馬正恵蓄書畫均故畫府穪富焉先君少列躬蹈懿節鑒裁精明珍藏罔墜欲養不待臨言感噎後因諸族人閒取分玩緘縢罕嚴日居月諸漸成淪弃賤子雖甚不肖然於二世之好敢不欽藏嗟乎逮至弱年流散無幾近嵗方購尋遺失或於親戚間以他玩交酬凡得十餘卷皆傳世之寳每宴坐虛庭髙懸素壁終日幽對愉愉然不知有天地之大萬物之繁况乎驚寵辱於勢利之塲料得喪於犇馳之域者哉復遇朋遊覯止互出名蹤柬論得以資㴱銓較由之廣博雖不與戴謝並生愚竊慕焉又好與當世名手甄明體灋講練精㣲凡所見聞當從實錄昔唐張彦逺字愛賓嘗著厯代名畫記其閒自黄帝時史皇而下總括畫人姓名絶筆於永昌元年厥後撰集者率多相亂事既重疊文亦繁衍今考諸傳記參較得失續自永昌元年後厯五季通至本朝熙寜七年名人藝士編而次之其有畫蹟尚晦於時聲聞未喧於衆者更竢将來亦嘗覽諸家畫記多陳品第今之作者互有所長或少也嫩而老也壮或始也勤而終也怠今則不復定品惟筆其可紀之能可談之事暨諸家畫説略而未至者繼以傳記中述畫故事并本朝事蹟採摭編次離爲六卷目之曰圖畫見聞誌後之博雅君子或加㸃竄將可取於萬一郭若虛序欽定四庫全書
