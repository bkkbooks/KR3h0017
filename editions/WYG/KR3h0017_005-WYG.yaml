body:
  text: 故事拾遺唐朝王蜀朱梁十七事總二八駿圖謝元㴱滕王閻立本鶴畫吳道子金橋圖先天菩薩資聖寺淨城寺西明寺相藍十絶王維三花馬崔圓周昉張璪石橋圖柳公權㑹昌廢壁西園圖雪詩圖李益附鄭贊盧氏宅趙嵒劉彦齊常生八駿圖舊穪周穆王八駿日馳三萬里晉武帝時所得古本乃穆王時畫黄素上爲之腐敗昬潰而骨氣宛在逸状竒形實亦龍之類也遂令史道碩模寫之宋齊梁陳以爲國寳隋文帝滅陳圖書㪚逸此畫爲賀若弼所得齊王暕知而求得之答以駿馬四十蹄羙錦五十段後復進獻煬帝至唐貞觀中敕借魏王泰因而傳模於世其一曰渠黄身青騣尾赤項下至肚紅而蹄黒其二曰山子身紫騣尾黒項下至肚紅而蹄黒其三曰盜驪身黄而黒斑騣尾黒項下至肚紅而蹄黑騣鬛絶少也其四曰緑耳身青騣尾黑而虬項下至肚紅而蹄黑其五曰赤驥身赤騣尾赤而黄項下至肚紅而蹄黑其六曰􅢒驑身淺紫騣尾深紫而虬項下至肚紅而蹄黒􅢒音華其七曰踰輪身紫而𢃄黒騣尾黒而虬項下至肚紅而蹄黑額上若精騣向前尖而上卷其八曰白􅀢身青驄騣尾紅項下至肚紅而蹄黒􅀢音義謝元深唐貞觀三年東蠻謝元深入朝冠烏熊皮冠以金絡額毛帔以韋爲行縢著履中書侍郎顔師古奏言昔周武王治致太平逺國歸欵周史乃集其事爲王㑹篇今聖徳所及萬國來朝卉服鳥章俱集蠻邸實可圖寫貽于後以彰懐逺之徳上從之乃命閻立德等圖畫之滕王唐滕王元嬰高祖第二十二子也善畫蟬雀花卉而史傳不載惟張彦遠歴代名畫記中書之及覩王建宫詞云内中數日無宣唤傳得滕王蛺蝶圖乃知其善畫也閻立本唐閻立本至荆州觀張僧繇舊蹟曰定虚得名耳明日又徃曰猶是近代佳手明日徃曰名下無虚士坐臥觀之畱宿其下十餘日不能去又僧繇曾作醉僧圖傳於世長沙僧懐素有詩云人人送酒不曾沽終日松閒繫一壺草聖欲成狂便發真堪畫入醉僧圖然道士每以此嘲僧群僧於是聚鏹數十萬求立本作醉道圖並傳於代鶴畫黄筌寫六鶴其一曰唳天舉首張喙而鳴其二曰警露囘首引頸而望其三曰啄苔􅂷首下啄於地其四曰舞風乗風振翼而舞其五曰疏翎轉項毨其翎羽其六曰顧歩行而囘首下顧後輩丹青則而象之杜甫詩稱薛公十一鶴皆寫青田真恨不見十一之勢復何如也吳道子開元中將軍裴旻居䘮詣吳道子請於東都天宫寺畫神鬼數壁以資㝠助道子荅曰吾畫筆乆廢若將軍有意爲吾纒結舞劒一曲庻因猛勵以通幽㝠旻於是脱去縗服若常時装束走馬如飛左旋右轉揮劔入雲高數十丈若電光下射旻引手執鞘承之劔透室而入觀者數千人無不驚慄道子於是援毫圖壁颯然風起爲天下之壯觀道子平生繪事得意無出於此金橋圖金橋圖者唐明皇封泰山囘車駕次上黨潞之父老負擔壺漿逺近迎謁帝皆親加存問受其獻饋錫賚有差其間有先與帝相識者悉賜以酒食與之話舊故所過村部必令詢訪孤老䘮疾之家加弔恤之父老欣欣然莫不瞻戴叩乞駐畱焉及車駕過金橋橋在上黨御路縈轉上見數十里間旗纛鮮華羽衞齊肅顧左右曰張説言我勒兵三十萬旌旗徑千里挾右上黨至於太原見后土碑真才子也帝遂召吳道子韋無忝陳閎令同製金橋圖御容及帝所乗照夜白馬陳閎主之橋梁山水車輿人物草木鷙鳥器仗帷幕吳道子主之狗馬驢騾牛羊橐駞猴兎猪􅀈之屬韋無忝主之圖成時謂三絶焉先天菩薩有先天菩薩幀本起成都妙積寺唐開元初有尼魏八師者常念大悲呪有雙流縣民劉乙小字意兒年十一嵗自言欲事魏尼尼始不納遣亦不去常於奥室坐禪嘗白魏云先天菩薩見身此地遂篩灰於庭一夕有巨跡長數尺輪理成就意兒因謁畫工隨意設色悉不如意有僧法成者自云能畫意兒常合掌仰祝然後指授之僅十稔功方就後塑先天菩薩像二百四十二首首如塔勢分臂如蔓所畫様凡十五卷有桞七師者崔寜之甥分三卷徃上都流行時魏奉古爲長史得其様進之後因四月八日復賜高力士今成都者是其次本資聖寺資聖寺中窗間吳道子畫高僧韋述讃李嚴書中三門外兩靣上層不知何人畫人物頗類閻筆寺西廊北隅楊坦畫近塔天女明睇将瞬團塔院北堂有鐡觀音高三丈餘觀音院兩廊四十二賢聖韓幹畫元載讚東廊北壁㪚馬不意見者如將嘶蹀聖僧中龍樹商那和脩絶妙團塔上菩薩李嗣真畫四靣花鳥邊鸞畫當中藥王菩薩頂上茸葵尤佳塔中藏千部法華經詞人作諸畫聫句淨域寺淨域寺者本唐太穆皇后宅後捨爲寺寺僧云三階院門外是神堯皇帝射孔雀處西禪院門外有游目記碑云王昭隠畫門西裏靣和脩吉龍王有靈及門内西壁有畫火目藥义部落竒絶鬼首上蟠虵可懼東廊有張璪畫林石險怪西廊萬菩薩院門裏南壁有皇甫軫畫鬼神及鵰鵰若脱壁軫與吳道子同時吳以其藝逼已募人刺殺之西明寺唐西明慈恩寺率多名賢書畫慈恩塔前壁上有畫溼耳師子跌心花爲時所重聖善敬愛兩寺皆有古畫聖善寺木塔有鄭廣文書畫敬愛寺山亭院壁上有畫雉若真砂子上有時賢題名及詩什甚多相藍十絶大相國寺碑穪寺有十絶其一大殿内彌勒聖容唐中宗朝僧惠雲於安業寺鑄成光照天地爲一絶其二睿宗皇帝親感夢於延和元年七月二十七日改故建國寺爲大相國寺睿宗御書牌額爲一絶其三匠人王溫重装聖容金粉肉色并三門下善神一對爲一絶其四佛殿内有吳道子畫文殊維摩像爲一絶其五供奉李秀刻佛殿障日九間爲一絶其六明皇天寳四載乙酉嵗令匠人邊思順修建排雲寳閣爲一絶其七閣内西頭有陳畱郡長史乙速令孤爲功德主時令石抱玉畫䕶國除災患變相爲一絶其八西庫有明皇先勑車道政徃于闐國傳北方毗沙門天王様來至開元十三年封東嶽時令道政於此依様畫天王像爲一絶其九門下有瓌師畫梵王帝釋及東廊障日内畫法華經二十八品功德變相爲一絶其十西庫北壁有僧智儼畫三乘因果入道位次圖爲一絶也宋次道東京記亦載相國寺十絶乃是後來所見事蹟此不具錄王維唐王維右丞字摩詰少以詞學知名有高致信佛理藍田南置别業以水木琴書自娛善畫山水人物筆蹤雅壯體渉古今嘗於清源寺壁畫輞川圖巖岫盤鬱雲水飛動自製詩曰當世謬詞客前身應畫師不能捨餘習偶被時人知又嘗至招國坊庾敬休宅見屋壁有畫按樂圖維熟視而笑或問其故維荅曰此所奏曲適到霓裳羽衣第三疉第一拍也好事者集樂工驗之無一差者三花馬唐開元天寳之間承平日乆世尚輕肥三花飾馬舊有家藏韓幹畫貴戚閲馬圖中有三花馬兼曾見蘇大叅家有韓幹畫三花御馬晏元獻家張萱畫虢國出行圖中亦有三花馬三花者剪騣爲三辮白樂天詩云鳯牋書五色馬鬛剪三花崔圓唐安禄山之䧟兩京也王維鄭䖍張通皆處賊庭洎尅復之後朝廷未决其罪俱囚於楊國忠之舊第崔圓相國素好畫因召於私第令畫數壁當時皆以圓勲貴莫二望其救解故運思精深頗極能事後皆從寛典至於貶竄必獲善地周昉唐周昉善屬文窮丹青之妙多遊卿相間貴公子也兄皓善騎射隨哥舒翰征吐蕃收石堡城以功爲執金吾德宗建章明寺召皓云聞卿弟善畫欲使之畫章明寺壁卿特爲言之又經數月再召之昉乃就事落土之際土錐杇畫者也都人士庻觀者以萬數其間鑒别之士有穪其善者或指其瑕者昉隨日改定月餘是非語絶無不歎其神妙郭汾陽壻趙縱侍郎嘗令韓幹寫真衆穪其善後復請昉寫之二者皆有能名汾陽嘗以二畫張於坐側未能定其優劣一日趙夫人歸寜汾陽問曰此畫誰也云趙郎也復曰何者最似云二畫皆似後畫者爲佳葢前畫者空得趙郎状貎後畫者兼得趙郎情性笑言之姿爾後畫者乃昉也汾陽喜曰今日乃决二子之勝負於是令送錦綵數百疋以酬之昉平生畫牆壁卷軸甚多貞元間新羅人以善價收置數十卷持歸本國張璪唐張璪員外畫山水松石名重於世尤於畫松特出意象能手握雙管一時齊下一爲生枝一爲枯榦勢凌風雨氣傲烟霞分鬱茂之榮柯對輪囷之老枿經營兩足氣韻雙高此其所以爲異也璪嘗撰繪境一篇言畫之要訣初畢宏庻子擅名於代一見璪畫驚歎之璪又有用禿筆或以手模絹素而成畫者因問璪所授璪曰外師造化中得心源畢君於是閣筆建中末曾於長安平康里張氏第畫八幅山水障破墨未了值朱泚之亂京城搔動璪亦登時逃去其家人見在幀倉忙掣落此障最見璪用思處又有一士人家曾請璪畫林石一障士人云亡有兵部李約員外好畫成癖知而購之其家弱妻已練爲衣裏矣惟得兩幅雙栢一石在焉李嗟惋乆之作練繪記述張畫意詞多不載自具李約文集石橋圖保壽寺本高力士宅天寳九載捨爲寺初鑄鐘成力士設齋慶之舉朝畢至一擊百千有規其意連擊二十杵者其經藏閣規模危巧兩塔上火珠受十餘斛文宗朝有河陽從事李涿者性好竒古與寺僧善嘗與之同觀寺庫中舊物忽於破甕内得物如被幅裂汙坌觸而塵起涿徐視之乃畫也因以州縣圖三及絹三十疋換之令家人􅑽治幅長丈餘因持訪於常侍柳公權乃知張萱所畫石橋圖明皇賜力士因畱寺中也後爲鬻畫人宗牧言於左軍忽一日有中使至涿第宣勑取之即時進入禁中帝好古見之大悦命張於雲韶院柳公權唐柳公權名節文行著在簡䇿志耽書學不能治生爲勲戚家碑版問遺嵗時鉅萬多爲主藏者海鷗龍安所竊别貯酒器杯盂一笥緘縢如故其器皆亾訊海鷗乃曰不測其亾公權哂曰銀杯羽化耳不復更言所寳惟筆硯圖書自扄鐍之㑹昌廢壁唐李德裕鎮浙西日於潤州建功徳佛宇曰甘露寺當㑹昌廢毁之際奏請獨存因盡取管内廢寺中名賢畫壁置之甘露乃晉顧凱之戴安道宋謝靈運陸探微梁張僧繇隋展子䖍唐韓幹吳道子畫又成都靜德精舍有薛稷畫雜人物鳥獸二壁有胡氏亡其名嗜古好竒惜少保之蹟将廢乃募壮夫操斤力剟於頹坌之際得像三十七首馬八蹄又於福聖寺得展子䖍天樂部二十五身悉䧟於屋壁號寳墨亭司門外郎郭圓作記自是長者之車益滿其門矣西園圖清夜遊西園圖者晉顧長康所畫有梁朝諸王跋尾處云圖上若干人並食天厨唐貞觀中褚河南装背題處具在其圖本張維素物傳至相國張𢎞靖家𢎞靖元和中忽奉詔取之是時並鍾元常書道德經一部同進入内後中貴人崔譚峻自禁中将出復流落人間有張維素子周封涇州從事秩滿居京一日有人将此圖求售周封驚異之遽以絹數疋易得經年忽聞款門甚急問之見數人同穪仇中尉願以三百素易公清夜遊西園圖周封憚其廹脅遽以圖授之翊日果齎絹至後方知其僞乃是一豪士求江淮大鹽院時王涯判鹽鐵酷好書畫謂此人曰爲余訪得清夜遊西園圖當遂公所請因爲訃取之耳及十家事起後流落一粉鋪家未幾爲郭承嘏侍郎閽者以錢三百市之以獻郭公郭公卒又流傳至令狐相家一日宣宗問相國有何名畫相國具以圖對既而復進入内雪詩圖李益附唐鄭谷有雪詩云亂飄僧舍茶煙溼密灑歌樓酒力微江上晩來堪畫處漁人披得一蓑歸時人多傳誦之段贊善善畫歴代名畫記中有叚去惑豈非宮贊因採其詩意景物圖寫之曲盡蕭灑之思持以贈谷谷珍領之復爲詩寄謝云贊善賢相後家藏名畫多㽞心於繪素得事在煙波屬興同吟詠功成更琢磨愛余風雪句幽絶寫漁蓑李益者肅宗朝宰相揆之族子登進士第有才思長於歌詩有征人歌早行篇好事者盡圖寫爲屏障如囘樂峯前沙似雪受降城外月如霜之句是也鄭贊唐外郎滎陽鄭贊宰萬年日有以賊名而荷挍者贊命取所盜以視則煙晦古􅁝三四幅齊罽裁褾班鼊皮軸之曰是畫也太尉李公所寳惜有贊皇圖篆存焉當時人以七萬購獻於李公者遂得渠横梁倅職後因出妓復落民間今幸其妓人不鑒以卑價市之後妓人自他所得知其本直因歸訴請以所虧價輸罪贊不得决時延壽里有水墨李處士以精别畫品遊公卿門召使辨之李瞪目三歎曰韓展之上品也雖黄沙之情已具而丹筆之斷尚疑㑹有賫籍自禁軍來認者贊以且異姦盜非願荷畱因并畫桎送之後永亾其耗盧氏宅唐德州刺史王倚家有筆一管稍麤於常用筆管兩頭各出半寸已來中間刻從軍行一鋪人馬毛髪亭臺逺水無不精絶每一事刻從軍行詩兩句若庭前琪樹已堪攀塞外征人殊未還是也似非人功其畫蹟若粉描向明方可辨之云用鼠牙雕刻故崔鋋郎中文集有王氏筆管記體類韓退之記畫倚之子紹孫博雅好古善琴阮其所居乃盧氏舊宅在洛中歸德坊南街㕔屋是杏木梁西壁有韋旻郎中畫散馬七匹東壁有張長史草書數行長史世號張顛宅之東果園兩京新記所載是爲周舊宅趙嵒梁駙馬都尉趙嵒酷好繪事兼􅈺小筆偶唐末亂世獨推至鑒人有鬻畫者則必以善價售之不較其多少繇是四逺向風抱畫者嵗無虚日復以親貴擅權凡所依附率多以灋書名畫爲䞇故畫府祕藏圖軸僅五千餘卷時稱盛焉暇日亦多自倣前賢名蹟勒成卷軸每延致藝士輻湊門館各取其所長而厚遇之然多不迨已也亦未始靣加雌黄荒淺甚者自慙而退食客常至百餘人其間亦多琴棊道術高雅之流時衣冠士族尚有唐之遺風也以畫見畱者惟胡翼王殷二人而已嘗令胡翼品第畫府之優劣中品已下或有末至者即指示令毉去其病或用水刷或以粉塗有經數次方合其意者時人謂之趙家畫選場其精别如此愚謂天水用適一時之意則已果然數以粉塗水洗則成何畫也劉彦齊梁千牛衛將軍劉彦齊善畫竹爲時所穪世族豪右祕藏書畫雖不及天水之盛然好重鑒别可與之爭衡矣本借貴人家圖畫臧賂掌畫人私出之手自傳模其間用舊褾軸􅑽治還僞而畱真者有之矣其所藏名迹不啻千卷每暑伏曬曝一一親自卷舒終日不倦能自品藻無非精當故當時識者皆謂唐朝吳道子手梁朝劉彦齊眼也常生王先主既下蜀城謁僖宗御容于時繪壁百僚咸在惟不見田令孜陳太師因問何不寫貎彼二人左右對以近方塗滅先主曰不然吾與陳田本無讎恨圖霸之道彼此血刃豈與丹青爲參商乎遽命工重寫之待詔常生名重𦙍曰不必援毫乃按皂莢水洗壁而風姿宛然先主嘉賞之賜以金帛也常生傳神素號絶手自云我畫壁除摧圯搨爛外雨淋水洗斷無剝落先是詩僧貫休能畫謂常生曰貧道觀畫多矣如吾子所畫前無來人後無繼者其見賞如此圖畫見聞誌卷五欽定四庫全書圖畫見聞誌卷六宋郭若虚撰
