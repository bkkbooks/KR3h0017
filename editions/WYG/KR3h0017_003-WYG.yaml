front:
  text: 仁宗皇帝天資穎悟聖藝神竒遇興援毫超逾庶品伏聞齊國獻穆大長公主䘮明之始上親畫龍樹菩薩命待詔傳模鏤版印施聖心仁孝又非愚臣所能穪頌若虛舊有家藏御畫御馬一疋其毛赭白玉衘勒上有宸翰題云慶厯四年七月十四日御畫兼有押字印寶後因伯父内藏借觀不日赴杭鈐之任既乆假而不㱕居無何伯父終於任所此寶遂㱕伯母表兄張湍少列今不復可見爲終身之痛兼曽見張文懿家有小猿一軸仍聞禁中有天王菩薩像
  hash: sha256:7ec723f7297d127ef222bf4fbaa9e0053395a8d1bb18f760db8f1b01df65049d
  markers:
  - {type: page-break, offset: 126, content: '', id: KR3h0017_WYG_003-1b, image: WYG0812/WYG0812-0531b.png}
body:
  text: 太上游心難可與臣下並列故尊之卷首紀藝中聖朝建隆九年後至熙寜七年總一百五十八人王公士大夫依仁游藝臻乎極至者一十三人燕恭肅王嘉王李後主燕肅武宗元劉永年郭忠恕王士元宋道宋迪文同郭元方董源燕恭肅王位尊磐石名重戚藩天縱多能精於像物嘗觀所畫鶴竹雪毛丹頂傳警露之姿翠葉霜筠盡含烟之態亦嘗自朽十六羅漢令蜀人尹質描染稜稜風骨類非常格所能及聞朱邸甚有遺蹟世罕得見皇弟嘉王維城茂羙副茅土之强宗醴席餘休命毫煤而取適嘗觀所畫墨竹圖位置巧變理應天真作用縱横功齊造化復愛狀蝦魚蒲藻筍籜蘆花雖居紫禁之中頗得滄洲之趣筆意超絶殆非學而知之者矣王尤精篆籒有盡六幅縑止書一字者筆力神俊可謂驚絶江南後主李煜才識清贍書畫兼精書名金錯刀嘗觀所畫林石飛鳥遠過常流高出意外金陵王相家有雜禽花木李忠武家有竹枝圖皆希世之玩燕肅字穆之其先燕薊人後徙家曹南位龍圖閣直學士以尚書禮部侍郎致政文學治行外尤善畫山水寒林澄懐味象應㑹感神蹈摩詰之遐蹤逼咸熙之懿範太常寺有所畫屏風玉堂刑部景寜坊居第暨許雒佛寺中皆有畫壁公以壽終於康定元年贈太尉公畫與所藏古筆僅百卷皆取入禁中故人間所傳圖軸㡬稀矣公凡莅州郡作刻漏法最精又嘗被㫖造指南車皆出竒思武宗元字總之河南白波人官至虞曹外郎善畫佛道人物筆術精高曹吳具僃嘗於雒都上清宫畫三十六天帝其間赤明陽和天帝潛寫太宗御容以趙氏火德王天下故真宗祀汾隂還經雒都幸上清歷覽繪壁忽覩聖容驚曰此真先帝也遽命設几案焚香再拜且歎其畫筆之神竚立乆之上清即唐𤣥元皇帝廟舊有吳生畫五聖圖杜甫詩穪五聖聫龍衮千官列雁行是也後因増廣庭廡畫壁遂廢宗元復運神蹤高紹前哲張文懿有詩云曽此焚香對聖容宗元又嘗於廣愛寺見吳生畫文殊暜賢大像因杜絶人事旬餘刻意臨倣蹙成二小幀骨法停分神冠氣格天衣纓絡乘跨部從與大像不差毫釐自非靈心神悟感而遂通者孰能與於此哉許昌龍興寺北廊有帝釋梵王及經藏院有旃檀瑞像嵩嶽廟有出隊壁皆所竒絶初名宗道後改名宗元以壽終於皇祐二年有佛像天王九子母等圖傳於世㴱州防禦使劉永年字君錫章獻明肅皇后之姪也才敏有神力兼於畫筆錯總萬類非常格可擬郭忠恕字恕先雒陽人少能屬文七歲舉童子初周祖召爲博士後因爭忿於朝堂貶崖州司户秩滿去官不復仕縱放岐雍陜雒之間善畫屋木林石格非師授有設紈素求爲圖畫者必怒而去乘興即自爲之郭從義鎮岐下每延至山亭張素設粉墨於㫄經數月忽乘醉就圖之一角作逺山數峯而已郭氏亦珍惜之岐有富人主官酒酤其子喜畫日給醇酎設几案絹素及好紙數軸屢以情言忠恕俄取紙一軸凡數十畨首畫一丱角小童持線車紙窮處作風鳶中引一線長數丈冨家子不以爲竒遂謝絶太宗素知其名召赴闕下授以國子監主簿忠恕益縱酒肆言時政頗有謗讟上惡之配流登州死於齊之臨邑道中尸觧焉有屋木卷軸傳於世忠恕尤精字學宋元憲嘗手挍忠恕佩觽三篇寶玩之推官王士元仁壽之子也靈襟蕭爽畫法特高人物師周昉山水學關同屋木類郭忠恕皆造其微嘗見張文懿家有雜木寒林高丈餘風韻遒舉格致稀竒兼有伊尹負鼎鳯樓十八怨四時山水等圖傳於世宋道字公逹雒陽人宋迪字復古二難皆以進士擢第今竝處名曹悉善畫山水寒林情致􅈺雅體像雍容今時以爲祕重矣然則友愛之談所宜推揖文同字與可梓潼永泰人今爲司封員外郎祕閣挍理善畫墨竹富蕭灑之姿逼檀欒之秀疑風可動不筍而成者也復愛於素屏高壁状枮槎老枿風㫖簡重識者所多郭元方字子正京師人官至内殿承制善畫草蟲僃䆒蜚蠉潛分造化宜矜妙藝藹播佳名然而著意者不及疏畧葢㸃綴過當飜爲失真頗有圖軸傳於世董源字叔達鍾陵人事南唐爲後苑副使善畫山水水墨類王維著色如李思訓兼工畫牛虎肉肌豐混毛毳輕浮具足精神脱畧凡格有滄湖山水著色山水春澤放牛牛虎等圖傳於世高尚其事以畫自娛者二人李成宋澥李成字咸熙其先唐宗室避地營丘因家焉祖父皆以儒學吏事聞於時至成志尚沖􅄫高謝榮進博渉經史外尤善畫山水寒林神化精靈絶人逺甚叙論卷中已述開寶中都下王公貴戚屢馳書延請成多不荅學不爲人自娛而已後遊淮陽以疾終於乾徳五年子覺尤以經術知名職踐館閣請恩幽閟贈光祿丞事見宋白所撰墓碣有煙嵐曉景風雨四時山水松栢寒林等圖傳於世宋澥字則未聞長安人故樞密湜之弟司封道之從祖也姿度高潔不樂從仕圖書之外無所嬰心善畫山水林石凝神遐想與物𡨕通遇興登樓有時操筆故人間不多見其蹟有煙嵐曉景奔灘怪石等圖傳於世業於繪事馳名當代者一百四十六人人物山水花鳥雜畫分爲四門人物門五十三人僧道并獨工傳寫者附王靄高益王瓘孫夢卿趙光輔趙隠士孫知微勾龍爽李文才石恪袁仁厚趙長元王齊翰周文矩顧徳謙郝處厲昭慶顧洪祝李雄侯翼高文進王道真李用及李象坤高懐節張昉高元亨楊朏子圭王兼濟張懐悦陳用智孟顯陳士元王拙王居正葉進成葉仁遇郝澄童仁益毛文昌南簡龍章子淵武洞清江惟清鍾文秀田景李元濟王易陳坦令宗李八師劉道士王靄京師人工畫佛道人物長寫貎五代間以畫聞晉末與王仁壽皆爲契丹所掠太祖受禪放還授圖畫院祗候遂使江表潛寫宋齊丘韓熙載林仁肈真穪㫖改翰林待詔今定力院太祖御容梁祖真像皆靄筆也太祖御容潛龍時寫後改裝中央服矣又畫開寶寺文殊閣下天王及景徳寺九曜院彌勒下生像最爲竒出高益涿郡人工畫佛道鬼神蕃漢人馬太祖朝潛歸京師始貨藥以自給每售藥必畫鬼神或犬馬於紙上藉藥與之由是稍稍知名時太宗在潛邸外戚孫氏喜畫孫氏有酒樓一日遇四老人飲酒有異疑其神仙因謂之四皓樓亦謂孫氏爲孫四皓也因厚遇益請爲圖畫未㡬太宗龍飛孫氏以益所畫搜山圖進上遂授翰林待詔後被㫖畫大相國寺行廊阿育王等變相暨熾盛光九曜等有位置小本藏於内府後寺廊兩經廢置皆飭後軰名手依様臨倣又畫崇夏寺大殿善神筆力絶人有南國鬬象衛士騎射蕃漢出獵等圖傳於世王瓘河南雒陽人工畫佛道人物㴱得吳法世謂之小吳生石中令嘗令畫雒中昭報寺壁及有佛道功徳故事人物等傳於世孫夢卿東平人工畫佛道人物亦專吳學尤長寺壁謂之孫脫壁嘗與王靄對畫開寶寺文殊閣下西北方毘樓博义天王像并大相國寺甚有其蹟今多不存矣趙光輔華原人工畫佛道兼精蕃馬筆鋒勁利名刀頭燕尾太祖朝爲圖畫院學生故鄉里呼爲趙評事許昌開元龍興兩寺皆有畫壁浴室院地獄變尤佳有功徳蕃馬等圖傳於世隠士趙雲子善畫道像於青城丈人觀畫諸仙竒絶孫太古嘗隂使人問已畫趙云孫畫雖善而傷豐滿乏清秀氣孫由是感悟孫知微字太古眉陽人精黄老學善佛道畫於成都壽寜院畫熾盛光九曜及諸墻壁時輩穪服知微凡畫聖像必先齋戒疏瀹方始援毫有功徳并故事人物傳於世知微始畫壽寜九曜也令童仁益輩設色其水聖侍從有持水晶瓶者因贈蓮花於缾中知微既見愀然曰缾所以鎮天下之水吾得之道經今則奚以花爲嗟乎畫蛇著足失之逺矣勾龍爽蜀人國初爲翰林待詔工畫佛道人物善爲古體衣冠精裁密緻亦一代之竒筆也有功徳并故事人物傳於世李文才華陽人工畫松石兼長寫貎事孟蜀爲翰林待詔廣政中荆南高王令人入蜀請文才寫義興門街雙筍石并其故事又嘗寫蜀主并名臣真像於大慈寺亦有圖軸傳於世石恪蜀人性滑稽有口辯工畫佛道人物始師張南本後筆畫縱逸不專䂓矩蜀平至闕下嘗被㫖畫相國寺壁授以畫院之職不就堅請還蜀詔許之不樂都下風物頗有譏誚雜言或播人口有唐賢像五丁開山巨靈擘太華新羅人角力等圖傳於世袁仁厚蜀人早師李文才乾徳中至闕下未乆還蜀因求得前賢畫様十餘本特歸平居以畫自適終老鄉閭蜀川亦有遺蹟趙長元蜀人工畫佛道人物兼工翎毛初隨蜀主至闕下𨽻尚方彩畫匠人因於禁中牆壁畫雉一隻上見之嘉賞㝷補圖畫院祗候今東太一貴神像華嚴院十六羅漢竝長元筆王齊翰建康人事江南李後主爲翰林待詔工畫佛道人物開寶末金陵城䧟有歩卒李貴入佛寺中得齊翰所畫羅漢十六軸㝷爲商賈劉元嗣以白金二百星購得賫入京師復於一僧處質錢後元嗣詣僧請贖其僧以過期拒之因成爭訟時太宗尹京督出其畫覽之嘉歎遂㽞畫厚賜而釋之經十六日太宗登極後名應運羅漢周文矩建康句容人事江南李後主爲翰林待詔工畫人物車馬屋木山川尤精士女大約體近周昉而更増纖麗有貴戚遊春擣衣熨帛繡女等圖傳於世顧徳謙建康人工畫人物風神清劭舉無與此李後主愛重之嘗謂曰古有凱之今有徳謙二顧相望繼爲畫絶矣識者以爲知言呂文靖家有蕭翼說蘭亭故事横卷青錦褾餙碾玉軸頭實江南之舊物窺其風格可知非謬也郝處江南人工畫佛道鬼神兼長寫貎本一商賈酷好圖畫因而家産蕩盡惟學畫耳厲昭慶建康豐城人工畫人物事江南爲翰林待詔後隨李後主至闕下授圖畫院祗候顧洪祝不知何許人工畫人物傳其名而未見其蹟李雄北海人工畫佛道偏長鬼神罕有倫比太宗朝爲圖畫院祗候因忤㫖遯去北海龍興寺有畫壁侯翼安定人工畫佛道人物夙振吳風窮乎奥㫖長安雒汭寺壁尤多兼有三教聖像故事人物等傳於世高文進從遇之子工畫佛道曹吳兼僃乾徳乙丑嵗蜀平至闕下時太宗在潛邸多訪求名藝文進徃依焉後以攀附授翰林待詔未㡬重修大相國寺命文進倣高益舊本畫行廊變相及太一宫夀寜觀啟聖院暨開寳塔下諸功徳牆壁率皆穪㫖又勅令訪求民間圖畫繼蒙恩奨相國寺大殿後擎塔天王如出牆壁及殿西降魔變相其蹟存今畫院學者咸宗之然曽未得其髣髴耳王道真蜀郡新繁人工畫佛道人物兼長屋木太宗朝用高文進薦引授圖畫院祗候嘗被㫖畫相國寺并玉清昭應宫壁今相國寺殿東畫給孤獨長者買祗陀太子園因縁并殿西畫誌公變十二靣觀音像其蹟並存李用及李象坤並工畫佛道人馬尤精鬼神嘗與高文進王道真同畫相國寺壁並爲良手殿東畫牢度乆鬬聖變相其蹟見存高懷節文進長子太宗朝爲翰林待詔頗有父風嘗與其父同畫相國寺壁兼長屋木為人穪愛也張昉臨汝人工畫佛道人物蹟專吳體嘗畫玉清昭應宫奏樂天女高丈餘掇筆而成本郡開元寺有畫壁亦佳手也高元亨京師人工畫佛道人物兼長屋木多状京城市肆車馬有遊瓊林苑角觝夜市等圖傳於世楊朏京師人後家泗上工畫佛道人物尤於觀音得名天下然而手足間時或小失停分葢於骨法用筆跨邁倫等是其小疵不足以累大醇亦愛畫西南夷人妙得其㫖盛傳楊朏波斯子圭有父風王兼濟河南雒陽人工畫佛道鬼神雒中南宫有十太一像嵩嶽廟與武虞曹對畫牆壁武畫出隊兼濟畫入隊衆所傅播也孫懐悦安定靈臺人工畫佛道人物學吳生爲得法雒中有寺壁陳用智潁川堰城人天聖中爲圖畫院祗候未乆罷歸鄉里工畫佛道人馬山川林木精詳巧贍難跨伊人但意務周勤格乏清致有功徳蕃馬故事人物等傳於世用智居小窯鎮多謂之小窯陳孟顯安化華池人工畫佛道鬼神人馬屋木大率作用氣格略與陳用智相似多謂之小孟亦云紅樓孟家陳士元京師人善畫人物屋木有嘉慶圖故事人物傳於世王拙河東郡人工畫佛道人物初畫玉清昭應宫壁選中右第一王居正拙之子善畫士女酷學周昉精密有餘而氣韻不足葉進成江南人工畫人物嘗見楊褒虞曹家醉道圖頗得閻令之體葉仁遇進成族弟工畫人物多状江表市肆風俗田家人物郝澄金陵句容人工畫佛道鬼神學通相術精於傳寫以上各有圖軸傳於世童仁益蜀郡人工畫人物尊像出自天資不由師訓乃孫知微之亞矣嘗畫青城山丈人觀諸仙淳化末以成都天慶觀仙遊閣下舊有石恪畫左右龍虎君仁益遂抒思援毫于天慶觀前亦畫龍虎君兩壁及畫大慈寺中佛殿漢孝明帝摩騰竺法三藏保福院畫首楞嚴二十五觀筆力尤徤頗有圖軸傳於輦下好事者往往誤評爲知微之筆也毛文昌蜀郡人工畫田家風物有江村晩釣村童入學郊居豐稔等圖傳於世南簡平凉人工畫佛道人物世傳其名未見其蹟龍章京兆櫟陽人工畫佛道人物兼工傳寫尤善畫虎曽有貨藥人楊生檻中養一虎章因就視寫之故畫虎最臻形似子淵有父風武洞清長沙人工畫佛道人物特爲精妙有雜功徳十一曜二十八宿十二真人等像傳於世鍾文秀京師人今爲翰林待詔工畫佛道人物兼學關同山水有功田景慶陽人工畫人物有竒思嘗得一扇靣畫三教作二童奕碁於僧前一則乗勝而矜誇一則敗北而悔沮僧臨視而笑瞻顧如生惜景孤貧聲聞不顯後之陳留不知所終李元濟太原人工畫佛道人物精於吳筆熙寜中召畫相國寺壁命官較定衆手時元濟藝與崔白爲勍敵議者以元濟學遵師法不妄落筆遂推之爲第一其間佛鋪多是元濟之蹟也王易鄜州人亦工畫佛道人物學隣元濟時同畫相國寺壁畫畢各歸鄉里都人穪伏之陳坦晉陽人工畫佛道人物都下奉先普安二佛刹尤多功徳牆壁相國寺北廊高僧乃坦所畫其於田家固爲獨歩有村毉村學田家娶婦村落祀神移居豐社等圖傳於世僧令宗廣漢人工畫佛道人物成都大慈寺三學院并掲諦堂有畫壁道士李八師亡其名卭州依政人於本縣崇聖觀披挂工畫道門尊像青城山丈人觀有畫壁劉道士亡其名建康人工畫佛道鬼神落筆遒怪江南寺觀時見其蹟尤愛畫甘露佛多傳於世獨工傳寫者七人牟谷髙太沖尹質歐陽黌元靄維真何充牟谷不知何許人工相術善傳寫太宗朝爲圖畫院祗候端拱初詔令隨使者往交趾寫安南王黎栢及諸陪臣真像畱止數年既還屬宫車晏駕未蒙恩㫖間居閶闔門外乆之真宗幸建隆觀谷乃以所寫太宗正靣御容張於户内上見之敕中使收赴行在詰其所由谷具以實對上命釋之時太宗御容已令元靄寫畢乃更令谷寫正靣御容尋授翰林待詔能寫正靣惟谷一人高太沖江南人工傳寫事李中主爲翰林待詔嘗寫李中主真得其神思尹質蜀人工傳寫嘗寫燕王真頗蒙顧遇有藥王像孫思邈像并畫猴傳於世歐陽黌京師人工傳寫宗侯貴戚多所延請其藝與僧維真相抗餘無出其右者僧元靄蜀人自㓜入京依定力院輪公落髮玅工傳寫爲太宗朝供奉一日在禁中傳寫爲一小黄門毁辱遍問同列無肻道其姓名者靄乃草一頭子懷之見都知李神福訴以毁辱之事神福曰小底至多不得其名誰受其責靄乃探懷中頭子示之李一見嗟訝曰此鄧某也亡其名何其倉卒之閒傳寫如此之妙因召鄧責誚伏過而去僧維真嘉禾人工傳寫嘗被㫖寫仁宗英宗御容賞賚殊厚元靄之繼矣名公貴人多召致傳寫尤以善寫貴人得名何充姑蘇人工傳寫擅藝東南無出其右圖畫見聞誌卷三欽定四庫全書圖畫見聞誌卷四宋郭若虛撰紀藝下山水門凡二十四人
