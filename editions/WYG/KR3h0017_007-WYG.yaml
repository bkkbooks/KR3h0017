  hash: sha256:6c5ae9564292c109a98624cf08856367b16e5d2522cee022cc1426a225739c9a
body:
  text: 近事皇朝大遼孟蜀髙麗江南十二事總三玉堂故事樞密楚公蘇氏畫圖王氏圖畫秋山圖恩賜种放臥雪圖覺稱畫慈氏像千􅊁鹿圖訓鑒圖五客圖􅅲思巖張氏圖畫丁晉公鬬牛畫玉畫义董羽壁沒骨圖孝嚴殿相國寺王舍城寺應天三絶八仙真鍾馗様賞雪圖南莊圖李王印篆鋪殿花常思言高麗圖術畫玉堂故事太祖平江表所得圖畫賜學士院初有五十餘軸及景德咸平中只有雨村牧牛圖三軸無名氏寒蘆野鴈三軸徐熙筆五王飲酪圖二軸周文矩筆悉令重􅑽背焉玉堂後北壁兩堵董羽畫水正北一壁吳僧巨然畫山水皆有逺思一時絶筆也有二小壁畫松不知誰筆亦妙今並在焉樞密楚公江表用師之際故樞密使楚公適典維揚于時調發軍餉供濟甚廣上錄其功將議進拜公自陳願寢爵賞聞李煜内庫所藏書畫甚富輙祈恩賜上嘉其志遂以名筆僅百卷賜之徃徃有李主圖篆暨唐賢跋尾公薨後㝷多散失其孫太今爲太常少卿刻意購求頗有所獲少卿乃余之祖舅如江都王馬韓晉公牛王摩詰輞川様等常得觀焉蘇氏圖畫蘇大叅雅好書畫風鑒明逹太平興國初江表平上以金陵六朝舊都復聞李氏精博好古藝士雲集首以公倅是邦因喻㫖搜訪名賢書畫後果得千餘卷上進既穪㫖乃以百卷賜之公後入拜翰林承㫖啟沃之餘且復語及圖畫于時勅借數十品於私第未幾就賜焉至今蘇氏灋書名畫最爲盛矣公嘗奏對於便殿屢目画屏其画乃鍾隠画鷹猴圖上知其意即時取以賜之余嘗於其孫之純處見之王氏圖畫王文獻家書畫繁富其子貽正繼爲好事嘗徃來京雒間訪求名蹟充物巾衍太宗朝嘗表進所藏書畫十五卷㝷降御札云卿所進墨蹟并古畫復遍看覽俱是妙筆除畱墨蹟五卷古畫三卷領得外其餘却還卿家付王貽正其餘者乃是王羲之墨蹟晉朝名臣墨蹟王徽之畫唐閻立本畫老子西昇經圖薛稷畫鶴凡七卷猶子渙遂得摸詔札刊於翠琰秋山圖太平興國中祕閣曝畫時陶穀爲翰長因展秋山圖一面令黄居寀品第之居寀一見動容曰此圖實居寀與父筌奉孟主命同畫以荅江南信幣絹縫中有居寀父子姓名視之果驗曽有人於向文簡家見十二幅圖花竹禽鳥泉石地形皆極精妙上題云如京副使臣黄筌等十三人合畫圖之角却有江南印記乃是孟氏贈李主之物也文簡薨其圖不知所在恩賜种放真宗祀汾隂還駐蹕華隂因登亭朢蓮花峰忽憶种放居是山亟令中貴人裴愈召之時放穪疾不應召上笑而止因問愈曰放在家何爲耶愈對曰臣到放所居時㑹放在草㕔中看畫水牛二軸上顧謂侍臣曰此高尚之士怡性之物也遂按行在所見扈從圖軸得四十餘卷盡令愈徃賜之皆名蹤古蹟也放隐終南山豹林谷或居華山徃來不常時方在華山也臥雪圖丁晉公典金陵陛辭之日真宗出八幅袁安臥雪圖一面其所畫人物車馬林石廬舍靡不臻極作從者苦寒之態意思如生旁題云臣黄居寀等定到神品上但不書畫人姓名亦莫識其誰筆也上宣諭晉公曰卿到金陵日可選一絶景處張此圖晉公至金陵乃於城之西北隅構亭曰賞心危聳清曠勢出塵表遂施圖於巨屏到者莫不以此爲佳觀嵗月既乆縑素不無敗裂由是徃徃爲人刲竊後王君玉密學出典是邦素聞此圖甚竒下車之後首欲縱觀乃見竊以殆盡嗟惋乆之乃詩於壁其警句云昔人已化嘹天鶴徃事難㝷臥雪圖覺穪畫大中祥符初有西域僧覺穪來館於興國寺之傳灋院其僧通四十餘本經論年始四十餘嵗丁晉公延見之嘉其敏恵後作聖德頌以上文理甚富上問其所欲但云求金襴袈裟㱕置金剛坐下㝷詔尚方造以給之覺穪自言酤蘭左國人刹帝利姓善畫嘗於譯堂北壁畫釋迦面與此方所畫絶異昔有梵僧𢃄過白㲲上本亦與尋常畫像不同葢西國所穪髣髴其真今之儀相始自晉戴逵刻製梵像欲人生敬時頗有損益也慈氏像景祐中有畫僧曾於市中見舊功德一幅看之乃是慈氏菩薩像左邉一人執手爐裹幞頭衣中央服右邊一婦人捧花盤頂翠鳳寳冠衣珠絡泥金廣袖畫僧黙識其立意非俗而畫灋精高遂以半千售之乃重加􅑽背持獻入内閻都知閻一見且驚曰執香爐者實章聖御像也捧花盤者章憲明肅皇太后真容也此功德乃高文進所畫舊是章憲閣中别置小佛堂供養每日凌晨焚香恭拜章憲㱕天不意流落一至於此言訖於悒乃以束縑償之復增華其褾軸即日進於澄神殿仁廟對之瞻慕慽容移刻方罷命藏之御府以白金二百星賜荅之千角鹿圖皇朝與大遼國馳禮于今僅七十載繼好息民之羙曠古未有慶厯中其主號興宗以五幅縑畫千􅊁鹿圖爲獻旁題年月日御畫上命張圖於太清樓下召近臣縱觀次日又敕中闈宣命婦觀之畢藏於天章閣訓鑒圖皇祐初元上敕待詔高克明等圖畫三朝盛德之事人物纔及寸餘宫殿山川鑾輿儀衛咸偹焉命學士李淑等編次序讚之凡一百事爲十卷名三朝訓鑒圖圖成復令傳摹鏤版印染頒賜大臣及近上宗室五客圖李文正嘗於私第之後園育五禽以寓目皆以客名之後命畫人寫以爲圖鶴曰仙客孔雀曰南客鸚鵡曰隴客白鷴曰閒客鷺鷥曰雪客各有詩篇題於圖上好事者傳寫之􅅲思巖魯肅簡以孤直遇主公家之事知無不爲每中書罷㱕私宅别居一小齋圖繪山水題曰􅅲思巖獨遊其間雖家人罕接焉張氏圖畫張侍郎去華典成都時尚存孟氏有國日屏扆圖障皆黄筌輩畫一日清河患其暗舊損破悉令換易遂命畫工别爲新製以其換下屏面迨公帑所有舊圖呼牙儈高評其直以自售一日之内獲黄筌等圖十餘面後貳卿謝世頗有奉葬者其子師錫善畫好竒以其所存寳藏之師錫死復有葬者師錫子景伯亦工畫有高鑒尚存餘蓄以自寳玩景伯死悉以葬焉丁晉公丁晉公家藏書畫甚盛南遷之日籍其財産有李成山水寒林共九十餘軸佗皆穪是後悉分掌内府矣鬬牛畫馬正惠嘗得鬬水牛一軸云厲㱕真畫甚愛之一日展曝於書室雙扉之外有輸租莊賓適立於砌下凝玩乆之既而竊哂公於青瑣間見之呼問曰吾藏畫農夫安得觀而笑之有説則可無說則罪之莊賓曰某非知畫者但識真牛其鬬也尾夾於髀間雖壮夫旅力不可少開此畫牛尾舉起所以笑其失真愚謂雖画者能之妙不及農夫見之專也擅藝者所宜博究玉畫义張文懿性喜書畫今古圖軸襞積繁夥銓量必當愛䕶尤勤每張畫必先施帟幕畫义以白玉爲之其畫可知也董羽水玉堂北壁舊有董羽畫水二堵筆力遒勁勢若摇動其下一二尺頗有雨壊處蘇易簡爲學士尤愛重之蘇適受詔知舉將入南宫囑於同院韓丕使召名筆完葺之蘇既去韓乃呼工之赤白者杇墁其半而用朱畫欄檻以承之蘇出見之悵恨累日雖命水洗滌而痕蹟至今尚存時人以蘇之鑒尚韓之純朴兩重焉沒骨圖李少保端愿有圖一面畫芍藥五本云是聖善齊國獻穆大長公主房臥中物或云太宗賜文和其畫皆無筆墨惟用五彩布成旁題云翰林待詔臣黄居寀等定到上品徐崇嗣畫沒骨圖以其無筆墨骨氣而名之但取其濃麗生態以定品後因出示兩禁賔客蔡君謨乃命筆題云前世所畫皆以筆墨爲上至崇嗣始用布彩逼真故趙昌輩傚之也愚謂崇嗣遇興偶有此作後來所画未必皆廢筆墨且考之六灋用筆爲次至如趙昌亦非全無筆墨但多用定本臨摹筆氣羸懦惟尚傅彩之功也孝嚴殿治平甲辰嵗於景靈宫建孝嚴殿奉安仁宗神御乃鳩集畫手畫諸屏扆牆壁先是三聖神御殿兩廊圖畫創業戡定之功及朝定所行大禮次畫講肄文武之事遊豫宴饗之儀至是又兼畫應仁宗朝輔臣呂文靖已下至節鉞凡七十二人時張龍圖燾主其事乃奏請於逐人家取影貎傳寫之鴛行序列歴歴可識其面於是觀者莫不歎其盛羙相國寺治平乙巳嵗雨患大相國寺以汴河勢高溝渠失治寺庭四廊悉遭渰浸圯塌殆盡其牆壁皆高文進等畫惟大殿東西走馬廊相對門廡不能爲害東門之南王道真畫給孤獨長者買祗陁太子園因縁東門之北李用及與李象坤合畫牢度义鬭聖變相西門之南王道真畫誌公變十二面觀音像西門之北高文進畫大降魔變相今並存之皆竒蹟也其餘四靣廊壁皆重修復後集今時名手李元濟等用内府所藏副本小様重臨倣者然其間作用各有新意焉王舍城寺魏之臨清縣東北隅有王舍城佛刹内東邊一殿極古四壁皆吳生畫禪宗故事其書不知誰人類褚河南循例接勞北使及使遼者過則縣大夫自請遊觀仍粉牓誌使者姓名應天三絶唐僖宗幸蜀之秋有㑹稽山處士孫位扈從止成都位有道術兼工書畫曾於成都應天寺門左壁畫坐天王曁部從鬼神筆鋒狂縱形製詭異世莫之與比歴三十餘載未聞繼其高躅至孟蜀時忽有􅋌山處士景煥一名朴善畫煥與翰林學士歐陽烱爲忘形之友一日聨騎同遊應天適覩位所畫門之左壁天王激發高興遂畫右壁天王以對之二藝爭鋒一時壯冠渤海歎重其能遂爲長歌以羙之繼有草書僧夢㱕後至因請書於廊壁書畫歌行一日而就傾城士庻看之闐噎寺中成都人號爲應天三絶也辛顯云景煥所画不及孫位逺甚煥尤好畫龍有埜人閒話五卷行於世其間一篇惟叙畫龍之事八仙真道士張素卿神仙人也曾於青城山丈人觀畫五嶽四凟真形并十二溪女數壁筆蹟遒徤神彩欲活見之者心悚神悸足不能進實畫之極致者也孟蜀後主數遣祕書少監黄筌令依様摹之及下山終不相類後因蜀主誕日忽有人持素卿畫八仙真形以獻蜀主蜀主觀之且歎曰非神仙之能無以寫神仙之質遂厚賜以遣一日命翰林學士歐陽烱次第讚之復遣水部員外郎黄居寶八分題之每觀其畫歎其筆蹟之縱逸覽其讚賞其文詞之高古玩其書愛其㸃畫之雄壯顧謂八仙不譲三絶八仙者李阿容成董仲舒張道陵嚴君平李八百長壽仙葛永瑰鍾馗様昔吳道子畫鍾馗衣藍衫鞹一足眇一目腰笏巾首而􅅫髮以左手捉鬼以右手抉其鬼目筆蹟遒勁實繪事之絶格也有得之以獻蜀主者蜀主甚愛重之常挂臥内一日召黄筌令觀之筌一見穪其絶手蜀主因謂筌曰此鍾馗若用拇指搯其目則愈見有力試爲我改之筌遂請㱕私室數日看之不足乃别張絹素畫一鍾馗以拇指搯其鬼目翌日并吳本一時獻上蜀主問曰向止令卿改胡爲别畫筌曰吳道子所畫鍾馗一身之力氣色眼貎俱在第二指不在拇指以故不敢輒改也臣今所畫雖不迨古人然一身之力併在拇指是敢别畫耳蜀主嗟賞之仍以錦帛鋈器旌其别識賞雪圖李中主保大五年元日大雪命太弟已下登樓展宴咸命賦詩令中人就私第賜李建勲繼和是時建勲方㑹中書舍人徐鉉勤政學士張義方於溪亭即時和進乃召建勲鉉義方同入夜艾方散侍臣皆有興詠徐鉉爲前後序仍集名手圖畫曲盡一時之妙真容高沖古主之侍臣灋部絲竹周文矩主之樓閣宫殿朱澄主之雪竹寒林董源主之池沼禽魚徐崇嗣主之圖成無非絶筆南莊圖李後主有國日嘗令周文矩畫南莊圖盡寫其山川氣象亭臺景物精思詳偹殆爲絶格開寶癸亥嵗㱕朝首貢於闕下籍之祕府李主印篆李後主才高識博雅尚圖書蓄聚既豐尤精賞鑒今内府所有圖軸暨人家所得書畫多有印篆曰内殿圖書内合同印建業文房之寶内司文印集賢殿書院印集賢院御書印此印多用墨或親題畫人姓名或有押字或爲歌詩雜言又有織成大囘鸞小囘鸞雲鶴練鵲墨錦褾飾今綾錦院傚此織作提頭多用織成縚𢃄簽貼多用黄經紙背後多書監􅑽背人姓名及所較品第又有澄心堂紙以供名人書畫鋪殿花江南徐熙輩有於雙縑幅素上畫叢豓疊石傍出藥苖雜以禽鳥蜂蟬之妙乃是供李主宫中挂設之具謂之鋪殿花次曰􅏻堂花意在位置端莊駢羅整肅多不取生意自然之態故觀者徃徃不甚采鑒常思言余熙寜辛亥冬被命接勞北使爲輔行日與其副燕人馬禋邢希古結駟並馳希古恭順詳敏有儒者之風從容語及圖畫言燕京有一布衣常其姓思言其名善畫山水林木求之者甚衆然必在渠樂與即爲之既不可以利誘復不可以勢動此其所以難得也復見問曰南朝諸君子頗有好畫者否余荅曰南朝士大夫自公之暇固有琴樽書畫之樂希古慨然嗟慕形乎神色愚以謂常生者擅藝居幽朔之間不被中國之聲教果能不可以勢動復不可以利誘則斯人也豈易得哉高麗國皇朝之盛遐荒九譯來庭者相屬於路惟高麗國敦尚文雅漸染華風至於伎巧之精他國罕比固有丹青之妙錢忠懿家有著色山水四卷長安臨潼李虞曹家有本國八老圖二卷及曾於楊襃虞曹家見細布上畫行道天王皆有風格熙寜甲寅嵗遣使金良鑒入貢訪求中國圖畫鋭意購求稍精者十無一二然猶費三百餘緡丙辰冬復遣使崔思訓入貢因將帶畫工數人奏請摹寫相國寺壁畫㱕國詔許之於是盡摸之持㱕其摸畫人頗有精於工灋者彼使人每至中國或用摺疊扇爲私覿物其扇用鵶青紙爲之上畫本國豪貴雜以婦人鞍馬或臨水爲金砂灘暨蓮荷花木水禽之類㸃綴精巧又以銀埿爲雲氣月色之狀極可愛謂之倭扇本出於倭國也近嵗尤祕惜典客者葢稀得之倭國乃日本國也本名倭既恥其名又自以在極束因號日本也今則臣屬高麗也術畫夫士必以忠醇徑亮盡瘁於公然後可穪於任可爵於朝惡夫邪佞以茍進者則不免君子之誅藝必以妙悟精能取重於世然後可著於文可寶於笥惡夫眩惑以沽名者則不免鑒士之弃昔者孟蜀有一術士穪善畫蜀主遂令於庭之東隅畫野鵲一隻俄有衆禽集而噪之次令黄筌於庭之西隅畫野鵲一隻則無有集禽之噪蜀主以故問筌對曰臣所畫者藝畫也彼所畫者術畫也是乃有噪禽之異蜀主然之國初有道士陸希直者每畫花一枝張於壁間則遊蜂立至向使邊黄徐趙輩措筆定無來蜂之驗此抑非眩惑取功沽名亂藝者乎至於野人騰壁羙女下墻暎五彩於水中起雙龍於霧外皆出方術怪誕推之畫灋闕如也故不錄圖畫見聞誌卷六
