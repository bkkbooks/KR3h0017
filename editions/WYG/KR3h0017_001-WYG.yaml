front:
  text: 圖畫見聞誌卷一
  hash: sha256:93f1a78c52b53c8266696dedb24fac65d559e1b6b1003b76bd27131759f78294
body:
  text: 宋郭若虛撰叙諸家文字自古及近代紀評畫筆文字非一難悉具載聊以其所見聞篇目次之凡三十家名畫集南齊高帝撰古畫品錄謝赫撰装馬譜毛恵逺撰昭公錄梁武帝撰僧繇錄亡名氏畫説文亡名氏述畫記後魏孫暢之撰續畫品錄陳姚最撰後畫錄唐沙門彦悰撰畫斷張懷瓘撰名畫獵精錄亡名氏後畫品錄李嗣真撰雜色駿騎錄韓幹撰繪境張璪撰畫評顧况撰續畫評劉整撰公私畫錄裴孝源撰畫拾遺錄竇蒙撰畫山水錄吳恬撰一名玠唐朝名畫錄朱景真撰歴代名畫記張彦逺撰畫山水訣荆浩撰一名洪谷子梁朝畫目亡名氏廣畫新集蜀沙門仁顯撰益州畫錄辛顯撰江南畫錄亡名氏江南畫錄拾遺徐鉉撰廣梁朝畫目皇朝胡嶠撰總畫集黄休復撰本朝畫評劉道醇纂符嘉應撰叙國朝求訪畫之源流諸家偹載爰自唐季兵難五朝亂離圖畫之好乍存乍失逮我宋上符天命下順人心肈建皇基肅清六合沃野謳歌之際復見堯風坐客閒宴之餘兼窮繪事太宗皇帝欽明濬哲富藝多才時方諸僞歸真四荒重譯萬㡬豐暇屢購珍竒太平興國間詔天下郡縣搜訪前哲墨蹟圖畫先是荆湖轉運使得漢張芝草書唐韓幹馬二本以獻之韶州得張九齡畫像并文集九卷表進後之繼者難可勝紀又勅待詔高文進黄居寀搜訪民間圖畫端拱元年以崇文院之中堂置祕閣命吏部侍郎李至兼祕書監㸃撿供御圖書選三館正本書萬卷實之祕監以進御􅅲餘藏於閣内又從中降圖畫并前賢墨蹟數千軸以藏之淳化中閣成上飛白書額親幸召近臣縱觀圖籍賜宴又以供奉僧元靄所寫御容二軸藏於閣又有天章龍圖寶文三閣後苑有圖書庫皆藏貯圖書之府祕閣每嵗因暑伏曝􅡢近侍暨館閣諸公張筵縱觀圖典之盛無替天禄石渠妙楷寶蹟矣敘自古䂓鑒易穪聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象又曰象也者像此者也嘗考前賢畫論首稱像人不獨神氣􅇧灋衣紋向背爲難葢古人必以聖賢形像徃昔事實含毫命素製爲圖畫者要在指鑒賢愚發明治亂故魯殿紀興廢之事麟閣㑹勲業之臣蹟曠代之幽潛託無窮之炳煥昔漢孝武帝欲以鉤弋趙媫妤少子爲嗣命大臣輔之惟霍光任重大可屬社稷乃使黄門畫者畫周公輔成王朝諸侯以賜光孝成帝遊於後庭欲以班媫妤同輦載媫妤辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖倖今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班媫妤又嘗設宴飲之㑹趙李諸侍中皆引滿舉白談笑大噱時乗輿幄坐張畫屏風畫紂醉踞妲己作長夜之樂上因顧指畫問班伯曰紂爲無道至於是乎伯曰書云乃用婦人之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰茍不若此此圖何戒伯曰沈湎於酒㣲子所以告去也式號式謼大雅所以流連也謂書淫亂之戒其原在於酒上喟然歎曰乆不見班生今日復聞讜言後漢光武明徳馬皇后羙於色厚於徳帝用嘉之嘗從觀畫虞舜見娥皇女英帝指之戲后曰恨不得如此爲妃又前見陶唐之像后指堯曰嗟乎羣臣百僚恨不得爲君如是帝顧而笑唐徳宗詔曰貞元己巳嵗秋九月我行西宫瞻閎閤崇構見老臣遺像顒然肅然和敬在色想雲龍之叶應感致業之艱難覩徃思今取􅁼非逺文宗大和二年自撰集尚書中君臣事蹟命畫工圖於太液亭朝夕觀覽焉漢文翁學堂在益州大城内昔經頽廢後漢蜀郡太守高朕復繕立乃圖畫古人聖賢之像及禮器瑞物於壁唐韋機爲檀州刺史以邉人僻陋不知文儒之貴修學館畫孔子七十二弟子漢晉名儒像自爲讚敦勸生徒繇兹大化夫如是豈非文未盡經緯而書不能形容然後繼之於畫也所謂與六籍同功四時並運亦宜哉叙圖畫名意古之祕畫珍圖名隨意立典範則有春秋毛詩論語孝經爾雅等圖上古之畫多遺其姓其次後漢蔡邕有講學圖梁張僧繇有孔子問禮圖隋鄭灋士有明堂朝㑹圖唐閻立徳有封禪圖尹繼昭有雪宫圖觀徳則有帝舜娥皇女英圖亡名氏隋展子䖍有禹治水圖晉戴逵有列女仁智圖宋陸探㣲有勲賢圖忠鯁則隋楊契丹有辛毗引裾圖唐閻立本有陳元達鏁諫圖吳道子有朱雲折檻圖高節則晉顧凱之有祖二疏圖王廙有木鴈圖宋史藝有屈原漁父圖南齊蘧伯珍有巢由洗耳圖壮氣則魏曹髦有卞莊刺虎圖宋宗炳有師子擊象圖梁張僧繇有漢武射蛟圖寫景則晉明帝有輕舟迅邁圖衛協有穆天子醼瑤池圖史道碩有金谷園圖顧凱之有雪霽朢五老峰圖靡麗則晉戴逵有南朝貴戚圖宋袁倩有丁貴人􅀈曲項琵琶圖唐周昉有楊妃架雪衣女亂雙陸局圖風俗則南齊毛惠逺有剡中溪谷村墟圖陶景真有永嘉屋邑圖隋楊契丹有長安車馬人物圖唐韓滉有堯民鼓腹圖以上圖畫雖不能盡見其蹟前人載之甚詳但愛其佳名聊取一二類而錄之論製作楷模大率圖畫風力氣韻固在當人其如種種之要不可不察矣畫人物者必分貴賤氣貎朝代衣冠釋門則有善巧方便之顔道像必具修真度世之範帝皇當崇上聖天日之表外夷應得慕蕐欽順之情儒賢即見忠信禮義之風武士固多勇悍英烈之貎隠逸俄識肥遯髙世之節貴戚葢尚紛蕐侈靡之容帝釋須明威福嚴重之儀鬼神乃作醜䰩尺者切馳趡于鬼切之状士女宜富秀色婑烏果切媠奴坐切之態田家自有醇甿朴野之真恭驁愉慘又在其間矣畫衣紋林石用筆全類於書畫衣紋有重大而調暢者有縝細而勁徤者勾綽縱掣理無妄下以状高側深斜卷摺飄舉之勢畫林木者有樛枝挺榦屈節皴皮紐裂多端分敷萬状作怒龍驚虺之勢聳凌雲翳日之姿宜須崖岸豐隆方穪蟠根老壯也畫山石者多作礬頭亦爲凌面落筆便見堅重之性皴淡即生窊凸之形每留素以成雲或借地而爲雪其破墨之功尤爲難也畫畜獸者全要停分向背筋力精神肉分肥圜毛骨隠起仍分諸物所禀動止之性四足惟兎掌底有毛謂之建毛畫龍者析出三停自首至膊膊至腰腰至尾也分成九似角似鹿頭似駞眼似鬼項似蛇腹似蜃鱗似魚爪似鷹掌似虎耳似牛窮游泳蜿蜒之妙得囘蟠升降之宜仍要􅎸鬛肘毛筆畫壯快直自肉中生出爲佳也凡畫龍開口者易爲巧合口者難爲功畫家穪開口貓兒合口龍言其兩難也畫水者有一擺之波三摺之浪布之字之勢分虎爪之形湯湯若動使觀者浩然有江湖之思爲妙也畫屋木者折算無虧筆畫匀壯㴱逺透空一去百斜如隋唐五代已前洎國初郭忠恕王士元之流畫樓閣多見四角其斗栱逐鋪作爲之向背分明不失繩墨今之畫者多用直尺一就界畫分成斗栱筆蹟繁雜無壯麗閒雅之意畫花果草木自有四時景候隂陽向背筍條老嫩苞蕚後先逮諸園蔬野草咸有出土體柱畫翎毛者必須知識諸禽形體名件自㭰喙口臉眼縁去聲叢林腦毛披蓑毛翅有梢去聲翅有蛤翅翅邦上聲上有大節小節大小窩翎次及六梢又有料平聲風掠草彌縫翅習之間㪚尾壓磹尾肚毛腿袴尾錐脚有探爪三節食爪二節撩爪四節托爪一節宣黄八甲鷙鳥眼上謂之看棚一名看簷背毛之間謂之合溜山鵲鷄􅁼各有嵗時蒼嫩皮毛眼爪之異家鵝鴨即有子肚野飛水禽自然輕梢去聲如此之類或鳴集而羽翮緊戢或寒棲而毛葉鬆泡去聲已上具有名體處所必須融㑹闕一不可設或未識漢殿吳殿梁柱斗栱义手替木熟柱駞峰方莖額道抱間昻頭羅花羅幔暗制綽幕猢猻頭琥珀枋龜頭虎座飛簷撲水膞風化廢垂魚惹草當鈎曲脊之類慿何以畫屋木也畫者尚罕能精究況觀者乎論衣冠異制自古衣冠之制荐有變更指事繪形必分時代衮冕灋服三禮備存物状實繁難可得而載也漢魏已前始戴幅巾晉宋之世方用羃䍦後周以三尺皁絹向後幞髮名折上巾通謂之幞頭武帝時裁成四腳隋朝惟貴臣服黄綾紋袍烏紗㡌九環𢃄六合靴起於後魏次用桐木黒漆爲巾子裹於幞頭之内前繫二腳後垂二腳貴賤服之而烏㡌漸廢唐太宗嘗服翼善冠貴臣服進德冠至則天朝以絲葛爲幞頭巾子以賜百官開元間始易以羅又别賜供奉官及内臣圜頭宫様巾子至唐末方用漆紗裹之乃今幞頭也三代之際皆衣襴衫秦始皇時以紫緋綠袍爲三等品服庶人以白國語曰袍者朝也古公卿上服也至周武帝時下加襴唐高宗朝給五品已上隨身魚又勅品官紫服金玉帶㴱淺緋服竝金帶㴱淺緑服並銀帶㴱淺青服並鍮石帶庶人服黄銅鐵帶一品已下文官帶手巾算帒刀子礪石武官亦聼睿宗朝制武官五品已上帶七事跕蹀佩刀刀子磨石契苾真噦厥針筒火石袋也開元初復罷之晉處士馮翼衣布大袖周縁以皁下加襴前繫二長帶隋唐朝野服之謂之馮翼之衣今呼爲直裰禮記儒行篇魯哀公問於孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逄掖之衣長居宋冠章甫之冠注云逄大也大掖大袂禪衣也逄掖與馮翼音相近又梁志有袴褶以從戎事三代已前人皆跣足三代已後始服木屐伊尹以草爲之名曰履秦世參用絲革靴本胡服趙靈王好之制有司衣袍者宜穿皁靴唐代宗朝令宫人侍左右者穿紅錦靿靴凡在經營所宜詳辯至如閻立本圖昭君妃音配虜戴帷㡌以據鞍王知慎畫梁武南郊有衣冠而跨馬殊不知帷㡌創從隋代軒車廢自唐朝雖弗害爲名蹤亦丹青之病爾帷㡌如今之席㡌周囘垂網也論氣韻非師謝赫云一曰氣韻生動二曰骨灋用筆三曰應物像形四曰隨類傅彩五曰經營位置六曰傳摸移寫六灋精論萬古不移然而骨灋用筆以下五灋可學如其氣韻必在生知固不可以巧密得復不可以嵗月到黙契神㑹不知然而然也嘗試論之竊觀自古竒蹟多是軒冕才賢巖穴上士依仁㳺藝探賾鉤㴱高雅之情一寄於畫人品既已高矣氣韻不得不高氣韻既已高矣生動不得不至所謂神之又神而能精焉凡畫必周氣韻方號世珍不爾雖竭巧思止同衆工之事雖曰畫而非畫故楊氏不能授其師輪扁不能傳其子繫乎得自天機出於靈府也且如世之相押字之術謂之心印本自心源想成形跡跡與心合是之謂印爰及萬灋緣慮施爲隨心所合皆得名印矧乎書畫發之於情思契之於綃楮則非印而何押字且存諸貴賤禍福書畫豈逃乎氣韻高卑夫畫猶書也揚子曰言心聲也書心畫也聲畫形君子小人見矣論用筆得失凡畫氣韻本乎游心神彩生於用筆用筆之難斷可識矣故愛賓穪惟王獻之能爲一筆書陸探微能爲一筆畫無適一篇之文一物之像而能一筆可就也乃是自始及終筆有朝揖連緜相屬氣脈不斷所以意存筆先筆周意内畫盡意在像應神全夫内自足然後神閒意定神閒意定則思不竭而筆不困也昔宋元君將畫圖衆史皆至受揖而立紙筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則觧衣槃礴嬴君曰可以是真畫者也又畫有三病皆繫用筆所謂三者一曰版二曰刻三曰結版者腕弱筆癡全虧取與物狀平褊不能圜混也刻者運筆中疑心手相戻勾畫之際妄生圭角也結者欲行不行當㪚不㪚似物凝礙不能流暢也未窮三病徒舉一隅畫者鮮克留心觀者當煩拭皆大底氣韻髙筆畫壮則愈玩愈妍其或格凡毫懦初觀縱似可採乆之還復意怠矣論曹吳體灋曹吳二體學者所宗按唐張彦逺歴代名畫記穪北齊曹仲達者本曹國人最推工畫梵像是爲曹謂唐吳道子曰吳吳之筆其勢圜轉而衣服飄舉曹之筆其體稠疊而衣服緊窄故後軰穪之曰吳帶當風曹衣出水又按蜀僧仁顯廣畫新集言曹曰昔竺乾有康僧㑹者初入吳設像行道時曹不興見西國佛畫儀範寫之故天下盛傳曹也又言吳者起於宋之吳暕之作故號吳也且南齊謝赫云不興之蹟代不復見惟祕閣一龍頭而已觀其風骨擅名不虛吳暕之說聲微蹟曖世不復傳謝評云擅羙當年有聲京洛在第三品江僧寳下也至如仲達見北齊之朝距唐不遠道子顯開元之後繪像仍存證近代之師承合當時之體範況唐室已上未立曹吳豈顯釋寡要之談亂愛賓不刊之論推時驗蹟無愧斯言也雕塑鑄像亦本曹吳論吳生設色吳道子畫今古一人而已愛賓穪前不見顧陸後無來者不其然哉嘗觀所畫牆壁卷軸落筆雄勁而傅彩簡淡或有牆壁間設色重處多是後人装飾至今畫家有輕拂丹青者謂之吳装雕塑之像亦有吳装論婦人形相歴觀古名士畫金童玉女及神仙星官中有婦人形相者貌雖端嚴神必清古自有威重儼然之色使人見則肅恭有歸仰心今之畫者但貴其姱麗之容是取悦於衆目不達畫之理趣也觀者察之論收藏聖像論者或曰不宜收藏佛道聖像恐其䙝慢葷穢難可時時展玩愚謂不然凡士君子相與觀閲書畫爲適則必處閒靜但鑒賞精能瞻崇遺像惡有䙝慢之心哉且古人所製佛道功德則必專心勵志曲盡其玅或以希福田利益是其尤爲著意者況自吳曹不興晉顧愷之戴逵宋陸探㣲梁張僧繇北齊曹仲逹隋鄭灋士楊契丹唐閻立本閻立德吳道子周昉盧楞伽之流及近代侯翼朱繇張圖武宗元王瓘高益高文進王靄孫夢卿王道真李用及李象坤蜀高道興孫位孫知㣲范瓊勾龍爽石恪金水石城張𤣥蒲師訓江南曹仲𤣥陶守立王齊翰顧德謙之倫無不以佛道爲功豈非釋梵荘嚴真仙顯化有以見雄才之浩博盡學志之精深者乎是知云不宜收藏者未爲要說論三家山水畫山水惟營丘李成長安關同華原范寛智妙入神才高出類三家鼎跱百代標程前古雖有傳世可見者如王維李思訓荆浩之倫豈能方駕近代雖有專意力學者如翟院㴱永紀真之軰難繼後塵翟學李劉學關紀學范夫氣象蕭踈􅈣林清曠毫鋒頴脱墨灋精㣲者營丘之製也石體堅凝雜木豐茂臺閣古雅人物幽閒者關氏之風也峯巒渾厚勢状雄强槍上聲筆俱匀人屋皆質者范氏之作也烟林平遠之妙始自營丘畫松葉謂之攅針筆不染淡自有榮茂之色關畫木葉問用墨搵時出枯梢筆蹤勁利學者難到范畫林木或側形如偃葢别是一種風規但未見畫松栢耳畫屋既質以墨籠染後軰目爲鉄屋復有王士元王端燕貴許道寜高克明郭熈李宗成丘訥之流或有一體或具體而㣲或預造堂室或各開户牖皆可穪尚然藏畫者方之三家繇諸子之於正經矣闗同雖師荆浩葢青出於藍也論黄徐體異諺云黄家富貴徐熈野逸不惟各言其志葢亦耳目所習得之於手而應於心也何以明其然黄筌與其子居寀始竝事蜀爲待詔筌後累遷如京副使既歸朝筌領真命爲宫贊或曰筌到關未乆物故今之遺跡多見在蜀中日作故徃徃有廣政年號宫贊之命亦恐傳之誤居寀復以待詔錄之皆給事禁中多寫禁籞所有珍禽瑞鳥竒花怪石今傳世桃花鷹鶻純白雉兎金盆鵓鴿孔雀龜鶴之類是也又翎毛骨氣尚豐滿而天水分色徐熙江南處士志節高邁放達不羈多状江湖所有汀花野竹水鳥淵魚今傳世鳬鴈鷺鷥蒲藻蝦魚叢豓折枝園蔬藥苗之類是也又翎毛形骨貴輕秀而天水通色言多状者縁人之穪聊分兩家作用亦在臨時命意大抵江南之藝骨氣多不及蜀人而瀟灑過之也二者春蘭秋菊各擅重名下筆成珍揮毫可範復有居寀兄居寳徐熈之孫曰崇嗣曰崇矩蜀有刁處士名光𦙍劉贊滕昌祐夏侯延祐李懐衮江南有唐希雅希雅之孫曰中祚曰宿及觧處中軰都下有李符李吉之儔及後來名手間出跂朢徐生與二黄繇山水之有三家黄筌之師刁處士繇闗同之師荆浩論畫龍體要畫龍惟五代四明僧傳古大師其名最著觀其體則筆墨遒爽善爲蜿蜒之状皇建院法堂屏風是其真蹟至任從一待詔之作稍加怪怒建隆觀翊教院玉皇殿後是其真蹟今崔白所圖又得其要建隆觀翊教院玉皇殿中羅㬋邉有一龍頭北都大安寺羅漢壁有龍一條恨不見不興祕閣之頭軌範同否又不知葉公當日所遇厥状何如自昔豢龍氏殁龍不復擾所謂上飛于天晦隔層雲下歸于泉㴱入無底人不可得而見也今之圖寫固難惟以形似但觀其揮毫落墨筋力精神理契吳畫鬼神前論三停九似亦以人多不識真龍先匠所遺傳授之法論古今優劣或問近代至藝與古人何如荅曰近代方古多不及而過亦有之若論佛道人物士女牛馬則近不及古若論山水林石花竹禽魚則古不及近何以明之且顧陸張吳中及二閻皆純重雅正性出天然晉顧愷之宋陸探㣲梁張僧繇唐閻立本閻立徳暨吳道子也吳生之作爲萬世灋號曰畫聖不亦宜哉已上皆極佛道人物張周韓戴氣韻骨灋皆出意表唐張萱周昉皆工士女韓幹畫馬戴嵩工牛或問曰何以但舉韓幹而不言曹霸止引戴嵩而不穪韓滉荅曰韓師曹將軍戴法韓晉公但舉其弟可知其師也至如韋鑒暨猶子鶠皆善畫馬但取其尤著者明之難即遍舉也後之學者終莫能到故曰近不及古至如李與關范之蹟徐暨二黄之蹤前不藉師資後無復繼踵借使二李三王之軰復起邉鸞陳庶之倫再生亦將何以措手於其間哉故曰古不及近二李則李思訓將軍并其子李昭道中舍三王則王維右丞暨王熊王宰悉工山水邉鸞陳庶工花鳥竝唐人也是以推今考古事絶理窮觀者必辨金鍮無焚玉石圖畫見聞誌卷一欽定四庫全書圖畫見聞誌卷二宋郭若虗撰紀藝上唐永昌元年後盡五代凡一百一十八人唐末二十七人左全趙公祐趙溫其趙德齊范瓊陳皓彭堅常粲常重𦙍吕嶤竹䖍孫遇張詢張南本麻居禮張素卿陳若愚胡瓌子䖍荆浩刁光𦙍尹繼昭李洪度辛澄張騰張贊王浹五代九十一人于兢趙嵓劉彦齊袁㠖羅塞翁東丹王胡擢胡翼王殷李羣燕筠杜霄李𤣥應弟審厲㱕真李靄之韋道豐朱簡章王喬士鄭唐卿關同支仲元枚行思郭乾暉鍾隠郭權史瓊程凝王道古李坡唐垓王道求宋卓富玫左禮張南王偉黄延浩張質韓求李祝張圖朱繇李昇杜楷杜子瓌杜𢎞義房從真宋藝高道興阮知晦杜齯龜黄筌高從遇阮惟德杜敬安黄居寶趙元徳趙忠義蒲師訓蒲延昌張玫徐德昌周行通張𤣥孔嵩丘文播弟文曉趙才滕昌祐姜道隠楊元真董從晦張景思跋異王仁壽衛賢朱悰曹仲𤣥陶守立竹夢松丁謙何遇陸晃施璘貫休楚安傳古弟子岳閻黎智蘊德符唐末二十七人左全蜀郡人蹟本儒家世傳圖畫玅工佛道人物寶厯中聲馳宇内成都長安畫壁甚廣多放吳生之蹟頗得其要有佛道功德五帝三官等像傳於世趙公祐成都人工畫佛道鬼神世穪高絶大和間已著畫名李德裕鎮蜀以賓禮遇之改蒞浙西辟從蓮幕成都大慈聖興兩寺皆有畫壁趙溫其公祐之子綽有父風成都寺觀多見其蹟趙德齊溫其之子襲二世之精蓺竒縱逸筆時軰咸推伏之光
