body:
  text: 五代九十一人梁相國于兢善畫牡丹㓜年從學因覩學舍前檻中牡丹盛開乃命筆放之不浹旬奪真矣後遂酷思無倦動必増竒貴達之後非尊親㫖命不復含毫有人贈詩曰看時人歩澀展處蜨爭來有寫生全本折枝傳於世梁駙馬都尉趙嵓善畫人馬挺然高格非衆人所及有漢書西域傳骨貴馬小兒戲舞鍾馗彈碁診脉等圖傳於世梁左千牛衛將軍劉彦齊善畫竹頗臻清致有風折竹孟宗泣竹湘妃等圖傳於世人物多假胡翼之手後唐侍衛親軍袁㠖河南登封人善畫魚謹宻形似外得噞喁游泳之態有卷軸傳於世羅塞翁錢尚父時爲吳中從事錢塘令隠之子善畫羊世罕有其蹟惟餘姚陸家曽收一卷精妙卓絶後歸孫元規家矣東丹王契丹天皇王之弟號人皇王名突欲後唐長興二年投歸中國明宗賜姓李名贊華善畫本國人物鞍馬多寫貴人酋長胡服鞍勒率皆珍華然而馬尚豐肥筆乏壮氣胡擢不知何許人善状花鳥氣韻甚高博學能詩飄然有物外之志嘗謂其弟曰吾思苦於三峽聞猿擢有三峽聞猿賦人多膾炙又嘗吟曰甕中每醖逍遥藥筆下閒偷造化功其高情逸興如此有鸂􅈃圖全株石橊四時翎毛花果等圖傳於世胡翼字鵬雲工畫佛道人物至於車馬樓臺無施而不妙趙嵓都尉頗禮遇之常延至門館有秦樓吳宫盤車洗馬回紋豐稔等圖傳於世時多求借自古名筆手自傳模装成卷軸後題云安定鵬雲記王殷工畫佛道士女尤精外國人物與胡翼並爲趙嵓都尉所禮他人無及也有職貢遊春士女等圖并粉本佛像傳於世李羣工畫人物爲時所穪有𤣥中灋師像孟説舉鼎赤松子八戒醉客等圖傳於世燕筠工畫天王獨躋周昉之妙有卷軸傳於世杜霄工畫士女富於姿態妙得周昉之㫖有韆鞦撲蜨吳王避暑等圖傳於世李𤣥應洎弟審並工畫蕃馬專學胡瓌有放馬白本胡樂飲㑹茀林等圖傳於世道士厲歸真異人也莫知其鄉里善畫牛虎兼工鷙禽雀竹綽有竒思惟著一布裘入酒肆娼家每有人問其所以輙大張口茹其拳而不言梁祖召問云君有何道理歸真對曰衣單愛酒以酒禦寒用畫償酒此外無能梁祖然之嘗遊南昌信果觀有三官殿夾紓塑像乃唐明皇時所作體製妙絶常患雀鴿糞穢其上歸真乃畫一鷂於壁間自是雀鴿無復栖止有渡水牧牛牛虎鷂子柘竹野禽等圖傳於世李靄之華隂人工畫山水寒林有江郷之思鄴帥羅中令厚禮之爲建一亭爲援毫之所名金波亭時號金波李處士也有賣藥修琴歸山圖野人荷酒寒林并山水卷軸傳於世韋道豐江夏人善畫寒林逸思竒僻不拘小節當代珍之請揖不暇然經嵗月方成一圖成則驚人故世罕有真蹟朱簡章工畫人物屋木有禹治水神仙傳胡笳十八拍鳯樓十八怨烟波漁父等圖傳於世王喬士工畫佛道人物尤愛畫地藏菩薩十王像凡有百餘本傳於世鄭唐卿工畫人物兼長寫貎有梁祖名臣像并故事人物傳於世闗同一名穜又王文康家圖上題云童長安人工畫山水學從荆浩有出藍之羙馳名當代無敢分庭敘論卷中具述有趙陽山居溪山晩霽四時山水桃源早行等圖傳於世支仲元鳯翔人工畫人物有老子誡徐甲蕭翼賺蘭亭商山四皓等圖傳於世梅行思或云再思江夏人工畫鬬雞名聞天下最著者是陳康肅家籠雞一軸號爲神絶兼工人物有十才子河岳精靈集舉人過闗謝女詠梅宼豹騎牛等圖傳於世郭乾暉將軍北海人工畫鷙鳥雜禽踈篁槁木格律老勁巧變鋒出曠古未見其比有秋郊鷹雉并逐禽鷂子架上鷂子等圖傳於世鍾隠天台山人亦工畫鷙鳥竹木師郭乾暉㴱得其㫖乾暉始祕其筆灋隠變姓名趨汾陽之門服勤累月乾暉不知其隠也隠一日緣興於壁上畫鷂子一隻人有報乾暉者乾暉亟就視之且驚曰子得非鍾隠乎隠再拜具道所以乾暉喜曰孺子可教也乃善遇之丈席以講畫道隠遂馳名海内焉兼工畫山水人物有鷹鷂雜禽周處斬蛟山水等圖傳於世郭權江南人又師鍾隠亦有圖軸傳於世史瓊善畫雉兎竹石有雪景雉兎竹下引雛野雉等圖傳於世程凝善畫鶴竹兼長逺水有六鶴圖并折竹孤鶴湖灘逺水等圖傳於世王道古善畫雀竹有四時雀竹并引雛鬬雀等圖傳於世李坡南昌人惟善畫竹氣韻飄舉不事小巧有折竹風竹冐雪疎篁等圖傳於世唐垓善畫野禽生菜水族諸物世穪精妙有柘棘野禽十種生菜魚蝦海物等圖傳於世王道求工畫佛道鬼神人物畜獸始依周昉遺範後類盧楞伽之蹟多畫鬼神及外國人物龍蛇畏獸當時名手歎伏大相國寺有畫壁今多不存矣有十六羅漢挾鬼鍾馗茀林師子等圖傳於世宋卓工畫佛道志學吳筆不事傅彩有白畫菩薩粉本坐神等像傳於世富玫工畫佛道有彌勒内院圖白衣觀音觀珠地藏慈恩灋師等像傳於世左禮張南竝工佛道二人筆思不相逺有二十四化圖十六羅漢三官十真人等像傳於世王偉工畫佛道相國寺大殿等處舊有畫壁甚多今存者無幾黄延浩工畫人物有明皇吹玉笛五王同幄春園宴㑹乞巧等圖傳於世張質工畫田家風物有村田鼔笛村社醉㪚踏歌等圖傳於世韓求李祝竝工佛道學呉生陜郊龍興寺有畫壁張圖河内雒陽人嘗事梁祖掌行軍糧籍故人呼爲張將軍善潑墨山水兼長大像雒中廣愛寺有畫壁又嘗見宼忠愍家有釋迦像一鋪鋒鋩豪縱勢類草書實竒怪也朱繇長安人工畫佛道酷類呉生雒中廣愛寺有文殊普賢像長壽寺并河中府金真觀皆有畫壁李昇成都人工畫蜀川山水始得唐張璪山水一軸凝玩數日云未盡善矣後遂心師造化意出前賢成都聖壽寺有畫壁多寫名山勝境仁顯云嘗於少監黄筌第見昇山水圖乃知名實相穪也有武陵溪青城峨嵋二十四化等圖傳於世蜀中多呼昇爲小李將軍乃是思訓之子思訓林甫之伯官至左武衛大將軍子昭道爲太子中舍父子俱善畫因父故人呼昭道爲小李將軍也杜楷成都人亦工畫山水多作老木懸崖囘阿逺岫殊多雅思有秋日并州路詩意圖并山水卷軸傳於世亦工佛像杜子瓌華陽人工畫佛道尤精傅彩調鉛殺粉别得其方嘗於成都龍華東禪院畫毘盧像坐赤圜光中碧蓮花上其圜光如初出日輪破淡無蹟人所不到也杜𢎞義蜀郡晉平人工畫佛像高僧成都寶厯寺有文殊普賢并水陸功德房從真成都人工畫人物蕃馬事王蜀先主爲翰林待詔嘗於蜀宫版障上畫諸葛武侯引兵渡瀘水人馬執戴生動如神蜀主每行至彼駐而不進怡然歎曰壯哉甲馬兼善撥筆鬼神亦多寺壁有寜王射獵陳登斫鱠常建冐雪入京等圖傳於世宋藝蜀郡人工寫貎事王蜀爲翰林待詔常寫唐朝列聖及道士葉灋善一行禪師沙門㑹海内臣高力士等真於大慈寺高道興成都人事王蜀爲内圖畫庫使工佛道雜畫用筆神速觸類皆精蜀之寺觀尤多牆壁時諺云高君墜筆亦成畫阮知晦蜀郡人工畫貴戚子女兼長寫貎事王蜀爲翰林待詔寫王先主真爲首出杜齯龜其先本秦人避地居蜀博學强識工畫羅漢兼長寫貎始師常粲後自成一體事王蜀爲翰林待詔成都大慈寺有畫壁黄筌字要叔成都人十七嵗事王蜀後主爲待詔至孟蜀加撿挍少府監賜金紫後累遷如京副使善畫花竹翎毛兼工佛道人物山川龍水全該六灋逺過三師花鳥師刁處士山水師李昇人物龍水師孫遇也孟蜀後主廣政甲辰歲淮南馳聘副以六鶴蜀主遂命筌寫六鶴於便坐之壁因名六鶴殿蜀人自此方識真鶴六鶴集在故事拾遺卷中由是蜀之豪貴請爲圖軸者接蹟時諺云黄筌畫鶴薛稷减價又畫四時花鳥於八卦殿鷹見畫雉連連掣臂遂命翰林學士歐陽烱作記又寫白兎於縑素蜀主常懸坐側有四時山水花竹雜禽鷙鳥狐兎人物龍水佛道天王山居詩意瀟湘八景等圖傳於世高從遇道興之子襲成父藝事孟蜀爲翰林待詔曽於蜀宫大安樓下畫天王隊仗甚竒後遭兵火廢絶矣阮惟徳知晦之子紹精父業事孟蜀爲翰林待詔尤善状宫闈禁苑皇妃帝戚富貴之事有宫中賞春公子夜宴按舞熨帛等圖傳於世杜敬安齯龜之子繼父之羙事孟蜀爲翰林待詔尤能傅彩成都大慈寺多與其父同畫列壁黄居寶字辤玉筌之次男也少聰警多能與其父同事蜀爲待詔後累遷水部員外郎亦工畫花鳥松石兼善八分年未四十而卒趙元德長安人天復中入蜀雜工佛道鬼神山水屋木偶唐季䘮亂之際得隋唐名手畫様百餘本故所學精博有漢高祖過豐沛盤車講學豐稔圖傳於世趙忠義元徳之子事孟蜀爲翰林待詔雖從父訓宛若生知蜀後主嘗令畫關將軍起玉泉寺圖作地架一座垂昻疊栱向背無失蜀主命匠氏較之無一差者其精妙如此嘗與高道興黄筌軰同畫成都寺壁甚多蒲師訓蜀人事孟蜀爲翰林待詔師房從真嘗携畫詣從真從真高蹈拊膺曰子之所得非吾所授也畫蜀中祠廟鬼神兵仗冠冕幢葆皆盡其羙蒲延昌師訓之子與其父同時爲孟蜀待詔工書佛道鬼神外尤精師子行筆勁利用色不繁張玫成都人事孟蜀爲翰林祗候工畫人物士女兼長寫貎有長門醉客按樂擣衣等圖及漢唐名臣像傳於世徐徳昌成都人事孟蜀爲翰林祗候工畫人物士女墨彩輕媚爲時所穪周行通成都人工畫鬼神人馬鷹犬嬰孩得其精要有李陵送蘇武支遁三雋奪馬等圖傳於世張𤣥簡州金水石城山人善圖僧相畫羅漢名播天下穪金水張家羅漢也孔嵩蜀人善畫龍兼工蟬雀與黄筌竝師刁處士成都廣福院壁有所畫龍及有蟬雀等圖傳於世丘文播暨弟文曉廣漢人竝工佛道人物兼善山水其品降高趙軰成都并其鄉里頗有畫蹟文播後改名濳趙才蜀人工畫鬼神人物亦長甲騎蜀川多有遺蹟滕昌祐其先呉人避地居蜀工畫花鳥蟬蜨折枝生菜筆蹟輕利傅彩鮮澤尤於畫鵝得名有四時花鳥魚龜㺅兔及梅花鵝茴香下睡鵝又有群鵝泛蓮沼等圖傳於世兼善書大字蜀中寺觀牌額多昌祐書姜道隠漢州什邡人齔嵗好畫有時終日不歸父母尋之多在佛廟神祠中畫壁下及長不事産業惟畫是好布衣芒屫隨身筆墨而已嘗於淨衆寺方丈畫山水松石宋王庭隠贈之束縑道隠置於僧堂拂衣而去楊元真不知何許人工畫佛道善爲曺筆尤精布色始居蜀後召入鄴中不回蜀川頗有畫蹟黄從誨成都人世本儒家心游繪事佛道人物舉意皆精成都福感寺有畫壁張景思蜀人工畫佛道蜀中有畫壁跋異汧陽人工畫佛道鬼神洛中福先寺有畫壁其品次張圖也王仁壽汝南宛人工畫佛道鬼神兼長鞍馬始師王殷後學精呉灋晉末爲契丹所掠太祖受禪放還相國寺文殊院有淨土彌勒下生二壁淨土院有八菩薩像及有征遼獵渭等圖傳於世衛賢京兆人事江南李後主爲内供奉工畫人物臺閣初師尹繼昭後服膺呉體張文懿家有春江釣叟圖上有李後主書漁父詞二首其一曰閬苑有意千重雪桃李無言一隊春一壺酒一竿鱗快活如儂有㡬人其二曰一棹春風一葉舟一綸繭縷一輕鈎花滿渚酒盈甌萬頃波中得自由有朢賢宫滕王閣盤車水磨等圖傳於世朱悰不知何許人與衛賢竝師尹繼昭而衛爲高足曹仲𤣥建康豐城人事江南李後主爲翰林待詔工畫佛道鬼神始學吳不得意遂改蹟細密自成一格尤於傅彩妙越等夷江左梵宇靈祠多有其蹟陶守立池陽人江南李後主保大閒應舉下第􅅲居齊山以詩筆丹青自娛工畫佛道鬼神山川人物至於車馬臺閣筆無偏善常於九華草堂壁畫山程早行圖及建康清涼寺有海水李後主金山水閣有十六羅漢像皆振妙於時也竹夢松建康溧陽人事江南李後主爲東川别駕工畫人物子女宫殿臺閣巧絶冠代丁謙晉陵義興人工畫竹兼善寫蔬果宼忠愍家有寫蔥一軸上有李後主題丁謙二字非凡格也此畫今歸王晉卿都尉家何遇江南人善畫林石屋木學慕衛賢深得其趣陸晃嘉禾人善畫田家人物意思疎野落筆成像不預搆思故所畫卷軸或爲絶品或爲末品也施璘京兆藍田人工畫竹有生意禪月大師貫休婺州蘭溪人道行文章外尤工小筆嘗覩所畫水墨羅漢云是休公入定觀羅漢真容後寫之故悉是梵相形骨古怪其真本在豫章西山雲堂院供養于今郡將迎請祈雨無不應驗休公有詩集行於世兼善書謂之姜體以其俗姓姜也僧楚安蜀人善畫山水㸃綴甚細每畫一扇上安姑蘇臺或滕王閣千山萬水盡在目前今蜀中扇面印板是其遺範仁顯云筆蹤細碎全虧六法非大手高格也僧傳古大師四明人善畫龍水得名於世叙集卷中已述皇建院有所畫屏風見存弟子岳闍黎授學於師其品次之僧智藴河南人工畫佛像人物學深曹體雒中天宫寺講堂有毘盧像廣愛寺有定光佛福先寺有三災變相數壁周祖時進舞鍾馗圖賜紫衣僧德符善畫松柏氣韻蕭灑曽於相國寺灌頂院㕔壁畫一松一柏觀者如市賢士大夫畱題凡百餘篇其爲時推重如此以上各有圖軸傳於世圖畫見聞誌卷二欽定四庫全書圖畫見聞誌卷三宋郭若虚撰
