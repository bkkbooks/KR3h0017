front:
  text: 化中詔許王建於成都置生祠命德齊畫西平王儀仗車輅旌纛灋物及朝真殿上畫后妃嬪御皆極精緻昭宗恩之遷翰林待詔辛顯評溫其與德齊皆次公祐之品范瓊陳皓彭堅三人同時同蓺名振三川大中初復興佛宇後三人分畫成都大慈聖壽聖興淨衆中興等五寺牆壁二百餘間各盡所蘊淳化後兩遭兵火頗有毀廢矣辛顯云范爲神品陳彭爲妙品仁顯云范陳爲玅品上彭爲妙品嘗見文潞公家墳寺積慶院有移置壁畫婆叟仙一軀乃范瓊所作辛顯評爲神品當矣常粲成都人工畫佛道人物善爲上古衣冠咸通中路巖鎮蜀頗加禮遇有孔子問禮山陽七賢等圖并立釋迦女媧伏羲神農燧人等像傳於世常重𦙍粲之子妙工寫貌僖宗朝爲翰林供奉嘗寫僖宗御容及名臣真像得其神彩亦曽於寶厯寺畫請塔天王至妙呂嶤竹䖍並長安人工畫佛道人物僖宗朝爲翰林待詔廣明中扈從入蜀長安成都皆有畫壁孫遇自穪㑹稽山人志行孤潔情韻疎放廣明中避地入蜀遂居成都善畫人物龍水松石墨竹兼長天王鬼神筆力狂怪不以傅彩爲功長安蜀川皆有畫壁實竒蹟也初名位後改名遇亦有圖軸傳於世仁顯評逸品張詢南海人避地居蜀善畫吳山楚岫枮松怪石中和間嘗於昭覺寺大悲堂後畫三壁山川一壁早景一壁午景一壁晚景謂之三時山人所穪異也亦有山水卷軸傳於世張南本不知何許人工畫佛道鬼神兼精畫火嘗於成都金華寺大殿畫八明王時有一僧遊禮至寺整衣升殿驟覩炎炎之勢驚怛幾仆時孫遇畫水南本畫火水火之形本無定質惟於二子冠絶古今又嘗畫寳厯寺水陸功德曲盡其妙後來爲人摹寫竊换真蹟鬻與荆湖商賈今所存者多是僞本别有勘書詩㑹高麗王行香等圖傳於世麻居禮蜀人師張南本光化天復間聲蹟甚高資簡卭蜀甚有其筆道士張素鄉簡州人少孤貧落魄長依本郡三清觀頂挂善畫道門尊像天帝星官形製竒古實天授之性也嘗於青城山丈人觀畫五嶽四瀆十二溪女等兼有老子過流沙并朝真圖八仙九曜十二真人等像傳於世道士陳若愚左蜀人師張素卿得其筆灋成都精思觀有青龍白虎朱雀𤣥武四君像胡瓌范陽人工畫蕃馬雖繁富細巧而用筆清勁至於穹廬什器射獵生死物靡不精竒凡畫駝馬騣尾人衣毛毳以狼毫縛筆疏渲之取其纎徤也有隂山七騎下程捉馬射雕等圖傳於世子䖍有父風荆浩河内人博雅好古善畫山水自撰山水訣一卷爲友人表進祕在省閤常自穪洪谷子語人曰吳道子畫山水有筆而無墨項容有墨而無筆吾當采二子之所長成一家之體故闗同北面事之有四時山水三峯桃源天台等圖傳於世刁光𦙍長安人天復中避地入蜀工畫龍水竹石花鳥貓兎黄筌孔嵩皆門弟子嘗於大慈寺承天院内窗邉小壁四堵上畫四時花鳥體製精絶後黄居寀重装飾之亦有圖軸傳於世尹繼昭不知何許人工畫人物臺閣世推絶格有移新豐阿房宫吳宫等圖傳於世李洪度成都人工畫佛道人物名振當時成都大慈寺三學院等處有畫壁辛澄不知何許人成都大慈寺泗州堂有僧伽像及普賢閣下有五如來像張騰不知何許人工佛道雜畫描作布色頗窮其妙成都聖興寺有畫壁張贊河陽人工畫佛道人物雒中有寺壁王浹不知何許人工畫人物錢忠懿家有導引圖
